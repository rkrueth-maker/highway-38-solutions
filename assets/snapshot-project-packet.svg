<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Project Packet snapshot preview</title>
  <desc id="desc">A stylized Highway 38 project packet showing photos in, layout zones, material groups, build order, risks, and next steps.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" rx="32" fill="url(#bg)"/>
  <rect x="44" y="44" width="812" height="472" rx="26" fill="#ffffff" opacity="0.96"/>
  <text x="76" y="96" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">Highway 38 Project Packet</text>
  <text x="76" y="128" font-family="Arial, sans-serif" font-size="16" fill="#475569">Messy photos + rough measurements → clear build plan</text>
  <rect x="76" y="160" width="210" height="140" rx="18" fill="#dbeafe"/>
  <rect x="102" y="188" width="158" height="14" rx="7" fill="#2563eb" opacity="0.65"/>
  <rect x="102" y="220" width="112" height="14" rx="7" fill="#2563eb" opacity="0.35"/>
  <rect x="102" y="252" width="142" height="14" rx="7" fill="#2563eb" opacity="0.35"/>
  <text x="76" y="330" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Input sorted</text>
  <rect x="330" y="160" width="494" height="58" rx="16" fill="#f1f5f9"/>
  <text x="356" y="196" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Layout zones</text>
  <rect x="330" y="236" width="494" height="58" rx="16" fill="#ecfeff"/>
  <text x="356" y="272" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Material groups</text>
  <rect x="330" y="312" width="494" height="58" rx="16" fill="#fef9c3"/>
  <text x="356" y="348" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Build order</text>
  <rect x="330" y="388" width="494" height="58" rx="16" fill="#dcfce7"/>
  <text x="356" y="424" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Risks + next steps</text>
  <text x="76" y="472" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#0369a1">Big problems. Clear plans.</text>
</svg>
