<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d"><title id="t">Conceptual 3 bedroom 2 bath cabin floor plan</title><desc id="d">A 48 by 26 foot single-story northern Minnesota cabin with three bedrooms, two bathrooms, open kitchen dining living area, laundry and mechanical room, and covered entry.</desc><rect width="1200" height="760" fill="#f4f7f5"/><g transform="translate(70 80)" font-family="Arial,sans-serif"><text x="0" y="-30" font-size="28" font-weight="700" fill="#0b1f34">Concept Floor Plan · 48' × 26' · 1,248 sq ft</text><rect x="0" y="0" width="960" height="520" fill="#fff" stroke="#0b1f34" stroke-width="8"/><path d="M360 0V520M650 0V520M0 250H360M650 270H960M780 270V520M650 390H960" fill="none" stroke="#0b1f34" stroke-width="5"/><path d="M360 330H650M510 330V520" fill="none" stroke="#0b1f34" stroke-width="4"/><g fill="#0b1f34" font-size="24" text-anchor="middle"><text x="180" y="115">BEDROOM 2</text><text x="180" y="150" font-size="18">12' × 12'</text><text x="180" y="365">BEDROOM 3</text><text x="180" y="400" font-size="18">12' × 11'</text><text x="505" y="135">OPEN KITCHEN / DINING / LIVING</text><text x="505" y="175" font-size="18">Approx. 15' × 26'</text><text x="435" y="420">BATH 2</text><text x="435" y="450" font-size="18">Tub / shower</text><text x="580" y="420">LAUNDRY / MECH</text><text x="580" y="450" font-size="18">WH · ERV · panel</text><text x="805" y="125">PRIMARY BEDROOM</text><text x="805" y="160" font-size="18">15' × 13'</text><text x="715" y="335">W.I.C.</text><text x="870" y="335">PRIMARY BATH</text><text x="870" y="365" font-size="18">Walk-in shower</text><text x="805" y="455">ENTRY / MUDROOM</text></g><g stroke="#1f6b47" stroke-width="4" fill="none"><path d="M960 430h45v70h-45M360 280h35v60h-35M650 210h35v60h-35"/></g><g fill="#ff6900"><rect x="380" y="35" width="230" height="58" rx="8"/><text x="495" y="73" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">KITCHEN ISLAND</text></g><path d="M380 560h200v75H380z" fill="#fff" stroke="#0b1f34" stroke-width="4"/><text x="480" y="605" text-anchor="middle" font-family="Arial" font-size="22" fill="#0b1f34">COVERED ENTRY</text><g font-family="Arial" fill="#0b1f34" font-size="18"><text x="0" y="690">Concept only. Final structural, energy, mechanical, plumbing, electrical, septic, well, and site plans require field verification and applicable licensed/stamped design.</text></g></g></svg>