<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc"><title id="title">High-end Problem Snapshot mockup</title><desc id="desc">Realistic deliverable mockup with cluttered garage input photo, marked problems, and finished report preview.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f6eee4"/><stop offset=".55" stop-color="#f8fafc"/><stop offset="1" stop-color="#e8eef7"/></linearGradient><linearGradient id="photo" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#232f3f"/><stop offset=".55" stop-color="#111827"/><stop offset="1" stop-color="#0b1120"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#0f172a" flood-opacity=".2"/></filter><filter id="soft"><feGaussianBlur stdDeviation="4"/></filter><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" stroke="#dbeafe" stroke-width="1" fill="none"/></pattern></defs><rect width="1600" height="1000" rx="36" fill="url(#bg)"/><rect x="52" y="42" width="1496" height="88" rx="24" fill="#0f172a"/><text x="88" y="95" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#fff">Problem Snapshot — finished product preview</text><text x="1196" y="94" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#fed7aa">Sample output — not customer work</text><g filter="url(#shadow)"><rect x="64" y="170" width="700" height="680" rx="28" fill="#fff"/><text x="96" y="220" font-family="Arial" font-size="24" font-weight="900" fill="#111827">Customer input photo</text><rect x="96" y="250" width="636" height="390" rx="24" fill="url(#photo)"/><rect x="96" y="250" width="636" height="390" rx="24" fill="#000" opacity=".08"/><polygon points="96,640 732,640 690,525 135,525" fill="#1f2937" opacity=".75"/><rect x="135" y="524" width="560" height="18" rx="9" fill="#ef4444" opacity=".95"/><text x="142" y="565" font-family="Arial" font-size="16" font-weight="900" fill="#fecaca">Blocked work lane</text><rect x="138" y="395" width="116" height="118" rx="10" fill="#b45309"/><rect x="281" y="350" width="142" height="163" rx="12" fill="#8b4513"/><rect x="446" y="405" width="112" height="108" rx="10" fill="#a16207"/><rect x="598" y="326" width="90" height="187" rx="12" fill="#64748b"/><rect x="150" y="292" width="112" height="68" rx="10" fill="#64748b"/><rect x="300" y="285" width="150" height="70" rx="10" fill="#334155"/><rect x="475" y="286" width="96" height="64" rx="10" fill="#475569"/><g opacity=".55" filter="url(#soft)"><circle cx="240" cy="620" r="70" fill="#94a3b8"/><circle cx="550" cy="610" r="85" fill="#64748b"/></g><g font-family="Arial" font-weight="900"><circle cx="197" cy="327" r="30" fill="#dc2626"/><text x="188" y="338" font-size="28" fill="#fff">1</text><circle cx="642" cy="385" r="30" fill="#dc2626"/><text x="633" y="396" font-size="28" fill="#fff">2</text><circle cx="360" cy="450" r="30" fill="#dc2626"/><text x="351" y="461" font-size="28" fill="#fff">3</text></g><rect x="96" y="670" width="636" height="120" rx="18" fill="#fff7ed" stroke="#fdba74"/><text x="126" y="710" font-family="Arial" font-size="20" font-weight="900" fill="#7c2d12">H38 readout from the photo</text><text x="126" y="748" font-family="Arial" font-size="18" fill="#7c2d12">1. lane blocked   2. storage not measured   3. tools, parts, projects mixed</text></g><g filter="url(#shadow)"><rect x="812" y="170" width="724" height="680" rx="28" fill="#fff"/><rect x="852" y="210" width="644" height="74" rx="18" fill="#dbeafe"/><text x="886" y="257" font-family="Arial" font-size="27" font-weight="900" fill="#1e3a8a">Finished Problem Snapshot Report</text><rect x="852" y="326" width="190" height="140" rx="22" fill="#fee2e2" stroke="#fecaca"/><text x="890" y="382" font-family="Arial" font-size="52" font-weight="900" fill="#991b1b">3</text><text x="942" y="382" font-family="Arial" font-size="18" font-weight="900" fill="#991b1b">top issues</text><text x="890" y="424" font-family="Arial" font-size="16" fill="#991b1b">review before delivery</text><rect x="1080" y="326" width="416" height="140" rx="22" fill="#f0fdf4" stroke="#86efac"/><text x="1118" y="376" font-family="Arial" font-size="24" font-weight="900" fill="#14532d">First move</text><text x="1118" y="416" font-family="Arial" font-size="18" fill="#14532d">Tape and clear a single work lane before buying storage.</text><rect x="852" y="510" width="644" height="190" rx="22" fill="#f8fafc" stroke="#cbd5e1"/><text x="890" y="554" font-family="Arial" font-size="22" font-weight="900" fill="#111827">Customer receives</text><text x="890" y="598" font-family="Arial" font-size="18" fill="#111827">✓ Problem marker list tied to the input photo</text><text x="890" y="636" font-family="Arial" font-size="18" fill="#111827">✓ Missing measurements checklist</text><text x="890" y="674" font-family="Arial" font-size="18" fill="#111827">✓ First-step cleanup order</text><rect x="852" y="728" width="644" height="64" rx="18" fill="#f0fdf4" stroke="#86efac"/><text x="890" y="768" font-family="Arial" font-size="20" font-weight="900" fill="#14532d">Rick Review Required / Owner Approval Required</text></g><text x="66" y="920" font-family="Arial" font-size="20" font-weight="900" fill="#7c2d12">Hypothetical example · Staged demo using sample information · No customer-facing delivery without approval</text></svg>