  </g>

  <g transform="translate(86 760)">
    <rect width="416" height="54" rx="18" fill="#f8fafc" stroke="#cbd5e1"/><text x="24" y="35" class="font small heavy dark">Business Cleanup Starter · quote path + tracker</text>
    <rect x="440" width="366" height="54" rx="18" fill="#f8fafc" stroke="#cbd5e1"/><text x="464" y="35" class="font small heavy dark">Cleanup Rescue Pack · folder map + index</text>
    <rect x="830" width="460" height="54" rx="18" fill="#f8fafc" stroke="#cbd5e1"/><text x="854" y="35" class="font small heavy dark">Workflow Opportunity Snapshot · safe draft workflow</text>
