    <rect x="368" y="22" width="272" height="132" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="394" y="50" width="78" height="74" rx="8" fill="#bae6fd"/><rect x="488" y="50" width="70" height="34" rx="8" fill="#bbf7d0"/><rect x="488" y="96" width="70" height="34" rx="8" fill="#fed7aa"/><rect x="572" y="50" width="48" height="80" rx="8" fill="#ddd6fe"/><rect x="394" y="142" width="98" height="8" rx="4" fill="#22c55e"/>
    <text x="368" y="186" class="font mid heavy dark">Basic Layout Snapshot</text><text x="368" y="220" class="font tiny muted">Zones + measurement checklist</text><text x="368" y="246" class="font tiny accent">Staged demo using sample info</text>

