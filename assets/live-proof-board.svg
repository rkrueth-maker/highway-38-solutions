<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Live Proof Products and Workflow staged demo board</title>
  <desc id="desc">A wide staged demo proof board showing under-250 products, result previews, functional proof, Gmail draft proof, and final approval requirement. Not customer work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffaf3"/><stop offset="1" stop-color="#f5efe6"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#221b14" flood-opacity=".16"/></filter>
    <style>
      .font{font-family:Inter,Segoe UI,Arial,sans-serif}.tiny{font-size:18px}.small{font-size:22px}.mid{font-size:28px}.big{font-size:50px}.heavy{font-weight:900}.bold{font-weight:800}.muted{fill:#64748b}.dark{fill:#111827}.accent{fill:#8a3a18}.green{fill:#14532d}.line{stroke:#d9c8b7;stroke-width:2}.card{fill:#fffefb;stroke:#d9c8b7;stroke-width:2}.screen{fill:#0f172a}.paper{fill:#f8fafc}.safe{fill:#fff4ea;stroke:#e7b98e;stroke-width:2}.ok{fill:#f0fdf4;stroke:#bbf7d0;stroke-width:2}
    </style>
  </defs>
  <rect width="1600" height="900" rx="44" fill="url(#bg)"/>
  <rect x="52" y="46" width="1496" height="808" rx="36" class="card" filter="url(#shadow)"/>
  <rect x="86" y="82" width="355" height="42" rx="21" fill="#f0ddca"/>
  <text x="111" y="110" class="font small heavy accent">LIVE PROOF: PRODUCTS + WORKFLOW</text>
  <text x="86" y="178" class="font big heavy dark">Under-$250 products with working proof path</text>
  <text x="86" y="222" class="font small muted">Staged demo using sample information — not customer work. Draft results require final Rick/user approval.</text>
  <rect x="86" y="252" width="1428" height="62" rx="20" class="ok"/>
  <text x="116" y="292" class="font small heavy green">System produces draft results internally. Final Rick/user approval is required before customer-facing delivery.</text>

  <g transform="translate(86 348)">
    <rect width="210" height="82" rx="20" class="safe"/><text x="22" y="34" class="font small heavy accent">Live site loads</text><text x="22" y="62" class="font tiny dark">GitHub Pages public site</text>
    <rect x="238" width="210" height="82" rx="20" class="safe"/><text x="260" y="34" class="font small heavy accent">Sample page loads</text><text x="260" y="62" class="font tiny dark">Proof page is visible</text>
    <rect x="476" width="210" height="82" rx="20" class="safe"/><text x="498" y="34" class="font small heavy accent">Request form works</text><text x="498" y="62" class="font tiny dark">Start Request opens form</text>
    <rect x="714" width="210" height="82" rx="20" class="safe"/><text x="736" y="34" class="font small heavy accent">Submission captured</text><text x="736" y="62" class="font tiny dark">Intake can enter tracker</text>
    <rect x="952" width="210" height="82" rx="20" class="safe"/><text x="974" y="34" class="font small heavy accent">Gmail draft proof</text><text x="974" y="62" class="font tiny dark">Draft only, not sent</text>
    <rect x="1190" width="238" height="82" rx="20" class="safe"/><text x="1212" y="34" class="font small heavy accent">Approval required</text><text x="1212" y="62" class="font tiny dark">Rick/user final gate</text>
  </g>

  <g transform="translate(86 468)">
