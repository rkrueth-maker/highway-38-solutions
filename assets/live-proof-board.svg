    <rect x="714" y="22" width="272" height="132" rx="16" class="screen"/><rect x="742" y="58" width="70" height="66" rx="8" fill="#475569"/><rect x="836" y="58" width="70" height="66" rx="8" fill="#475569"/><rect x="930" y="58" width="40" height="66" rx="8" fill="#475569"/><rect x="742" y="142" width="210" height="8" rx="4" fill="#22c55e"/>
    <text x="714" y="186" class="font mid heavy dark">Shop Flow Review</text><text x="714" y="220" class="font tiny muted">Bay flow + first fixes</text><text x="714" y="246" class="font tiny accent">Hypothetical example</text>

    <rect x="1038" width="316" height="270" rx="24" class="card"/>
    <rect x="1060" y="22" width="272" height="132" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="1090" y="52" width="66" height="78" rx="8" fill="#dbeafe"/><rect x="1170" y="52" width="66" height="78" rx="8" fill="#dcfce7"/><rect x="1250" y="52" width="66" height="78" rx="8" fill="#ffedd5"/><rect x="1090" y="142" width="200" height="8" rx="4" fill="#22c55e"/>
