<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">AI workflow snapshot preview</title>
  <desc id="desc">A stylized Highway 38 AI workflow snapshot showing intake, sorting, templates, dashboard, handoff, and follow-up steps.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" rx="32" fill="url(#bg)"/>
  <rect x="44" y="44" width="812" height="472" rx="26" fill="#ffffff" opacity="0.96"/>
  <text x="76" y="96" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">AI Workflow Snapshot</text>
  <text x="76" y="128" font-family="Arial, sans-serif" font-size="16" fill="#475569">Repeated work → templates, tracker, prompts, handoff path</text>
  <g font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#0f172a">
    <rect x="76" y="178" width="130" height="78" rx="18" fill="#dbeafe"/>
    <text x="105" y="224">Intake</text>
    <rect x="246" y="178" width="130" height="78" rx="18" fill="#ecfeff"/>
    <text x="282" y="224">Sort</text>
    <rect x="416" y="178" width="130" height="78" rx="18" fill="#fef9c3"/>
    <text x="444" y="224">Template</text>
    <rect x="586" y="178" width="130" height="78" rx="18" fill="#dcfce7"/>
    <text x="620" y="224">Track</text>
  </g>
  <g stroke="#0f172a" stroke-width="6" stroke-linecap="round" opacity="0.55">
    <line x1="216" y1="217" x2="236" y2="217"/>
    <line x1="386" y1="217" x2="406" y2="217"/>
    <line x1="556" y1="217" x2="576" y2="217"/>
  </g>
  <rect x="76" y="308" width="748" height="64" rx="18" fill="#f1f5f9"/>
  <text x="104" y="348" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Owner Dashboard Lite</text>
  <rect x="76" y="396" width="748" height="64" rx="18" fill="#e0f2fe"/>
  <text x="104" y="436" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Prompt pack + handoff checklist</text>
  <text x="76" y="492" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#0369a1">Messy details in. Finished product out.</text>
</svg>
