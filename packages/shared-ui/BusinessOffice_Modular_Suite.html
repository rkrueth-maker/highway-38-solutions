<style>
  .bo-apps-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}.bo-apps-head h2{margin:0 0 5px}.bo-apps-head p{margin:0;color:var(--muted);max-width:760px}.bo-app-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.bo-app-card{border:1px solid var(--border);border-radius:12px;background:#fff;padding:15px;display:flex;flex-direction:column;gap:9px;min-height:220px}.bo-app-card:hover{border-color:var(--blue);box-shadow:0 8px 24px rgba(23,58,94,.1)}.bo-app-card__top{display:flex;align-items:center;gap:10px}.bo-app-icon{width:44px;height:44px;border-radius:10px;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:900;letter-spacing:.04em}.bo-app-tier{margin-left:auto;border-radius:999px;background:var(--light);color:var(--navy);padding:4px 8px;font-size:11px;font-weight:800}.bo-app-card h3{font-size:17px;margin:0}.bo-app-card p{color:var(--muted);line-height:1.45;margin:0}.bo-app-meta{font-size:12px;color:var(--muted)}.bo-app-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}.bo-app-workspace{display:grid;gap:14px}.bo-app-workspace__hero{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;border-radius:14px;padding:20px}.bo-app-workspace__hero h2{margin:5px 0}.bo-app-workspace__hero p{max-width:760px;line-height:1.5}.bo-app-tabs{display:flex;gap:8px;overflow:auto;padding:4px 0 2px;scrollbar-width:thin}.bo-app-tabs button{white-space:nowrap;background:#fff;border:1px solid var(--border);color:var(--navy)}.bo-app-tabs button.active{background:var(--navy);color:#fff;border-color:var(--navy)}.bo-app-module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.bo-app-module{border:1px solid var(--border);border-radius:10px;background:#fff;padding:14px}.bo-app-module h3{margin:0 0 7px}.bo-app-module p{color:var(--muted);min-height:42px}.bo-control-note{border-left:4px solid var(--blue);background:var(--light);padding:12px 14px;border-radius:8px;line-height:1.45}.bo-app-back{margin-bottom:10px}.bo-nav-section{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:10px 10px 5px}.bo-nav-button{display:flex!important;align-items:center;gap:9px}.bo-nav-icon{width:22px;text-align:center;font-weight:900;color:var(--blue)}.bo-standalone .bo-nav-shared{display:none!important}.bo-standalone .bo-nav-app{display:flex!important}@media(max-width:800px){.bo-apps-head{display:block}.bo-apps-head button{margin-top:10px}.bo-app-grid{grid-template-columns:1fr}.bo-app-workspace__hero{padding:16px}.bo-nav-section{display:none}.bo-app-tabs{padding-bottom:8px}}
</style>
<script>
(function(){
  'use strict';
  const originalRenderDashboard=window.renderDashboard;
  const originalOpenModule=window.openModule;
  const descriptions={requests:'New requests, qualification, source, status, and approved conversion.',customers:'Shared customer records, contacts, history, notes, and next actions.',vendors:'Vendor contacts, terms, tax records, status, and cost references.',quotes:'Quotes, proposals, options, scope, terms, pricing, approvals, and PDFs.',workOrders:'Controlled work instructions, assignments, dates, checklists, and completion.',jobs:'Jobs, stages, ownership, dates, cost, revenue, profit, and status.',purchaseOrders:'Purchase requests, approvals, ordering, receiving, and job allocation.',vendorBills:'Vendor invoices, matching, due dates, balances, and approval status.',receipts:'Receipt capture, OCR review, job allocation, and posting preparation.',expenses:'Approved operational expense records and accounting preparation.',invoices:'Invoices, deposits, due dates, delivery, balances, and aging.',payments:'Payment records and status tracking without automatic money movement.',time:'Time entries, job association, approvals, and payroll preparation.',employees:'Employee records, pay setup, employment status, and access boundaries.',payroll:'Payroll preparation, approval, provider export, and audit evidence.',contractors:'Contractor records, W-9 status, payment method, and 1099 preparation.',tax:'Preparation-only tax periods, documents, review, and owner-controlled finalization.',documents:'Camera capture, uploads, OCR-assisted review, classification, search, and proof.',accounting:'Balanced journal preparation, approval, posting controls, and reversals.',approvals:'Owner decision queue, role limits, notes, and proof history.',reports:'Financial, job, customer, and operating summaries from shared records.',setup:'Installed products, templates, roles, controls, backups, and configuration.'};
  const sharedNav=[{key:'apps',label:'Business Apps',icon:'▦',run:"renderDashboard()"},{key:'today',label:'Today',icon:'●',run:"renderTodayWorkspace()"},{key:'customers',label:'Customers',icon:'C',run:"openModule('customers')"},{key:'work',label:'Work',icon:'W',run:"openBusinessApp('work-manager')"},{key:'documents',label:'Documents',icon:'D',run:"openBusinessApp('document-center')"},{key:'money',label:'Money',icon:'$',run:"openBusinessApp('invoice-payment-tracker')"},{key:'approvals',label:'Approvals',icon:'✓',run:"openBusinessApp('approval-center')"},{key:'reports',label:'Reports',icon:'R',run:"openModule('reports')"},{key:'setup',label:'Setup',icon:'⚙',run:"openModule('setup')"}];
  let activeAppKey='';
  function apps(){return(state.bootstrap&&state.bootstrap.apps)||[];}function appByKey(key){return apps().find(app=>app.key===key);}function moduleLabel(key){const def=state.bootstrap.definitions[key];return def?(def.title||key):key;}function appUrl(app,standalone){const url=new URL(location.href);url.searchParams.set('app',app.key);if(standalone)url.searchParams.set('standalone','1');else url.searchParams.delete('standalone');return url.pathname+url.search;}function currentStandalone(){return new URLSearchParams(location.search).get('standalone')==='1';}
  function navButton(item,extra){return `<button class="bo-nav-button ${extra||''} ${state.module===item.key?'active':''}" onclick="${item.run}"><span class="bo-nav-icon">${item.icon}</span>${escapeHtml(item.label)}</button>`;}function renderFocusedNav(app){return app.modules.map(key=>`<button class="bo-nav-button bo-nav-app ${state.module===key?'active':''}" onclick="openModule('${js(key)}')"><span class="bo-nav-icon">•</span>${escapeHtml(moduleLabel(key))}</button>`).join('');}
  window.renderNav=function(){const nav=document.getElementById('nav');if(!nav||!state.bootstrap)return;const app=activeAppKey&&appByKey(activeAppKey);const shared=`<div class="bo-nav-section bo-nav-shared">Business Office</div>${sharedNav.map(item=>navButton(item,'bo-nav-shared')).join('')}`;const focused=app?`<div class="bo-nav-section">${escapeHtml(app.shortName)}</div>${renderFocusedNav(app)}`:'';nav.innerHTML=currentStandalone()&&app?`<button class="bo-nav-button bo-nav-app" onclick="openBusinessApp('${js(app.key)}')"><span class="bo-nav-icon">⌂</span>${escapeHtml(app.shortName)} Home</button>${focused}`:shared+focused;};
  window.openModule=async function(module){activeAppKey=activeAppKey||new URLSearchParams(location.search).get('app')||'';await originalOpenModule(module);renderNav();};
  window.renderTodayWorkspace=function(){activeAppKey='';state.module='today';renderNav();const rows=state.bootstrap.dashboard||[];document.getElementById('content').innerHTML=`<section class="panel"><div class="bo-apps-head"><div><h2>Today</h2><p>Immediate decisions, active work, customer follow-up, documents, and money requiring attention.</p></div><button class="primary" onclick="openBusinessApp('approval-center')">Review approvals</button></div><div class="cards">${rows.map(row=>`<div class="card"><div class="label">${escapeHtml(row['Business Area']||row['Portal Area']||'Status')}</div><div class="count">${escapeHtml(row['Live Count']||row['Count / Status']||'0')}</div><div class="detail">${escapeHtml(row['What Needs Attention']||row['Control Rule']||'')}</div></div>`).join('')}</div></section>`;};
  window.renderDashboard=function(){activeAppKey='';state.module='apps';originalRenderDashboard();renderNav();const host=document.getElementById('content');if(!host)return;const cards=apps().filter(app=>app.installed).map(app=>`<article class="bo-app-card"><div class="bo-app-card__top"><span class="bo-app-icon">${escapeHtml(app.icon)}</span><span class="bo-app-tier">${escapeHtml(app.tier)}</span></div><h3>${escapeHtml(app.shortName)}</h3><p>${escapeHtml(app.tagline)}</p><div class="bo-app-meta">${app.modules.length} focused workspace${app.modules.length===1?'':'s'} · ${app.standaloneCapable?'Standalone-capable':'Full-suite shell'}</div><div class="bo-app-actions"><button class="primary" onclick="openBusinessApp('${js(app.key)}')">Open app</button>${app.standaloneCapable?`<a class="secondary" style="display:inline-flex;align-items:center;text-decoration:none;padding:10px 15px;border-radius:8px;font-weight:700" href="${escapeHtml(appUrl(app,true))}">Standalone view</a>`:''}</div></article>`).join('');host.insertAdjacentHTML('afterbegin',`<section class="panel"><div class="bo-apps-head"><div><h2>Your Business Apps</h2><p>One Core, one customer database, one document system, and one approval system—organized into focused products. Use the shared menu for cross-business work or open an app for its focused menu.</p></div><button class="secondary" onclick="openModule('setup')">Product controls</button></div><div class="bo-app-grid">${cards}</div></section>`);};
  window.openBusinessApp=function(key){const app=appByKey(key);if(!app)return showToast('This app is not installed.',true);activeAppKey=key;state.module='app-home';renderNav();const tabs=app.modules.map(moduleKey=>`<button onclick="openModule('${js(moduleKey)}')">${escapeHtml(moduleLabel(moduleKey))}</button>`).join('');const modules=app.modules.map(moduleKey=>`<article class="bo-app-module"><h3>${escapeHtml(moduleLabel(moduleKey))}</h3><p>${escapeHtml(descriptions[moduleKey]||'Shared Business Office workspace.')}</p><button class="primary" onclick="openModule('${js(moduleKey)}')">Open workspace</button></article>`).join('');document.getElementById('content').innerHTML=`<button class="secondary bo-app-back bo-nav-shared" onclick="renderDashboard()">← All business apps</button><section class="bo-app-workspace"><div class="bo-app-workspace__hero"><span class="status">${escapeHtml(app.tier)} product</span><h2>${escapeHtml(app.name)}</h2><p>${escapeHtml(app.tagline)}</p></div><div class="bo-app-tabs" aria-label="${escapeHtml(app.shortName)} navigation">${tabs}</div><div class="bo-control-note"><strong>Controlled automation remains active.</strong> Customer sending, purchases, financial posting, payroll export, tax finalization, document release, and other external actions still require configured approval and role controls.</div><div class="bo-app-module-grid">${modules}</div></section>`;const url=new URL(location.href);url.searchParams.set('app',key);if(!currentStandalone())url.searchParams.delete('standalone');history.replaceState({},'',url.pathname+url.search);};
  function activateRequestedApp(){if(!state.bootstrap){setTimeout(activateRequestedApp,80);return;}const key=new URLSearchParams(location.search).get('app');if(key&&appByKey(key))openBusinessApp(key);else renderDashboard();}activateRequestedApp();
})();
</script>
