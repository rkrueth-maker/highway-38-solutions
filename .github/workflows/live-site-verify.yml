name: Verify live Highway 38 site

on:
  workflow_run:
    workflows:
      - Deploy Highway 38 site to GitHub Pages
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify-live-site:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      SITE_URL: https://rkrueth-maker.github.io/highway-38-solutions/index.html
      SAMPLE_LIBRARY_URL: https://rkrueth-maker.github.io/highway-38-solutions/sample-library.html
      SAMPLE_RESULTS_URL: https://rkrueth-maker.github.io/highway-38-solutions/sample-workbooks.html
      SAMPLE_LIBRARY_NOW_URL: https://rkrueth-maker.github.io/highway-38-solutions/sample-library-now.html?v=v5-ladder-final
      FORM_URL: https://docs.google.com/forms/d/e/1FAIpQLScTWaK40mNNaf1ek3w4gC3VYwvpNT9fnXlHodKeOZl7lPfCyQ/viewform

    steps:
      - name: Wait briefly for GitHub Pages propagation
        run: sleep 30

      - name: Fetch live pages with retries
        run: |
          set -e

          fetch_page () {
            LABEL="$1"
            URL="$2"
            OUT="$3"

            for i in {1..10}; do
              echo "Attempt $i: fetching $LABEL at $URL"
              STATUS=$(curl -L -s -o "$OUT" -w "%{http_code}" "$URL?v=auto-live-verify-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}")
              echo "$LABEL HTTP status: $STATUS"

              if [ "$STATUS" = "200" ]; then
                echo "$LABEL fetched successfully."
                return 0
              fi

              sleep 15
            done

            echo "Failed to fetch $LABEL with HTTP 200."
            exit 1
          }

          fetch_page "home" "$SITE_URL" live-homepage.html
          fetch_page "sample library" "$SAMPLE_LIBRARY_URL" live-sample-library.html
          fetch_page "sample results" "$SAMPLE_RESULTS_URL" live-sample-results.html

      - name: Verify required live page text
        run: |
          set -e
          REPORT=live-site-verification-report.txt

          echo "Highway 38 live-site verification" > "$REPORT"
          echo "Checked URL: $SITE_URL" >> "$REPORT"
          echo "Checked URL: $SAMPLE_LIBRARY_URL" >> "$REPORT"
          echo "Checked URL: $SAMPLE_RESULTS_URL" >> "$REPORT"
          echo "Run ID: $GITHUB_RUN_ID" >> "$REPORT"
          echo "Run attempt: $GITHUB_RUN_ATTEMPT" >> "$REPORT"
          echo "" >> "$REPORT"

          check_text () {
            FILE="$1"
            LABEL="$2"
            TEXT="$3"

            if grep -Fq -- "$TEXT" "$FILE"; then
              echo "PASS: $LABEL" | tee -a "$REPORT"
            else
              echo "FAIL: $LABEL" | tee -a "$REPORT"
              exit 1
            fi
          }

          reject_text () {
            FILE="$1"
            LABEL="$2"
            TEXT="$3"

            if grep -Fq -- "$TEXT" "$FILE"; then
              echo "FAIL: $LABEL" | tee -a "$REPORT"
              exit 1
            else
              echo "PASS: $LABEL" | tee -a "$REPORT"
            fi
          }

          check_text live-homepage.html "Problem Snapshot CTA" "Start With a Problem Snapshot"
          check_text live-homepage.html "Request form link" "$FORM_URL"
          check_text live-homepage.html "Pricing clarity" '$79 intro / $99 normal'
          check_text live-homepage.html "Featured service" "Messy Details In → Finished Document Out"
          check_text live-homepage.html "Under-250 section" 'Under-$250 draft-ready products'
          check_text live-homepage.html "Basic Layout Snapshot" "Basic Layout Snapshot"
          check_text live-homepage.html "Project Packet Lite" "Project Packet Lite"
          check_text live-homepage.html "Business Cleanup Starter" "Business Cleanup Starter"
          check_text live-homepage.html "Cleanup Rescue Pack" "Cleanup Rescue Pack"
          check_text live-homepage.html "Workflow Opportunity Snapshot" "Workflow Opportunity Snapshot"
          check_text live-homepage.html "Approval gate" "Rick Review Required / Owner Approval Required"
          check_text live-homepage.html "No instant delivery promise" "No instant-delivery promise"
          check_text live-homepage.html "Safe sample label" "Sample output — not customer work"
          reject_text live-homepage.html "No obvious GitHub Pages 404 on home" "404: File not found"

          check_text live-sample-library.html "Sample library safe label" "Sample output — not customer work"
          check_text live-sample-library.html "Sample library hypothetical label" "Hypothetical example"
          check_text live-sample-library.html "Sample library staged label" "Staged demo using sample information"
          check_text live-sample-library.html "Sample library Basic Layout Snapshot" "Basic Layout Snapshot"
          check_text live-sample-library.html "Sample library Project Packet Lite" "Project Packet Lite"
          check_text live-sample-library.html "Sample library Business Cleanup Starter" "Business Cleanup Starter"
          check_text live-sample-library.html "Sample library Cleanup Rescue Pack" "Cleanup Rescue Pack"
          check_text live-sample-library.html "Sample library Workflow Opportunity Snapshot" "Workflow Opportunity Snapshot"
          reject_text live-sample-library.html "Removed sample card: Shop / CNC Concept" "Shop / CNC Concept"
          reject_text live-sample-library.html "Removed sample card: Digital Setup" "Digital Setup"
          reject_text live-sample-library.html "Removed sample card: Custom Work Build" "Custom Work Build"
          reject_text live-sample-library.html "Old exact Project Packet heading removed" "<h2>Project Packet</h2>"
          reject_text live-sample-library.html "Old exact Business Cleanup heading removed" "<h2>Business Cleanup</h2>"
          reject_text live-sample-library.html "Old exact Cleanup Rescue heading removed" "<h2>Cleanup Rescue</h2>"
          reject_text live-sample-library.html "Old exact AI Workflow heading removed" "<h2>AI Workflow</h2>"
          reject_text live-sample-library.html "No obvious GitHub Pages 404 on sample library" "404: File not found"

          check_text live-sample-results.html "Sample results visible directly" "Product samples and results show directly on the page."
          check_text live-sample-results.html "Sample results approval language" "Rick Review Required / Owner Approval Required"
          check_text live-sample-results.html "Sample results Basic Layout Snapshot" "Basic Layout Snapshot"
          check_text live-sample-results.html "Sample results Workflow Opportunity Snapshot" "Workflow Opportunity Snapshot"
          reject_text live-sample-results.html "Removed result: Shop / CNC Concept" "Shop / CNC Concept"
          reject_text live-sample-results.html "Removed result: Digital Setup" "Digital Setup"
          reject_text live-sample-results.html "Removed result: Custom Work Build" "Custom Work Build"
          reject_text live-sample-results.html "Old exact AI Workflow heading removed from results" "<span>AI Workflow</span>"
          reject_text live-sample-results.html "No obvious GitHub Pages 404 on sample results" "404: File not found"

          echo "" >> "$REPORT"
          echo "Live verification completed successfully." >> "$REPORT"

      - name: Add pass/fail summary
        if: always()
        run: |
          echo "## Highway 38 live-site verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f live-site-verification-report.txt ]; then
            cat live-site-verification-report.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Verification report was not created." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: highway-38-live-site-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            live-site-verification-report.txt
            live-homepage.html
            live-sample-library.html
            live-sample-results.html
