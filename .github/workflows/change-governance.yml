name: Verify Website and Web App Change Governance

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'docs/architecture/**'
      - 'scripts/verify-change-governance.js'
      - 'scripts/config/approved-public-assets.json'
      - 'scripts/config/approved-public-image-placements.json'
      - 'scripts/config/public-website-routes.json'
      - 'assets/js/h38-site-v2.js'
      - 'assets/css/h38-site-v2.css'
      - 'apps-script/business-office/BusinessOffice_ModuleContract.gs'
      - 'apps-script/business-office/BusinessOffice_ActionContract.gs'
      - 'apps-script/core-engine/owner-portal-next/Portal_Module_Registry.js'
      - '.github/workflows/pages.yml'
      - '.github/workflows/deploy-owner-portal-hard-rule-production.yml'
      - '.github/workflows/change-governance.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: highway-38-change-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify repository-wide website and web app governance
        run: node scripts/verify-change-governance.js

      - name: Upload governance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: change-governance-${{ github.run_id }}
          path: artifacts/change-governance/
          if-no-files-found: warn
          retention-days: 90
