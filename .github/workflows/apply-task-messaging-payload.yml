name: Apply task messaging payload

# Temporary branch transfer marker; removed by the PR expansion workflow.
on:
  push:
    branches:
      - agent/text-messaging-task-assignment

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: agent/text-messaging-task-assignment
          fetch-depth: 0

      - name: Verify and expand payload
        shell: bash
        run: |
          set -euo pipefail
          test -f .h38-payload/part05
          cat .h38-payload/part00 .h38-payload/part01 .h38-payload/part02 .h38-payload/part03 .h38-payload/part04 .h38-payload/part05 | base64 --decode > /tmp/h38-task-messaging.tgz
          echo '7a582eef381e478e5783b12e96efea554416430613dcaf4a618dc902cdbbc128  /tmp/h38-task-messaging.tgz' | sha256sum --check --strict
          tar -xzf /tmp/h38-task-messaging.tgz -C .
          rm -rf .h38-payload
          rm -f .github/workflows/apply-task-messaging-payload.yml

      - name: Verify expanded source
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-task-messaging.js
          bash -n scripts/deploy-unified-owner-portal-web.sh

      - name: Commit expanded source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Implement secure task assignment and messaging controls'
          git push origin HEAD:agent/text-messaging-task-assignment
