name: Highway 38 Business Office Source Verification

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps-script/business-office/**'
      - 'apps-script/business-office-sync/**'
      - 'business-packs/highway38/**'
      - 'business-packs/template-business/**'
      - 'scripts/assemble-business-office-app.sh'
      - 'scripts/verify-business-office.js'
      - 'scripts/verify-business-office-separation.js'
      - 'scripts/verify-business-office-clean-install.js'
      - 'package.json'
      - '.github/workflows/business-office.yml'
  push:
    branches: [main, business-office-separation]
    paths:
      - 'apps-script/business-office/**'
      - 'apps-script/business-office-sync/**'
      - 'business-packs/highway38/**'
      - 'business-packs/template-business/**'
      - 'scripts/assemble-business-office-app.sh'
      - 'scripts/verify-business-office.js'
      - 'scripts/verify-business-office-separation.js'
      - 'scripts/verify-business-office-clean-install.js'
      - 'package.json'
      - '.github/workflows/business-office.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-business-office:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Verify reusable Business Office core and Highway 38 pack
        run: npm run test:business-office
      - name: Verify separation and clean-install plan
        run: npm run test:business-office-separation
      - name: Verify one-pack assembly for Highway 38 and neutral template
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/business-office-source/highway38 artifacts/business-office-source/template
          bash scripts/assemble-business-office-app.sh artifacts/business-office-source/highway38 business-packs/highway38/apps-script/BusinessOffice_Pack.gs "$GITHUB_WORKSPACE"
          bash scripts/assemble-business-office-app.sh artifacts/business-office-source/template business-packs/template-business/apps-script/BusinessOffice_Pack.gs "$GITHUB_WORKSPACE"
          grep -F "packId:'highway38'" artifacts/business-office-source/highway38/BusinessOffice_00_Pack.gs
          grep -F "packId:'template-business'" artifacts/business-office-source/template/BusinessOffice_00_Pack.gs
          test -e artifacts/business-office-source/highway38/BusinessOffice_Highway38Acceptance.gs
          test ! -e artifacts/business-office-source/template/BusinessOffice_Highway38Acceptance.gs
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-office-source-verification-${{ github.run_id }}
          path: |
            artifacts/business-office/
            artifacts/business-office-separation/
            artifacts/business-office-clean-install/
            artifacts/business-office-source/
          if-no-files-found: error
          retention-days: 90

# Production deployment is intentionally not performed here. The only supported
# Highway 38 deployment path is Business Office Production V2, which updates the
# existing configured installation and records full rollback/live evidence.
