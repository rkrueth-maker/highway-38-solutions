name: Highway 38 Business Office Verification

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps-script/business-office/**'
      - 'apps-script/integrated-backend/**'
      - 'apps-script/core-engine/owner-portal-next/**'
      - 'business-packs/highway38/**'
      - 'docs/business-office/**'
      - 'scripts/assemble-business-office-app.sh'
      - 'scripts/deploy-business-office-existing-production.sh'
      - 'scripts/verify-business-office.js'
      - 'scripts/verify-business-office-existing-deployment.js'
      - 'scripts/verify-owner-business-office-ux.js'
      - 'scripts/verify-unified-app-ux-complete.js'
      - 'package.json'
      - '.github/workflows/business-office.yml'
  push:
    branches: [main]
    paths:
      - 'apps-script/business-office/**'
      - 'apps-script/integrated-backend/**'
      - 'apps-script/core-engine/owner-portal-next/**'
      - 'business-packs/highway38/**'
      - 'docs/business-office/**'
      - 'scripts/assemble-business-office-app.sh'
      - 'scripts/deploy-business-office-existing-production.sh'
      - 'scripts/verify-business-office.js'
      - 'scripts/verify-business-office-existing-deployment.js'
      - 'scripts/verify-owner-business-office-ux.js'
      - 'scripts/verify-unified-app-ux-complete.js'
      - 'package.json'
      - '.github/workflows/business-office.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: highway-38-business-office-verification
  cancel-in-progress: false

jobs:
  verify-business-office:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact source
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify approved UX scan contract
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/ux-scan
          node scripts/verify-one-shot-ux.js | tee artifacts/ux-scan/verification.json
      - name: Verify Business Office source
        run: node scripts/verify-business-office.js
      - name: Verify Business Office runtime helpers
        run: node scripts/verify-business-office-runtime-helpers.js
      - name: Verify unified client routing runtime
        run: node scripts/verify-unified-client-routing-runtime.js
      - name: Verify task messaging
        run: node scripts/verify-task-messaging.js
      - name: Verify task messaging hardening
        run: node scripts/verify-task-messaging-hardening.js
      - name: Verify Supabase Customer Portal
        run: node scripts/verify-customer-portal-supabase.js
      - name: Verify complete unified application UX
        run: node scripts/verify-unified-app-ux-complete.js
      - name: Verify Owner and Business Office UX compatibility
        run: node scripts/verify-owner-business-office-ux.js
      - name: Verify accepted existing deployment contract
        run: node scripts/verify-business-office-existing-deployment.js
      - name: Confirm automatic production authority is unified-only
        run: |
          echo 'PASS — push and pull-request runs verify only.'
          echo 'Automatic production deployment belongs exclusively to Deploy Unified Owner Portal.'
      - name: Upload source verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-office-verification-${{ github.run_id }}
          path: |
            artifacts/ux-scan/verification.json
            artifacts/business-office/verification.json
            artifacts/unified-app-ux/verification.json
          if-no-files-found: warn
          retention-days: 90

  manual-existing-deployment-compatibility:
    if: github.event_name == 'workflow_dispatch'
    needs: verify-business-office
    runs-on: ubuntu-latest
    env:
      H38_BO_EXISTING_DEPLOYMENT_ID: AKfycbyf9ivM04iKqg9QqM1PgRQgD4Imf6VY_mMpCLLsU6lRbGYsprTEEzlwEE93pRgqPzCcmg
      H38_BO_PACK_SOURCE: ${{ github.workspace }}/business-packs/highway38/apps-script/BusinessOffice_Pack.gs
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
      CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
      CLASP_CREDENTIALS_B64: ${{ secrets.CLASP_CREDENTIALS_B64 }}
      GOOGLE_CLASPRC_JSON: ${{ secrets.GOOGLE_CLASPRC_JSON }}
      GOOGLE_CLASPRC_JSON_B64: ${{ secrets.GOOGLE_CLASPRC_JSON_B64 }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out current main source
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install deployment and browser tools
        run: |
          npm install --global @google/clasp@3.1.0
          npm install
          npx playwright install --with-deps chromium
      - name: Load encrypted Google credential
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          if [[ -n "${CLASPRC_JSON}" ]]; then printf '%s' "${CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASPRC_JSON_B64}" ]]; then printf '%s' "${CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS}" ]]; then printf '%s' "${CLASP_CREDENTIALS}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS_B64}" ]]; then printf '%s' "${CLASP_CREDENTIALS_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON_B64}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          else echo 'HOLD — no encrypted clasp credential is configured.'; exit 78; fi
          chmod 600 "$HOME/.clasprc.json"
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME+'/.clasprc.json','utf8')); console.log('Encrypted clasp credential loaded.')"
      - name: Manually update accepted Business Office compatibility deployment
        shell: bash
        run: bash scripts/deploy-business-office-existing-production.sh
      - name: Upload live deployment and rollback evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-office-existing-production-${{ github.run_id }}
          path: artifacts/business-office-existing-production/
          if-no-files-found: warn
          retention-days: 90
      - name: Record manual compatibility update
        if: success()
        shell: bash
        run: |
          OUT="artifacts/business-office-existing-production"
          SCRIPT_ID="$(cat "$OUT/script-id.txt")"
          DEPLOYMENT_ID="$(cat "$OUT/deployment-id.txt")"
          PREVIOUS_VERSION="$(cat "$OUT/previous-version.txt")"
          NEW_VERSION="$(cat "$OUT/new-version.txt")"
          URL="$(cat "$OUT/web-app-url.txt")"
          BODY="Manual Business Office compatibility deployment updated in place from commit ${GITHUB_SHA}. Script ID: ${SCRIPT_ID}. Deployment ID: ${DEPLOYMENT_ID}. Version advanced from ${PREVIOUS_VERSION} to ${NEW_VERSION}. No new project or deployment was created; external actions remain disabled. URL: ${URL}. Evidence: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue comment 85 --repo "$GITHUB_REPOSITORY" --body "$BODY"
