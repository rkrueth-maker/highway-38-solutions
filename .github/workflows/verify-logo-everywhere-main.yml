name: Verify Logo Everywhere Main

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-logo-everywhere-main.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Diagnose current and legacy pages
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null
          python3 -m http.server 4173 >/tmp/http.log 2>&1 &
          pid=$!
          trap 'kill $pid || true' EXIT
          sleep 2
          node - <<'NODE'
          const { chromium }=require('playwright');
          const fs=require('fs');
          (async()=>{
            const browser=await chromium.launch({headless:true});
            const checks=[
              ['index.html',true],['services.html',true],['sample-library.html',false],
              ['quote-sheet-builder.html',false],['real-proof-lab.html',false],['404.html',false]
            ];
            const results=[];
            let failures=0;
            for(const [name,expectMenu] of checks){
              const page=await browser.newPage({viewport:{width:390,height:844}});
              try{
                await page.goto('http://127.0.0.1:4173/'+name,{waitUntil:'domcontentloaded',timeout:15000});
                await page.waitForSelector('img.brand-logo',{timeout:10000});
                const logo=page.locator('img.brand-logo').first();
                const src=await logo.getAttribute('src');
                const alt=await logo.getAttribute('alt');
                const size=await logo.evaluate(el=>({w:el.getBoundingClientRect().width,h:el.getBoundingClientRect().height}));
                const text=(await page.locator('.brand-text').first().textContent()||'').replace(/\s+/g,' ');
                const issues=[];
                if(!src||!src.includes('assets/highway38-logo.png?v=20260713-logo3'))issues.push('stale src '+src);
                if(alt!=='Highway 38 Solutions')issues.push('alt '+alt);
                if(size.h<29||size.h>37)issues.push('height '+size.h);
                if(!/Highway\s*38\s*Solutions/i.test(text))issues.push('fallback text missing');
                const menu=page.locator('.eco-menu');
                if(expectMenu&&await menu.count()){
                  await menu.click();
                  if(await menu.getAttribute('aria-expanded')!=='true')issues.push('menu aria-expanded');
                  if(!await page.locator('.eco-nav__links').first().evaluate(el=>el.classList.contains('is-open')))issues.push('menu is-open');
                }
                if(issues.length){failures++;results.push(`${name}: FAIL — ${issues.join('; ')}`);}else{results.push(`${name}: PASS — ${size.w.toFixed(1)}×${size.h.toFixed(1)}`);}
              }catch(err){failures++;results.push(`${name}: FAIL — ${err.message}`);}
              await page.close();
            }
            await browser.close();
            fs.writeFileSync('/tmp/browser.txt',results.join('\n'));
            fs.writeFileSync('/tmp/failure-count.txt',String(failures));
          })().catch(err=>{fs.writeFileSync('/tmp/browser.txt','HARNESS FAIL — '+err.message);fs.writeFileSync('/tmp/failure-count.txt','99');});
          NODE
      - name: Record diagnostic on main
        shell: bash
        run: |
          set -euo pipefail
          {
            echo
            echo '## Post-publication browser diagnostic'
            sed 's/^/- /' /tmp/browser.txt
            echo "- Browser failure count: $(cat /tmp/failure-count.txt)"
            echo '- Existing Lighthouse image-alt verification remains recorded in `PUBLIC_NAV_LOGO_2026-07-13.md`.'
          } >> docs/verification/LOGO_EVERYWHERE_2026-07-13.md
          rm .github/workflows/verify-logo-everywhere-main.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record logo-everywhere browser diagnostic'
          git push origin main
