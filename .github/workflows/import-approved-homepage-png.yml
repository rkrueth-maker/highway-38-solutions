name: Import approved homepage PNG

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/import-approved-homepage-png.yml'

permissions:
  contents: write

jobs:
  import-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and verify exact approved PNG
        run: |
          set -euo pipefail
          mkdir -p assets
          curl -fL --retry 3 --retry-delay 2 'https://at.adobe.com/GFN7ETzMlbJUzYRH' -o assets/approved-homepage-mockup.png
          echo '817c576a2debdcca3e9cf43aaefae5bd5533db226347bcd891d8d3982ad4a0d8  assets/approved-homepage-mockup.png' | sha256sum -c -
          file assets/approved-homepage-mockup.png

      - name: Commit verified image and remove temporary importer
        run: |
          set -euo pipefail
          rm -f assets/approved-homepage-mockup.svg
          rm -f .github/workflows/import-approved-homepage-png.yml
          git config user.name 'Highway 38 Build Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Install exact approved homepage PNG'
          git push origin HEAD:main
