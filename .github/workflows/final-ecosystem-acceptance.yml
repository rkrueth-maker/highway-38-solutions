name: Final Ecosystem Acceptance Verify

on:
  pull_request:
    branches:
      - main
    paths:
      - 'launch-control/final-acceptance-package.json'
      - 'launch-control/FINAL_ACCEPTANCE.md'
      - 'final-acceptance.html'
      - 'ecosystem-status.html'
      - 'sitemap.xml'
      - 'scripts/verify-final-ecosystem-acceptance-v2.js'
      - '.github/workflows/final-ecosystem-acceptance.yml'
      - 'core-engine/**'
      - 'proof-system/**'
  push:
    branches:
      - main
    paths:
      - 'launch-control/final-acceptance-package.json'
      - 'launch-control/FINAL_ACCEPTANCE.md'
      - 'final-acceptance.html'
      - 'ecosystem-status.html'
      - 'sitemap.xml'
      - 'scripts/verify-final-ecosystem-acceptance-v2.js'
      - '.github/workflows/final-ecosystem-acceptance.yml'
      - 'core-engine/**'
      - 'proof-system/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify all workstreams, component decisions, blockers, privacy, rollback, and integrated tests
        run: node scripts/verify-final-ecosystem-acceptance-v2.js
      - name: Upload final acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-ecosystem-acceptance-${{ github.run_id }}
          path: |
            launch-control/evidence/final-ecosystem-acceptance-verification.json
            launch-control/evidence/final-ecosystem-acceptance-package.json
            launch-control/evidence/complete-ecosystem-verification.json
            launch-control/evidence/public-ecosystem-tools.json
            launch-control/evidence/business-os-productization.json
            launch-control/evidence/business-concept-builder-verification.json
            launch-control/evidence/proof-evidence-system-verification.json
            launch-control/evidence/revenue-operations-core-verification.json
            launch-control/evidence/revenue-growth-activation-verification.json
          if-no-files-found: warn
          retention-days: 90
