name: Apply Navigation Cache Speed Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-navigation-cache-speed-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/navigation-and-module-cache-speed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Extract and run the prepared source patch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p navigation-cache-diagnostic
          python3 - <<'PY'
          from pathlib import Path
          import re
          source=Path('.github/workflows/apply-navigation-cache-speed.yml').read_text(encoding='utf-8')
          match=re.search(r"python3 - <<'PY'\n(.*?)\n          PY",source,re.S)
          if not match:
              raise SystemExit('Prepared navigation-cache patch block was not found.')
          lines=match.group(1).splitlines()
          code='\n'.join(line[10:] if line.startswith('          ') else line for line in lines)+'\n'
          Path('/tmp/apply-navigation-cache-speed.py').write_text(code,encoding='utf-8')
          PY
          set +e
          python3 /tmp/apply-navigation-cache-speed.py > navigation-cache-diagnostic/patch.log 2>&1
          status=$?
          set -e
          echo "$status" > navigation-cache-diagnostic/patch.exit
      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: navigation-cache-patch-${{ github.run_id }}
          path: navigation-cache-diagnostic
          retention-days: 7
      - name: Verify completed build
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat navigation-cache-diagnostic/patch.exit)" = "0" || { cat navigation-cache-diagnostic/patch.log; exit 1; }
          rm -f .github/workflows/apply-navigation-cache-speed.yml
          rm -f .github/workflows/diagnose-pr288.yml
          node scripts/verify-change-governance.js >/tmp/governance.log
          node scripts/verify-navigation-cache-performance.js
          node scripts/verify-unified-app-architecture.js >/tmp/unified-architecture.log
          node scripts/verify-owner-portal-next.js >/tmp/owner-portal.log
          node scripts/verify-business-office.js >/tmp/business-office.log
          node scripts/verify-unified-client-routing-runtime.js >/tmp/routing.log
          node scripts/verify-task-messaging.js >/tmp/task-messaging.log
          node scripts/verify-task-messaging-hardening.js >/tmp/task-messaging-hardening.log
          node scripts/verify-unified-app-ux-complete.js >/tmp/unified-ux.log
          git diff --check
      - name: Commit completed build
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Speed up navigation and correct workspace grouping'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
