name: Raster Sample Proof Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-raster-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: JavaScript syntax
        run: node --check sample-raster-images.js

      - name: Install image review dependency
        run: python3 -m pip install --quiet Pillow

      - name: Verify product proof files
        shell: bash
        run: |
          set -euo pipefail
          files=(
            assets/rick-review-problem-snapshot-v1.png
            assets/rick-review-basic-layout-v1.png
            assets/rick-review-project-packet-v1.png
            assets/rick-review-shop-flow-v1.png
            assets/rick-review-business-cleanup-v1.png
            assets/rick-review-cleanup-rescue-v1.png
            assets/rick-review-workflow-opportunity-v1.png
            assets/product-proof/digital-workflow-build.png
            assets/product-proof/cleanup-implementation.png
            assets/product-proof/automation-opportunity-snapshot.png
            assets/product-proof/shop-bottleneck-roi-audit.png
            assets/product-proof/automation-vendor-quote-pack.png
            assets/product-proof/fixture-jig-concept-review.png
            assets/product-proof/vision-inspection-concept-review.png
            assets/product-proof/robot-tending-concept-pack.png
          )
          for file in "${files[@]}"; do
            test -s "$file"
            file "$file" | grep -q 'PNG image data'
          done

      - name: Start local site
        run: |
          python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/h38-raster-server.log 2>&1 &
          echo $! > /tmp/h38-raster-server.pid
          sleep 2

      - name: Verify rendered raster proof
        shell: bash
        run: |
          set -euo pipefail
          chrome="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser)"
          mkdir -p raster-proof-artifacts
          "$chrome" --headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage \
            --virtual-time-budget=5000 --dump-dom \
            http://127.0.0.1:8000/sample-library-now.html \
            > raster-proof-artifacts/rendered-samples.html

          raster_count="$(grep -o '<figure class=\"proof-raster' raster-proof-artifacts/rendered-samples.html | wc -l | tr -d ' ')"
          product_image_count="$(grep -o 'data-product-proof=\"H38-P0[0-1][0-9]\"' raster-proof-artifacts/rendered-samples.html | wc -l | tr -d ' ')"
          generated_count="$(grep -o 'assets/product-proof/' raster-proof-artifacts/rendered-samples.html | wc -l | tr -d ' ')"
          reviewed_count="$(grep -o 'assets/rick-review-' raster-proof-artifacts/rendered-samples.html | wc -l | tr -d ' ')"
          placeholder_count="$({ grep -o '<svg viewBox=\"0 0 760 260\"' raster-proof-artifacts/rendered-samples.html || true; } | wc -l | tr -d ' ')"

          test "$raster_count" = "15"
          test "$product_image_count" = "15"
          test "$generated_count" = "8"
          test "$reviewed_count" = "7"
          test "$placeholder_count" = "0"

          printf 'Raster samples: %s\nDistinct product image records: %s\nGenerated deliverable PNGs: %s\nRick-review PNGs: %s\nVisible placeholder SVGs: %s\n' \
            "$raster_count" "$product_image_count" "$generated_count" "$reviewed_count" "$placeholder_count" \
            > raster-proof-artifacts/raster-proof-report.txt

      - name: Build exact-pixel contact sheets
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont, ImageStat

          items = [
              ('H38-P001', 'Problem Snapshot', Path('assets/rick-review-problem-snapshot-v1.png')),
              ('H38-P002', 'Basic Layout Snapshot', Path('assets/rick-review-basic-layout-v1.png')),
              ('H38-P003', 'Project Planning Packet', Path('assets/rick-review-project-packet-v1.png')),
              ('H38-P004', 'Shop Flow Review', Path('assets/rick-review-shop-flow-v1.png')),
              ('H38-P005', 'Business Workflow Starter', Path('assets/rick-review-business-cleanup-v1.png')),
              ('H38-P006', 'Cleanup Rescue Plan', Path('assets/rick-review-cleanup-rescue-v1.png')),
              ('H38-P007', 'Workflow Opportunity Snapshot', Path('assets/rick-review-workflow-opportunity-v1.png')),
              ('H38-P008', 'Digital Workflow Build', Path('assets/product-proof/digital-workflow-build.png')),
              ('H38-P009', 'Cleanup Implementation', Path('assets/product-proof/cleanup-implementation.png')),
              ('H38-P010', 'Automation Opportunity Snapshot', Path('assets/product-proof/automation-opportunity-snapshot.png')),
              ('H38-P011', 'Shop Bottleneck and ROI Audit', Path('assets/product-proof/shop-bottleneck-roi-audit.png')),
              ('H38-P012', 'Automation Vendor Quote Pack', Path('assets/product-proof/automation-vendor-quote-pack.png')),
              ('H38-P013', 'Fixture/Jig Concept Review', Path('assets/product-proof/fixture-jig-concept-review.png')),
              ('H38-P014', 'Vision/Inspection Concept Review', Path('assets/product-proof/vision-inspection-concept-review.png')),
              ('H38-P015', 'Robot Tending Concept Pack', Path('assets/product-proof/robot-tending-concept-pack.png')),
          ]

          out = Path('raster-proof-artifacts')
          out.mkdir(exist_ok=True)
          font = ImageFont.load_default()

          def contact_sheet(columns: int, cell_w: int, cell_h: int, path: Path):
              rows = (len(items) + columns - 1) // columns
              canvas = Image.new('RGB', (columns * cell_w, rows * cell_h), '#ece6dc')
              draw = ImageDraw.Draw(canvas)
              for i, (pid, title, source) in enumerate(items):
                  x = (i % columns) * cell_w
                  y = (i // columns) * cell_h
                  draw.rounded_rectangle((x + 10, y + 10, x + cell_w - 10, y + cell_h - 10), 18, fill='white', outline='#d7cec2', width=2)
                  draw.text((x + 24, y + 22), f'{pid}  {title}', font=font, fill='#17242a')
                  image = Image.open(source).convert('RGB')
                  # Fail on images that are effectively one flat color.
                  stat = ImageStat.Stat(image.resize((80, 50)))
                  if max(stat.var) < 8:
                      raise SystemExit(f'Image appears visually blank: {source}')
                  box = (x + 24, y + 48, x + cell_w - 24, y + cell_h - 24)
                  max_w = box[2] - box[0]
                  max_h = box[3] - box[1]
                  image.thumbnail((max_w, max_h), Image.Resampling.LANCZOS)
                  px = box[0] + (max_w - image.width) // 2
                  py = box[1] + (max_h - image.height) // 2
                  canvas.paste(image, (px, py))
              canvas.save(path, optimize=True)

          contact_sheet(3, 520, 390, out / 'all-product-proof-pngs.png')
          contact_sheet(1, 760, 520, out / 'mobile-product-proof-pngs.png')
          PY

      - name: Upload raster proof report and contact sheets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raster-sample-proof
          path: raster-proof-artifacts
