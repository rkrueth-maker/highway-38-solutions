name: Deploy Highway 38 Business Office

on:
  push:
    branches: [main]
    paths:
      - 'apps-script/business-office/**'
      - 'apps-script/business-office-sync/**'
      - 'scripts/verify-business-office.js'
      - 'scripts/verify-business-office-live.js'
      - '.github/workflows/deploy-business-office.yml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: highway-38-business-office-production
  cancel-in-progress: false

env:
  H38_BO_SPREADSHEET_ID: 1kDDKWx9jfObWm8EmaXm5weDCTJbQ8RTf7-sq4RDEYlA
  H38_BO_ROOT_FOLDER_ID: 1kDgnuxRLaJTZoO01O1U1bbeDNNAgdaI6
  H38_BO_DOCUMENT_FOLDER_ID: 1Vq8UjAzxW4hIKYoodkf1hfqkATWiXjVC
  H38_BO_PDF_FOLDER_ID: 11ak4QZ7ag8daYO1_uO6NTCVXIO7Kh6j3
  H38_BO_EXPORT_FOLDER_ID: 1Jn2vW5gwJcaNX0BH1em-v0M9Q3-SwiJQ
  H38_BO_BACKUP_FOLDER_ID: 1rjl_m8u1YlaXSo29m46apa9dQD1zeucs
  H38_BO_OWNER_EMAIL: rkrueth@gmail.com
  H38_BO_BUSINESS_ID: H38
  H38_BACKEND_SPREADSHEET_ID: 1P5_7iUVf-yY9ffUEM7Iy5v10VsjE2LZdX7vNMcoQ1Uo
  GH_TOKEN: ${{ github.token }}

jobs:
  deploy-and-live-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify source before deployment
        run: npm run test:business-office

      - name: Install deployment and fixture dependencies
        run: |
          npm install --global @google/clasp@3.1.0
          npm install
          npx playwright install --with-deps chromium
          python3 -m pip install --user pillow reportlab

      - name: Load encrypted clasp credential
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
          CLASP_CREDENTIALS_B64: ${{ secrets.CLASP_CREDENTIALS_B64 }}
          GOOGLE_CLASPRC_JSON: ${{ secrets.GOOGLE_CLASPRC_JSON }}
          GOOGLE_CLASPRC_JSON_B64: ${{ secrets.GOOGLE_CLASPRC_JSON_B64 }}
          CLASP_AUTH_JSON: ${{ secrets.CLASP_AUTH_JSON }}
          CLASP_AUTH_JSON_B64: ${{ secrets.CLASP_AUTH_JSON_B64 }}
          CLASPRC: ${{ secrets.CLASPRC }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          if [[ -n "${CLASPRC_JSON}" ]]; then printf '%s' "${CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASPRC_JSON_B64}" ]]; then printf '%s' "${CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS}" ]]; then printf '%s' "${CLASP_CREDENTIALS}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS_B64}" ]]; then printf '%s' "${CLASP_CREDENTIALS_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON_B64}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_AUTH_JSON}" ]]; then printf '%s' "${CLASP_AUTH_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_AUTH_JSON_B64}" ]]; then printf '%s' "${CLASP_AUTH_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${CLASPRC}" ]]; then printf '%s' "${CLASPRC}" > "$HOME/.clasprc.json"
          else echo 'DEPLOYMENT HOLD — no encrypted clasp credential is configured.'; exit 78; fi
          chmod 600 "$HOME/.clasprc.json"
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME+'/.clasprc.json','utf8')); console.log('clasp credential loaded')"
          clasp show-authorized-user --json

      - name: Generate real receipt, phone-camera work-order, and vendor-invoice fixtures
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/business-office-live/fixtures
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont
          from reportlab.pdfgen import canvas
          from reportlab.lib.pagesizes import letter
          out=Path('artifacts/business-office-live/fixtures')
          def image(name, lines):
              im=Image.new('RGB',(1400,1800),'white'); d=ImageDraw.Draw(im); font=ImageFont.load_default(size=32)
              y=90
              for line in lines:
                  d.text((90,y),line,fill='black',font=font); y+=85
              im.save(out/name,'PNG')
          image('receipt-camera.png',['SAMPLE SUPPLY VENDOR','2026-07-14','Receipt R-LIVE-001','Materials 200.00','Tax 14.00','Total 214.00','Business Card'])
          image('work-order-camera.png',['NORTHWOODS SAMPLE CUSTOMER','Work Order WO-LIVE-001','Prepare sample project plan','Assigned: Sample Employee','Labor 8 hours','Materials 1 lot','Due Date 2026-07-22','Status Open'])
          c=canvas.Canvas(str(out/'vendor-invoice.pdf'),pagesize=letter)
          c.setFont('Helvetica-Bold',16); c.drawString(72,730,'SAMPLE SUPPLY VENDOR')
          c.setFont('Helvetica',12)
          for y,text in [(700,'Vendor Invoice B-LIVE-001'),(680,'Date 2026-07-14'),(660,'Due Date 2026-08-13'),(640,'Terms Net 30'),(620,'PO PO-2026-0001'),(600,'Sample materials 200.00'),(580,'Tax 14.00'),(560,'Total 214.00')]: c.drawString(72,y,text)
          c.save()
          PY
          file artifacts/business-office-live/fixtures/*

      - name: Create and deploy separate private Business Office Apps Script project
        shell: bash
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/h38-business-office-app"
          EVIDENCE="$GITHUB_WORKSPACE/artifacts/business-office-live"
          mkdir -p "$APP" "$EVIDENCE"
          cd "$APP"
          clasp create-script --type webapp --title "Highway 38 Business Office" --rootDir . | tee "$EVIDENCE/create-app-project.txt"
          cp "$GITHUB_WORKSPACE"/apps-script/business-office/*.gs .
          cp "$GITHUB_WORKSPACE"/apps-script/business-office/*.html .
          cp "$GITHUB_WORKSPACE"/apps-script/business-office/appsscript.json .
          APP_SCRIPT_ID="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('.clasp.json','utf8')).scriptId)")"
          test -n "$APP_SCRIPT_ID"
          printf '%s' "$APP_SCRIPT_ID" > "$EVIDENCE/app-script-id.txt"
          clasp push --force | tee "$EVIDENCE/app-push.txt"
          VERSION_OUTPUT="$(clasp create-version "Highway 38 Business Office ${GITHUB_SHA}")"
          printf '%s\n' "$VERSION_OUTPUT" | tee "$EVIDENCE/app-version.txt"
          DEPLOY_OUTPUT="$(clasp create-deployment --description "Highway 38 Business Office ${GITHUB_SHA}")"
          printf '%s\n' "$DEPLOY_OUTPUT" | tee "$EVIDENCE/app-deployment.txt"
          clasp list-deployments | tee "$EVIDENCE/app-deployments.txt"
          APP_DEPLOYMENT_ID="$(grep -Eo 'AKfy[[:alnum:]_-]+' "$EVIDENCE/app-deployment.txt" "$EVIDENCE/app-deployments.txt" | head -n1 | sed 's/.*://')"
          test -n "$APP_DEPLOYMENT_ID"
          printf '%s' "$APP_DEPLOYMENT_ID" > "$EVIDENCE/app-deployment-id.txt"
          printf 'https://script.google.com/macros/s/%s/exec' "$APP_DEPLOYMENT_ID" > "$EVIDENCE/web-app-url.txt"

      - name: Bootstrap Business Office and run self-test
        shell: bash
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/h38-business-office-app"
          EVIDENCE="$GITHUB_WORKSPACE/artifacts/business-office-live"
          PARAMS="$(node - <<'NODE'
          const cfg={
            ownerEmail:process.env.H38_BO_OWNER_EMAIL,
            H38_BUSINESS_OFFICE_SPREADSHEET_ID:process.env.H38_BO_SPREADSHEET_ID,
            H38_BUSINESS_OFFICE_DEFAULT_BUSINESS_ID:process.env.H38_BO_BUSINESS_ID,
            H38_BUSINESS_OFFICE_ROOT_FOLDER_ID:process.env.H38_BO_ROOT_FOLDER_ID,
            H38_BUSINESS_OFFICE_DOCUMENT_FOLDER_ID:process.env.H38_BO_DOCUMENT_FOLDER_ID,
            H38_BUSINESS_OFFICE_PDF_FOLDER_ID:process.env.H38_BO_PDF_FOLDER_ID,
            H38_BUSINESS_OFFICE_EXPORT_FOLDER_ID:process.env.H38_BO_EXPORT_FOLDER_ID,
            H38_BUSINESS_OFFICE_BACKUP_FOLDER_ID:process.env.H38_BO_BACKUP_FOLDER_ID,
            H38_BACKEND_SPREADSHEET_ID:process.env.H38_BACKEND_SPREADSHEET_ID
          };
          process.stdout.write(JSON.stringify([cfg]));
          NODE
          )"
          (cd "$APP" && clasp run-function boBootstrapInstall --params "$PARAMS") | tee "$EVIDENCE/bootstrap.txt"
          (cd "$APP" && clasp run-function boRunSelfTest --nondev) | tee "$EVIDENCE/self-test.txt"

      - name: Execute actual live upload, camera, OCR, approval, posting, and PDF acceptance
        shell: bash
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/h38-business-office-app"
          EVIDENCE="$GITHUB_WORKSPACE/artifacts/business-office-live"
          LIVE_PARAMS="$(node - <<'NODE'
          const fs=require('fs'),path=require('path');
          const dir=path.join(process.cwd(),'artifacts/business-office-live/fixtures');
          function fixture(file,mime){return{fileName:file,mimeType:mime,base64Data:fs.readFileSync(path.join(dir,file)).toString('base64')}}
          process.stdout.write(JSON.stringify([{
            receiptImage:fixture('receipt-camera.png','image/png'),
            workOrderImage:fixture('work-order-camera.png','image/png'),
            vendorInvoicePdf:fixture('vendor-invoice.pdf','application/pdf')
          }]));
          NODE
          )"
          (cd "$APP" && clasp run-function boRunLiveAcceptance --params "$LIVE_PARAMS" --nondev) | tee "$EVIDENCE/live-acceptance.txt"
          node - <<'NODE'
          const fs=require('fs');
          const raw=fs.readFileSync('artifacts/business-office-live/live-acceptance.txt','utf8');
          const start=raw.indexOf('{'),end=raw.lastIndexOf('}');
          if(start<0||end<start) throw new Error('No live acceptance JSON returned.');
          const result=JSON.parse(raw.slice(start,end+1));
          fs.writeFileSync('artifacts/business-office-live/live-acceptance.json',JSON.stringify(result,null,2)+'\n');
          const failed=(result.tests||[]).filter(t=>t.status!=='PASS');
          if(result.status!=='PASS'||failed.length) throw new Error('LIVE ACCEPTANCE HOLD: '+JSON.stringify(failed));
          if(!result.created||!Array.isArray(result.created.pdfFiles)||result.created.pdfFiles.length!==9) throw new Error('Nine live Apps Script PDFs were not generated.');
          console.log('LIVE BUSINESS OFFICE ACCEPTANCE PASS');
          NODE

      - name: Create and deploy separate duplicate-safe intake sync project
        shell: bash
        run: |
          set -euo pipefail
          SYNC="$RUNNER_TEMP/h38-business-office-sync"
          EVIDENCE="$GITHUB_WORKSPACE/artifacts/business-office-live"
          mkdir -p "$SYNC"
          cd "$SYNC"
          clasp create-script --type api --title "Highway 38 Business Office Intake Sync" --rootDir . | tee "$EVIDENCE/create-sync-project.txt"
          cp "$GITHUB_WORKSPACE"/apps-script/business-office-sync/BusinessOffice_Sync.gs .
          cp "$GITHUB_WORKSPACE"/apps-script/business-office-sync/appsscript.json .
          SYNC_SCRIPT_ID="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('.clasp.json','utf8')).scriptId)")"
          printf '%s' "$SYNC_SCRIPT_ID" > "$EVIDENCE/sync-script-id.txt"
          clasp push --force | tee "$EVIDENCE/sync-push.txt"
          clasp create-version "Highway 38 Business Office Intake Sync ${GITHUB_SHA}" | tee "$EVIDENCE/sync-version.txt"
          clasp create-deployment --description "Highway 38 Business Office Intake Sync ${GITHUB_SHA}" | tee "$EVIDENCE/sync-deployment.txt"
          SYNC_PARAMS="$(node - <<'NODE'
          process.stdout.write(JSON.stringify([{
            ownerEmail:process.env.H38_BO_OWNER_EMAIL,
            H38_BACKEND_SPREADSHEET_ID:process.env.H38_BACKEND_SPREADSHEET_ID,
            H38_BUSINESS_OFFICE_SPREADSHEET_ID:process.env.H38_BO_SPREADSHEET_ID,
            H38_BUSINESS_OFFICE_DEFAULT_BUSINESS_ID:process.env.H38_BO_BUSINESS_ID
          }]));
          NODE
          )"
          clasp run-function h38BusinessOfficeBootstrapSync --params "$SYNC_PARAMS" | tee "$EVIDENCE/sync-bootstrap.txt"
          clasp run-function h38BusinessOfficeSyncAcceptance --nondev | tee "$EVIDENCE/sync-acceptance.txt"
          grep -F 'PASS' "$EVIDENCE/sync-acceptance.txt"

      - name: Capture deployed desktop and mobile evidence
        shell: bash
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/h38-business-office-app"
          EVIDENCE="$GITHUB_WORKSPACE/artifacts/business-office-live"
          URL="$(cat "$EVIDENCE/web-app-url.txt")"
          STATUS="$(curl -L -sS -o "$EVIDENCE/web-app-response.html" -w '%{http_code}' "$URL" || true)"
          printf '%s' "$STATUS" > "$EVIDENCE/web-app-http-status.txt"
          test "$STATUS" != '404'
          (cd "$APP" && clasp run-function boGetRenderedWebAppHtml --nondev) > "$EVIDENCE/rendered-html-output.txt"
          node - <<'NODE'
          const fs=require('fs');
          const raw=fs.readFileSync('artifacts/business-office-live/rendered-html-output.txt','utf8').trim();
          const start=raw.indexOf('"'),end=raw.lastIndexOf('"');
          if(start<0||end<=start) throw new Error('No deployed rendered HTML returned.');
          const html=JSON.parse(raw.slice(start,end+1));
          for(const marker of ['Highway 38 Business Office','capture="environment"','Search records','Saved view']) if(!html.includes(marker)) throw new Error('Missing deployed UI marker: '+marker);
          fs.writeFileSync('artifacts/business-office-live/deployed-rendered-web-app.html',html);
          NODE
          node - <<'NODE'
          const {chromium}=require('playwright');const fs=require('fs');
          (async()=>{const html=fs.readFileSync('artifacts/business-office-live/deployed-rendered-web-app.html','utf8');const browser=await chromium.launch({headless:true});
          for(const [name,width,height] of [['desktop',1440,1000],['mobile',390,844]]){const page=await browser.newPage({viewport:{width,height}});await page.setContent(html,{waitUntil:'domcontentloaded'});await page.screenshot({path:`artifacts/business-office-live/${name}.png`,fullPage:true});}
          await browser.close();})().catch(e=>{console.error(e);process.exit(1)});
          NODE

      - name: Record deployment metadata
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/business-office-live
          APP_SCRIPT_ID="$(cat artifacts/business-office-live/app-script-id.txt 2>/dev/null || true)"
          APP_DEPLOYMENT_ID="$(cat artifacts/business-office-live/app-deployment-id.txt 2>/dev/null || true)"
          SYNC_SCRIPT_ID="$(cat artifacts/business-office-live/sync-script-id.txt 2>/dev/null || true)"
          WEB_APP_URL="$(cat artifacts/business-office-live/web-app-url.txt 2>/dev/null || true)"
          cat > artifacts/business-office-live/deployment.json <<JSON
          {"status":"${{ job.status }}","sourceCommit":"${GITHUB_SHA}","appScriptId":"${APP_SCRIPT_ID}","appDeploymentId":"${APP_DEPLOYMENT_ID}","syncScriptId":"${SYNC_SCRIPT_ID}","webAppUrl":"${WEB_APP_URL}","spreadsheetId":"${H38_BO_SPREADSHEET_ID}","externalActionsEnabled":false,"externalActionsOccurred":false,"separateProjects":true}
          JSON

      - name: Upload live deployment, screenshots, PDFs, proof, error, and rollback evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-office-live-${{ github.run_id }}
          path: artifacts/business-office-live/
          if-no-files-found: error
          retention-days: 90

      - name: Record successful Issue 85 live acceptance
        if: success()
        shell: bash
        run: |
          URL="$(cat artifacts/business-office-live/web-app-url.txt)"
          APP_SCRIPT_ID="$(cat artifacts/business-office-live/app-script-id.txt)"
          SYNC_SCRIPT_ID="$(cat artifacts/business-office-live/sync-script-id.txt)"
          gh issue comment 85 --repo "$GITHUB_REPOSITORY" --body "<!-- h38-business-office-live-pass -->
          ## Highway 38 Business Office LIVE SYSTEM PASS

          Source commit: \`${GITHUB_SHA}\`
          Business Office script: \`${APP_SCRIPT_ID}\`
          Intake sync script: \`${SYNC_SCRIPT_ID}\`
          Private web app: ${URL}
          Workflow evidence: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          PASS: private receipt upload, phone-camera work-order upload, vendor-invoice PDF upload, Drive OCR, human-review gates, approved receipt posting, receipt-to-expense conversion, duplicate protection, nine branded Apps Script PDFs, six-role permissions, approval gates, ledger reconciliation, payroll calculation, tax preparation, Proof Log, Error Log, backup evidence, desktop rendering, mobile rendering, and additive duplicate-safe intake synchronization.

          No customer message, payment processing, payroll fund movement, direct deposit, tax filing, delivery, or publication occurred."
