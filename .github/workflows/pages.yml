name: Deploy Highway 38 site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: highway-38-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      GH_TOKEN: ${{ github.token }}
      LIVE_ROOT: https://rkrueth-maker.github.io/highway-38-solutions
    steps:
      - name: Record deployment start
        shell: bash
        run: |
          gh issue edit 284 --repo "$GITHUB_REPOSITORY" \
            --title 'GitHub Pages flush and live verification — RUNNING' \
            --body "Deploying commit ${GITHUB_SHA}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify public website architecture, performance, and locked images
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-public-website-architecture.js
          node scripts/verify-public-image-placements.js
          python3 scripts/verify-public-images.py

      - name: Stage verified public site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          rsync -avm --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='deployment-status/' \
            --exclude='logs/' \
            --exclude='reports/' \
            --exclude='shopify/' \
            --exclude='modules/' \
            --exclude='tests/' \
            --exclude='scripts/' \
            --include='*/' \
            --include='*.html' \
            --include='*.css' \
            --include='*.js' \
            --include='*.json' \
            --include='*.xml' \
            --include='*.txt' \
            --include='*.ico' \
            --include='*.png' \
            --include='*.jpg' \
            --include='*.jpeg' \
            --include='*.gif' \
            --include='*.webp' \
            --include='*.svg' \
            --include='*.woff' \
            --include='*.woff2' \
            --include='*.ttf' \
            --include='*.eot' \
            --include='*.pdf' \
            --include='*.csv' \
            --exclude='*' \
            ./ _site/
          sha="$(git rev-parse HEAD)"
          short_sha="${sha:0:12}"
          SHA="$short_sha" python3 scripts/build-public-site.py _site
          printf '%s\n' "$sha" > _site/deployed-main-sha.txt

          primary_pages=(index.html sample-library-now.html solutions.html pricing.html about.html contact.html start-request.html)
          for page in "${primary_pages[@]}"; do
            test -f "_site/${page}"
            grep -Fq "assets/js/h38-site-v2.js?v=${short_sha}" "_site/${page}"
            ! grep -Eq 'commercial\.js|commercial-public\.js|public-expansion\.js|brand-global\.js|project-intelligence\.js' "_site/${page}"
          done
          grep -Fq "assets/css/h38-request-v2.css?v=${short_sha}" _site/start-request.html
          test -f _site/assets/css/h38-request-v2.css
          for style in commercial.css commercial-public.css brand-global.css public-expansion.css ux-unified-public.css contact-options.css platform-unified.css; do
            ! grep -Fq "href=\"${style}" _site/start-request.html
            ! grep -Fq "href='${style}" _site/start-request.html
          done
          grep -Fq '/* commercial.css */' _site/assets/css/h38-request-v2.css
          grep -Fq '/* platform-unified.css */' _site/assets/css/h38-request-v2.css
          grep -Fq "assets/js/h38-request-options.js?v=${short_sha}" _site/start-request.html
          grep -Fq "request-flow.js?v=${short_sha}" _site/start-request.html
          grep -Fq 'data-intake-endpoint="https://script.google.com/macros/s/' _site/start-request.html

          test -f _site/products.html
          test -f _site/free-tools.html
          grep -Fq 'Eight complete project demonstrations' _site/sample-library-now.html
          grep -Fq 'Uncleared Lot to 3-Bedroom Cabin' _site/sample-library-now.html
          grep -Fq "contractor-demo.css?v=${short_sha}" _site/sample-library-now.html
          for image in deck-before.webp deck-after.webp irrigation-before.webp irrigation-after.webp kitchen-before.webp kitchen-after.webp; do
            grep -Fq "assets/demo-workthroughs/${image}" _site/sample-library-now.html
            test -f "_site/assets/demo-workthroughs/${image}"
          done
          ! grep -Eq 'project-pairs-(strip|sprite)' _site/contractor-demo.css _site/sample-library-now.html
          ! grep -Eq 'opacity:[[:space:]]*0' _site/contractor-demo.css
          grep -Fq 'background-image:none' _site/contractor-demo.css
          grep -Fq 'opacity:1' _site/contractor-demo.css
          ! grep -Eqi 'Browse 15 samples|15 products|9 recommended bundles' _site/sample-library-now.html _site/products.html _site/pricing.html
          grep -Fq 'pricing.html' _site/products.html
          grep -Fq 'sample-library-now.html' _site/free-tools.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages artifact
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Verify live deployment
        shell: bash
        run: |
          set -euo pipefail
          expected="$(git rev-parse HEAD)"
          short_sha="${expected:0:12}"
          marker="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          for attempt in $(seq 1 24); do
            echo "Verification attempt ${attempt}/24"
            live_sha="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/deployed-main-sha.txt?flush=${marker}-${attempt}" || true)"
            home="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/index.html?flush=${marker}-${attempt}" || true)"
            examples="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/sample-library-now.html?flush=${marker}-${attempt}" || true)"
            solutions="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/solutions.html?flush=${marker}-${attempt}" || true)"
            pricing="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/pricing.html?flush=${marker}-${attempt}" || true)"
            about="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/about.html?flush=${marker}-${attempt}" || true)"
            contact="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/contact.html?flush=${marker}-${attempt}" || true)"
            request="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/start-request.html?flush=${marker}-${attempt}" || true)"
            request_css="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/assets/css/h38-request-v2.css?v=${short_sha}&flush=${marker}-${attempt}" || true)"
            demo_css="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/contractor-demo.css?v=${short_sha}&flush=${marker}-${attempt}" || true)"
            products="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/products.html?flush=${marker}-${attempt}" || true)"
            tools="$(curl -fsSL --connect-timeout 15 "${LIVE_ROOT}/free-tools.html?flush=${marker}-${attempt}" || true)"
            primary="$home$examples$solutions$pricing$about$contact$request"
            request_styles_clean=1
            for style in commercial.css commercial-public.css brand-global.css public-expansion.css ux-unified-public.css contact-options.css platform-unified.css; do
              grep -Fq "href=\"${style}" <<<"$request" && request_styles_clean=0
              grep -Fq "href='${style}" <<<"$request" && request_styles_clean=0
            done
            if [[ "$live_sha" == "$expected" ]] \
              && [[ "$(grep -Fo "assets/js/h38-site-v2.js?v=${short_sha}" <<<"$primary" | wc -l)" -eq 7 ]] \
              && ! grep -Eq 'commercial\.js|commercial-public\.js|public-expansion\.js|brand-global\.js|project-intelligence\.js' <<<"$primary" \
              && grep -Fq "assets/css/h38-request-v2.css?v=${short_sha}" <<<"$request" \
              && [[ "$request_styles_clean" -eq 1 ]] \
              && grep -Fq '/* commercial.css */' <<<"$request_css" \
              && grep -Fq '/* platform-unified.css */' <<<"$request_css" \
              && grep -Fq "assets/js/h38-request-options.js?v=${short_sha}" <<<"$request" \
              && grep -Fq "request-flow.js?v=${short_sha}" <<<"$request" \
              && grep -Fq 'Eight complete project demonstrations' <<<"$examples" \
              && grep -Fq 'Uncleared Lot to 3-Bedroom Cabin' <<<"$examples" \
              && grep -Fq "contractor-demo.css?v=${short_sha}" <<<"$examples" \
              && grep -Fq 'assets/demo-workthroughs/deck-before.webp' <<<"$examples" \
              && grep -Fq 'assets/demo-workthroughs/irrigation-after.webp' <<<"$examples" \
              && grep -Fq 'assets/demo-workthroughs/kitchen-after.webp' <<<"$examples" \
              && grep -Fq 'background-image:none' <<<"$demo_css" \
              && grep -Fq 'opacity:1' <<<"$demo_css" \
              && ! grep -Eq 'project-pairs-(strip|sprite)|opacity:[[:space:]]*0' <<<"$demo_css" \
              && ! grep -Eqi 'Browse 15 samples|15 products|9 recommended bundles' <<<"$examples$products" \
              && grep -Fq 'pricing.html' <<<"$products" \
              && grep -Fq 'sample-library-now.html' <<<"$tools"; then
              exit 0
            fi
            sleep 10
          done
          echo 'The GitHub Pages CDN did not serve the verified canonical-site artifact before timeout.'
          exit 1

      - name: Upload website architecture evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-website-${{ github.run_id }}
          path: |
            artifacts/public-website-architecture/
            artifacts/public-image-placements/
          if-no-files-found: warn
          retention-days: 90

      - name: Record PASS
        if: success()
        shell: bash
        run: |
          body="PASS — GitHub Pages is serving commit ${GITHUB_SHA}. The seven primary customer pages use one canonical shell; the live request page uses one bundled stylesheet, one focused options controller, and one secure submit flow. Exact approved images and logo are unchanged. Deck, irrigation, and kitchen use their six direct approved files with no sprite or remote fallback. Retired catalog/tool routes remain lightweight redirects. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue edit 284 --repo "$GITHUB_REPOSITORY" --title 'GitHub Pages architecture and live verification — PASS' --body "$body"
          gh issue close 284 --repo "$GITHUB_REPOSITORY" --reason completed

      - name: Record HOLD
        if: failure()
        shell: bash
        run: |
          body="HOLD — Public website architecture, performance, image, deployment, or live verification failed for commit ${GITHUB_SHA}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue edit 284 --repo "$GITHUB_REPOSITORY" --title 'GitHub Pages architecture and live verification — HOLD' --body "$body"