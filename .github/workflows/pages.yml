name: Deploy Highway 38 site to GitHub Pages
# Forced deployment for corrected seven-project Examples page and owner chooser: 2026-07-22 final

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'deployment-status/**'
      - '.github/workflows/pages-deployment-recorder.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment_attempt_1.outputs.page_url || steps.deployment_attempt_2.outputs.page_url }}
    steps:
      - name: Checkout current main source
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage static site bundle
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -avm --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='deployment-status/' \
            --exclude='logs/' \
            --exclude='reports/' \
            --exclude='shopify/' \
            --exclude='modules/' \
            --exclude='tests/' \
            --exclude='scripts/' \
            --include='*/' \
            --include='*.html' \
            --include='*.css' \
            --include='*.js' \
            --include='*.json' \
            --include='*.xml' \
            --include='*.txt' \
            --include='*.ico' \
            --include='*.png' \
            --include='*.jpg' \
            --include='*.jpeg' \
            --include='*.gif' \
            --include='*.webp' \
            --include='*.svg' \
            --include='*.woff' \
            --include='*.woff2' \
            --include='*.ttf' \
            --include='*.eot' \
            --include='*.pdf' \
            --include='*.csv' \
            --exclude='*' \
            ./ _site/

      - name: Record deployed source SHA
        run: |
          printf '%s\n' "${GITHUB_SHA}" > _site/deployed-source-sha.txt
          printf '%s\n' "$(git rev-parse HEAD)" > _site/deployed-main-sha.txt

      - name: Upload current root site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Deploy current source to Pages (attempt 1)
        id: deployment_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Deploy current source to Pages (retry if attempt 1 fails)
        if: ${{ always() && steps.deployment_attempt_1.outcome == 'failure' }}
        id: deployment_attempt_2
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Fail if both deployment attempts fail
        if: ${{ always() && steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure' }}
        run: |
          echo "Both GitHub Pages deployment attempts failed."
          exit 1
