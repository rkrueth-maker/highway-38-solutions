name: Refresh exact approved logo references

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/logo-install-trigger'

permissions:
  contents: write

jobs:
  refresh-logo-references:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Verify exact approved logo binary
        run: |
          test "$(git hash-object assets/highway38-logo.png)" = "0cbc4514e645dfb25c12ee393b3633a145ebeb2a"

      - name: Refresh root-page logo and script cache keys
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          logo = 'assets/highway38-logo.png?v=20260720-exact-0cbc4514'
          script = 'assets/js/h38-site-v2.js?v=20260720-no-substitute'
          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              updated = re.sub(r'assets/highway38-logo\.png(?:\?v=[^"\']*)?', logo, text)
              updated = re.sub(r'assets/js/h38-site-v2\.js(?:\?v=[^"\']*)?', script, updated)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  print(path)
          PY

      - name: Run public image release gate
        run: python3 scripts/verify-public-images.py

      - name: Commit refreshed public pages
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- '*.html'
          if git diff --cached --quiet; then
            echo 'Public page references are already current.'
            exit 0
          fi
          git commit -m 'Refresh exact approved logo references'
          git push origin HEAD:"$TARGET_BRANCH"
