name: Install exact approved Highway 38 logo

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/install-approved-logo.yml'

permissions:
  contents: write

jobs:
  install-approved-logo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download exact approved logo
        env:
          APPROVED_LOGO_URL: "https://oaisdmntprbrazilsouth.blob.core.windows.net/files/00000000-70c0-820e-9fca-7e5cf550210d/raw?se=2026-07-20T06%3A31%3A39Z&sp=r&sv=2026-02-06&sr=b&scid=019f7e31-f953-74d1-8b6a-d8200d41553d&skoid=127c13cb-e695-43ea-b6b2-0a863d41dbf7&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-19T14%3A07%3A44Z&ske=2026-07-21T14%3A07%3A44Z&sks=b&skv=2026-02-06&sig=TiKBEJ7p/kxDXUjn0WeXUitkHpWPnul76AqdMQfqdOY%3D"
        run: |
          curl --fail --location --retry 4 --retry-all-errors "$APPROVED_LOGO_URL" --output assets/highway38-logo.png

      - name: Validate exact image file
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import hashlib, struct
          p = Path('assets/highway38-logo.png')
          data = p.read_bytes()
          assert data[:8] == b'\x89PNG\r\n\x1a\n', 'not a PNG'
          assert len(data) > 1_000_000, f'logo unexpectedly small: {len(data)} bytes'
          width, height = struct.unpack('>II', data[16:24])
          assert width >= 1000 and height >= 1000, f'logo dimensions too small: {width}x{height}'
          print(f'Approved logo: {width}x{height}, {len(data)} bytes')
          print('SHA256=' + hashlib.sha256(data).hexdigest())
          PY

      - name: Remove obsolete shield fallback
        run: |
          grep -RIl --exclude-dir=.git 'assets/command-center/cc-42.webp' . | while read -r file; do
            sed -i 's#assets/command-center/cc-42.webp#assets/highway38-logo.png#g' "$file"
          done

      - name: Commit approved logo
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/highway38-logo.png .
          if git diff --cached --quiet; then
            echo 'Approved logo already installed.'
            exit 0
          fi
          git commit -m 'Install exact approved Highway 38 logo'
          git push origin HEAD:main
