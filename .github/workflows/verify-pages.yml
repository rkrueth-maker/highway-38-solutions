name: Verify Highway 38 live page

on:
  workflow_run:
    workflows:
      - Deploy Highway 38 site to GitHub Pages
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify-live-page:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      VERIFY_URL: https://rkrueth-maker.github.io/highway-38-solutions/sample-library-now.html?verification=consolidated

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for GitHub Pages propagation
        run: sleep 60

      - name: Run live page verification script
        run: node scripts/verify-live-page.js

      - name: Add verification summary
        if: always()
        run: |
          echo "## Highway 38 live page verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL tested:** $VERIFY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Checks current products, package prices, owner-approval language, unsafe claims, and obsolete Version 5 wording." >> "$GITHUB_STEP_SUMMARY"
