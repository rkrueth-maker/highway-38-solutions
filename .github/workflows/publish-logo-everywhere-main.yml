name: Publish Logo Everywhere Main

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-logo-everywhere-main.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Update and verify every public HTML page
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re,struct

          css='<link rel="stylesheet" href="brand-global.css?v=20260713-logo3">'
          js='<script defer src="brand-global.js?v=20260713-logo3"></script>'
          changed=[]
          categories={'shared_nav':[],'legacy_brand':[],'fallback_bar':[]}
          for path in sorted(Path('.').glob('*.html')):
              text=path.read_text(encoding='utf-8')
              original=text
              text=re.sub(r'ecosystem\.css\?v=[^"\']+', 'ecosystem.css?v=20260713-logo3', text)
              text=re.sub(r'ecosystem\.js\?v=[^"\']+', 'ecosystem.js?v=20260713-logo3', text)
              text=text.replace('brand/highway-38-mark.svg','assets/highway38-logo.png?v=20260713-logo3')
              text=text.replace('alt="Highway 38 blueprint path mark"','alt="Highway 38 Solutions"')
              if 'brand-global.css?v=20260713-logo3' not in text:text=text.replace('</head>',css+'</head>')
              if 'brand-global.js?v=20260713-logo3' not in text:text=text.replace('</head>',js+'</head>')
              if text!=original:
                  path.write_text(text,encoding='utf-8');changed.append(path.name)
              if '<nav class="site-nav"' in text and 'ecosystem.js' in text:categories['shared_nav'].append(path.name)
              elif 'class="brand"' in text or 'class="site-brand"' in text or 'class="navbar-brand"' in text:categories['legacy_brand'].append(path.name)
              else:categories['fallback_bar'].append(path.name)

          data=Path('assets/highway38-logo.png').read_bytes()
          assert data[:8]==b'\x89PNG\r\n\x1a\n'
          assert struct.unpack('>II',data[16:24])==(164,72)
          assert data[-12:]==b'\x00\x00\x00\x00IEND\xaeB`\x82'
          global_js=Path('brand-global.js').read_text(encoding='utf-8')
          global_css=Path('brand-global.css').read_text(encoding='utf-8')
          shared=Path('ecosystem.js').read_text(encoding='utf-8')
          for marker in ['assets/highway38-logo.png?v=20260713-logo3','alt="Highway 38 Solutions"','brand-text']:
              assert marker in global_js and marker in shared
          assert 'height:36px' in global_css and 'height:30px' in global_css
          assert "links.classList.toggle('is-open')" in shared
          for path in Path('.').glob('*.html'):
              text=path.read_text(encoding='utf-8')
              assert 'brand-global.css?v=20260713-logo3' in text,path
              assert 'brand-global.js?v=20260713-logo3' in text,path
              assert 'brand/highway-38-mark.svg' not in text,path
          Path('/tmp/changed.txt').write_text('\n'.join(changed))
          for key,items in categories.items():Path(f'/tmp/{key}.txt').write_text('\n'.join(items))
          PY
      - name: Record coverage and commit to main
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/verification
          {
            echo '# Logo Everywhere Publication — 2026-07-13'
            echo
            echo '- Header asset: third uploaded H38 swoosh'
            echo '- Public path: `assets/highway38-logo.png?v=20260713-logo3`'
            echo '- Asset validation: 164 × 72 valid PNG'
            echo '- Desktop height: 36px'
            echo '- Mobile height: 30px'
            echo '- Shared headers, legacy brand anchors, fallback bars, and footers: enabled'
            echo '- Old `brand/highway-38-mark.svg` page references: removed'
            echo '- Existing mobile-menu JavaScript: preserved'
            echo
            echo '## Shared-navigation pages'
            sed 's/^/- `/' /tmp/shared_nav.txt | sed 's/$/`/'
            echo
            echo '## Legacy-brand pages upgraded'
            sed 's/^/- `/' /tmp/legacy_brand.txt | sed 's/$/`/'
            echo
            echo '## Pages receiving fallback brand bar'
            sed 's/^/- `/' /tmp/fallback_bar.txt | sed 's/$/`/'
            echo
            echo '## Files changed'
            sed 's/^/- `/' /tmp/changed.txt | sed 's/$/`/'
          } > docs/verification/LOGO_EVERYWHERE_2026-07-13.md
          rm .github/workflows/publish-logo-everywhere-main.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish third H38 logo across all public pages'
          git push origin main
