name: Verify H38 Owner Entry

on:
  push:
    branches: [main]
    paths:
      - 'verification/h38-owner-entry-trigger.txt'

permissions:
  contents: write

concurrency:
  group: verify-h38-owner-entry
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for GitHub Pages propagation
        run: sleep 30
      - name: Verify live H38 owner entry chain
        shell: bash
        run: |
          set -euo pipefail
          BASE='https://rkrueth-maker.github.io/highway-38-solutions'
          CACHE="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          fetch(){
            local path="$1" out="$2"
            for attempt in {1..12}; do
              status="$(curl -L -sS -o "$out" -w '%{http_code}' "$BASE/$path?verify=$CACHE-$attempt")"
              if [[ "$status" == '200' ]]; then return 0; fi
              sleep 10
            done
            echo "Could not fetch $path with HTTP 200."
            return 1
          }
          fetch 'sign-in.html' sign-in-live.html
          fetch 'business-systems.html' business-systems-live.html
          fetch 'portal.html' portal-live.html
          grep -F 'href="portal.html#business-office">Business Office Sign In</a>' sign-in-live.html
          grep -F 'href="portal.html#business-office">Open Business Office</a>' business-systems-live.html
          grep -F "'business-office':'requests'" portal-live.html
          grep -F 'AKfycbzr0hoImRF4iQ1gR90Cr17juP8PODkEWRorXxW6qralEYTGLhOU33E1wYEPU_3duQKpQg' portal-live.html
          ! grep -F 'AKfycbyf9ivM04iKqg9QqM1PgRQgD4Imf6VY_mMpCLLsU6lRbGYsprTEEzlwEE93pRgqPzCcmg' sign-in-live.html
          ! grep -F 'AKfycbyf9ivM04iKqg9QqM1PgRQgD4Imf6VY_mMpCLLsU6lRbGYsprTEEzlwEE93pRgqPzCcmg' business-systems-live.html
          cat > verification/h38-owner-entry-pass.json <<EOF
          {
            "status": "PASS",
            "verifiedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sourceCommit": "${GITHUB_SHA}",
            "signInRoute": "portal.html#business-office",
            "businessSystemsRoute": "portal.html#business-office",
            "retainedOwnerPortalDeployment": true,
            "directBusinessOfficeDeploymentExposed": false
          }
          EOF
      - name: Publish live verification evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add verification/h38-owner-entry-pass.json
          git commit -m 'Record verified live H38 owner entry'
          git pull --rebase origin main
          git push origin HEAD:main
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: h38-owner-entry-${{ github.run_id }}
          path: |
            sign-in-live.html
            business-systems-live.html
            portal-live.html
            verification/h38-owner-entry-pass.json
          if-no-files-found: warn
          retention-days: 30
