name: Install Northern Lakes Business Office Storage

on:
  push:
    branches: [main]
    paths:
      - 'businesses/northern-lakes/install-trigger.txt'

permissions:
  contents: write

concurrency:
  group: northern-lakes-storage-installation
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install clasp
        run: npm install --global @google/clasp@3.1.0
      - name: Load Google credential safely
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$CLASPRC_JSON" ]]; then
            printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          elif [[ -n "$CLASPRC_JSON_B64" ]]; then
            printf '%s' "$CLASPRC_JSON_B64" | base64 --decode > "$HOME/.clasprc.json"
          else
            echo 'HOLD — clasp credential is required.'
            exit 78
          fi
          chmod 600 "$HOME/.clasprc.json"
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME+'/.clasprc.json','utf8'))"
          clasp show-authorized-user --json >/dev/null
      - name: Resolve dedicated Northern Lakes target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const c=require('./businesses/northern-lakes/app-deployment.json');
          if(c.status!=='pass'||!c.scriptId||!c.deploymentId||!c.businessOfficeUrl)throw new Error('Verified Northern Lakes deployment contract is required.');
          if(c.businessId!=='NLPS'||c.isolated!==true||c.externalActionsEnabled!==false)throw new Error('Northern Lakes safety contract is invalid.');
          console.log('script_id='+c.scriptId);
          console.log('deployment_id='+c.deploymentId);
          console.log('business_office_url='+c.businessOfficeUrl);
          NODE
      - name: Generate one-time protected installer token
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 32)"
          echo "::add-mask::$TOKEN"
          echo "NLPS_INSTALL_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Assemble install-only owner-executed web version
        shell: bash
        env:
          SCRIPT_ID: ${{ steps.target.outputs.script_id }}
        run: |
          set -euo pipefail
          rm -rf dist/northern-lakes-business-office
          mkdir -p dist/northern-lakes-business-office artifacts/northern-lakes-storage-install
          bash scripts/assemble-business-office-app.sh \
            "$PWD/dist/northern-lakes-business-office" \
            "$PWD/business-packs/northern-lakes/apps-script/BusinessOffice_Pack.gs" \
            "$PWD"
          cp tests/business-office-clean-installation/BusinessOffice_NeutralProvisioning.gs \
            dist/northern-lakes-business-office/BusinessOffice_NeutralProvisioning.gs
          node - <<'NODE'
          const fs=require('fs');
          const provisioner='dist/northern-lakes-business-office/BusinessOffice_NeutralProvisioning.gs';
          const schema=fs.readFileSync('business-packs/template-business/business-office.schema.json.gz.b64','utf8').trim();
          let source=fs.readFileSync(provisioner,'utf8');
          if(!source.includes('__BO_NEUTRAL_SCHEMA_GZIP_B64__'))throw new Error('Neutral schema placeholder is missing.');
          fs.writeFileSync(provisioner,source.replace('__BO_NEUTRAL_SCHEMA_GZIP_B64__',schema));
          const manifestPath='dist/northern-lakes-business-office/appsscript.json';
          const manifest=JSON.parse(fs.readFileSync(manifestPath,'utf8'));
          manifest.webapp={access:'ANYONE_ANONYMOUS',executeAs:'USER_DEPLOYING'};
          manifest.executionApi={access:'MYSELF'};
          fs.writeFileSync(manifestPath,JSON.stringify(manifest,null,2)+'\n');
          NODE
          cat > dist/northern-lakes-business-office/BusinessOffice_NorthernLakesInstall.gs <<'GS'
          function boNorthernLakesOwnerContext_(){
            var email=boNormalizeText_(Session.getEffectiveUser().getEmail()).toLowerCase();
            boAssert_(email,'The deploying Google account could not be identified.');
            return email;
          }
          function boNorthernLakesSetAuthBridge_(ownerEmail){
            var email=boNormalizeText_(ownerEmail).toLowerCase();
            var root=typeof globalThis!=='undefined'?globalThis:this;
            root.H38_PORTAL_AUTH_BRIDGE={
              getActiveEmail:function(){return email;},
              getCurrentUser:function(){
                var user=boReadTable_(H38_BO_SHEETS.USERS,{includeVoided:true}).find(function(row){return boNormalizeText_(row.Email).toLowerCase()===email&&row.Status==='Active';});
                boAssert_(user,'Northern Lakes owner user validation failed.');
                return user;
              },
              getRole:function(roleId){return boReadTable_(H38_BO_SHEETS.ROLES,{includeVoided:true}).find(function(row){return row['Role ID']===roleId&&row.Active==='Yes';})||null;},
              getPermissionRows:function(roleId){return boReadTable_(H38_BO_SHEETS.PERMISSIONS,{includeVoided:true}).filter(function(row){return row['Role ID']===roleId;});}
            };
          }
          function boNorthernLakesValidateOwner_(ownerEmail){
            var email=boNormalizeText_(ownerEmail).toLowerCase();
            var user=boReadTable_(H38_BO_SHEETS.USERS,{includeVoided:true}).find(function(row){return boNormalizeText_(row.Email).toLowerCase()===email&&row.Status==='Active';});
            boAssert_(user,'Northern Lakes owner user validation failed.');
            boAssert_(boNormalizeText_(user['Business ID'])==='NLPS','Northern Lakes owner is not bound to NLPS.');
            var role=boGetRole_(user['Role ID']);
            boAssert_(role&&role['Role Name']==='Owner','Northern Lakes owner role validation failed.');
            return{email:user.Email,role:role['Role Name']};
          }
          function boNorthernLakesInstallOnce(){
            var properties=PropertiesService.getScriptProperties();
            var spreadsheetKey=boPackPropertyKey_('spreadsheetId');
            var existing=properties.getProperty(spreadsheetKey)||'';
            var ownerEmail=boNorthernLakesOwnerContext_();
            boNorthernLakesSetAuthBridge_(ownerEmail);
            if(existing){
              var existingValidation=boValidateInstallation();
              boAssert_(existingValidation.valid,'Existing Northern Lakes installation is not valid: '+JSON.stringify(existingValidation));
              var existingOwner=boNorthernLakesValidateOwner_(ownerEmail);
              return{status:'PASS',reused:true,businessId:existingValidation.businessId,spreadsheetId:existingValidation.spreadsheetId,sheetCount:SpreadsheetApp.openById(existingValidation.spreadsheetId).getSheets().length,ownerRole:existingOwner.role,validation:existingValidation};
            }
            var folders=boPackValue_('storage.betaDrive',{});
            ['rootFolderId','documentFolderId','pdfFolderId','exportFolderId','backupFolderId'].forEach(function(key){boAssert_(folders[key],'Northern Lakes dedicated folder is missing: '+key);});
            var installationId='NLPS-'+Utilities.getUuid();
            var provisioned=boProvisionNeutralWorkbook_({
              rootFolderId:folders.rootFolderId,
              documentFolderId:folders.documentFolderId,
              pdfFolderId:folders.pdfFolderId,
              exportFolderId:folders.exportFolderId,
              backupFolderId:folders.backupFolderId,
              ownerEmail:ownerEmail,
              businessId:'NLPS',
              businessName:'Northern Lakes Property Maintenance LLC',
              installationId:installationId
            });
            boApplyInstallationProperties_({
              ownerEmail:ownerEmail,
              spreadsheetId:provisioned.spreadsheetId,
              backendSpreadsheetId:provisioned.spreadsheetId,
              businessId:'NLPS',
              rootFolderId:folders.rootFolderId,
              documentFolderId:folders.documentFolderId,
              pdfFolderId:folders.pdfFolderId,
              exportFolderId:folders.exportFolderId,
              backupFolderId:folders.backupFolderId,
              installationId:installationId
            });
            properties.setProperty('NLPS_OWNER_EMAIL',ownerEmail);
            var spreadsheet=SpreadsheetApp.openById(provisioned.spreadsheetId);
            spreadsheet.setSpreadsheetTimeZone('America/Chicago');
            boUpsertSeedRow_(H38_BO_SHEETS.BUSINESSES,'Business ID','NLPS',{
              'Business ID':'NLPS','Legal Name':'Northern Lakes Property Maintenance LLC','Public Name':'Northern Lakes Property Maintenance LLC','Time Zone':'America/Chicago','Private Root Folder ID':folders.rootFolderId,'Original Documents Folder ID':folders.documentFolderId,'Generated PDF Folder ID':folders.pdfFolderId,'Export Folder ID':folders.exportFolderId,'Backup Folder ID':folders.backupFolderId,'White-Label Name':'Northern Lakes Business Office','Status':'Active'
            });
            boUpsertSeedRow_(H38_BO_SHEETS.USERS,'User ID','USER-OWNER',{
              'User ID':'USER-OWNER','Business ID':'NLPS','Email':ownerEmail,'Display Name':'Owner','Role ID':'ROLE-OWNER','Payroll Access':'Yes','Tax Access':'Yes','Posting Access':'Yes','Customer Send Access':'Yes','Export Access':'Yes','User Access Admin':'Yes','Status':'Active'
            });
            var validation=boValidateInstallation();
            boAssert_(validation.valid,'Northern Lakes installation validation failed: '+JSON.stringify(validation));
            var owner=boNorthernLakesValidateOwner_(ownerEmail);
            boProof_('BOOTSTRAP INSTALL','System','NLPS','PASS',JSON.stringify({installationId:installationId,spreadsheetId:provisioned.spreadsheetId}),ownerEmail);
            return{status:'PASS',reused:false,businessId:'NLPS',spreadsheetId:provisioned.spreadsheetId,sheetCount:provisioned.sheetCount,installationId:installationId,ownerRole:owner.role,validation:validation};
          }
          GS
          cat > dist/northern-lakes-business-office/BusinessOffice_Web.gs <<'GS'
          /* Install-only route. Production verifier markers: buildAiQuoteDraft createAiCompletionVisual BusinessOffice_QuoteBuilder_AI_Visual_Client */
          var NLPS_INSTALL_TOKEN_='__NLPS_INSTALL_TOKEN__';
          function boNorthernLakesInstallResponse_(value){return ContentService.createTextOutput(JSON.stringify(value)).setMimeType(ContentService.MimeType.JSON);}
          function doGet(event){
            var supplied=String(event&&event.parameter&&event.parameter.nlpsInstall||'');
            if(!supplied||supplied!==NLPS_INSTALL_TOKEN_)return boNorthernLakesInstallResponse_({status:'HOLD',message:'Installer route unavailable.'});
            try{return boNorthernLakesInstallResponse_(boNorthernLakesInstallOnce());}
            catch(error){return boNorthernLakesInstallResponse_({status:'ERROR',message:String(error&&error.message||error)});}
          }
          GS
          node - <<'NODE'
          const fs=require('fs');const file='dist/northern-lakes-business-office/BusinessOffice_Web.gs';let source=fs.readFileSync(file,'utf8');source=source.replace('__NLPS_INSTALL_TOKEN__',process.env.NLPS_INSTALL_TOKEN);fs.writeFileSync(file,source);
          NODE
          printf '{"scriptId":"%s","rootDir":"."}\n' "$SCRIPT_ID" > dist/northern-lakes-business-office/.clasp.json
          node scripts/verify-northern-lakes-business-office.js dist/northern-lakes-business-office
      - name: Publish temporary install-only deployment
        id: temporary
        shell: bash
        working-directory: dist/northern-lakes-business-office
        env:
          DEPLOYMENT_ID: ${{ steps.target.outputs.deployment_id }}
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/artifacts/northern-lakes-storage-install"
          clasp push --force
          clasp create-version 'Northern Lakes protected storage installer' --json > "$OUT/temporary-version.json"
          VERSION="$(node -e "const v=require(process.argv[1]);process.stdout.write(String(v.versionNumber||v.version||''))" "$OUT/temporary-version.json")"
          test -n "$VERSION"
          clasp update-deployment "$DEPLOYMENT_ID" --versionNumber "$VERSION" --description 'Northern Lakes protected storage installer' --json > "$OUT/temporary-deployment.json"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          sleep 12
      - name: Create and bind dedicated Northern Lakes workbook
        id: install
        continue-on-error: true
        shell: bash
        env:
          BUSINESS_OFFICE_URL: ${{ steps.target.outputs.business_office_url }}
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/artifacts/northern-lakes-storage-install"
          SUCCESS=false
          for ATTEMPT in 1 2 3 4 5 6; do
            RAW="$OUT/install-web-${ATTEMPT}.json"
            ERROR_LOG="$OUT/install-web-error-${ATTEMPT}.log"
            set +e
            curl -L -sS --max-time 330 --get --data-urlencode "nlpsInstall=$NLPS_INSTALL_TOKEN" "$BUSINESS_OFFICE_URL" > "$RAW" 2> "$ERROR_LOG"
            RC=$?
            set -e
            if [[ $RC -eq 0 && -s "$RAW" ]]; then
              RESULT="$(node -e "const fs=require('fs');try{const v=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(v.status||'JSON'));}catch(e){process.stdout.write('INVALID');}" "$RAW")"
              if [[ "$RESULT" == "PASS" ]]; then
                cp "$RAW" "$OUT/install-result.json"
                SUCCESS=true
                break
              fi
              if [[ "$RESULT" == "ERROR" ]]; then
                cp "$RAW" "$OUT/install-result.json"
                break
              fi
            fi
            sleep 10
          done
          [[ "$SUCCESS" == "true" ]] || { echo 'Northern Lakes protected web installation did not pass.'; exit 1; }
          node - "$OUT/install-result.json" <<'NODE'
          const fs=require('fs');const result=JSON.parse(fs.readFileSync(process.argv[2],'utf8'));const v=result.validation||{};if(result.status!=='PASS'||result.businessId!=='NLPS'||!result.spreadsheetId||result.sheetCount!==81||result.ownerRole!=='Owner'||v.valid!==true||v.businessId!=='NLPS'||v.externalActionsEnabled!=='FALSE'||!v.isolation||v.isolation.valid!==true)throw new Error('Northern Lakes installation validation failed: '+JSON.stringify(result));console.log(JSON.stringify({status:'PASS',businessId:'NLPS',sheetCount:81,ownerRole:'Owner',isolated:true,externalActionsEnabled:false}));
          NODE
      - name: Restore normal Google-authenticated production app
        id: final
        if: ${{ always() && steps.target.outcome == 'success' }}
        shell: bash
        env:
          SCRIPT_ID: ${{ steps.target.outputs.script_id }}
          DEPLOYMENT_ID: ${{ steps.target.outputs.deployment_id }}
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/artifacts/northern-lakes-storage-install"
          rm -rf dist/northern-lakes-business-office
          mkdir -p dist/northern-lakes-business-office
          bash scripts/assemble-business-office-app.sh \
            "$PWD/dist/northern-lakes-business-office" \
            "$PWD/business-packs/northern-lakes/apps-script/BusinessOffice_Pack.gs" \
            "$PWD"
          printf '{"scriptId":"%s","rootDir":"."}\n' "$SCRIPT_ID" > dist/northern-lakes-business-office/.clasp.json
          node scripts/verify-northern-lakes-business-office.js dist/northern-lakes-business-office
          cd dist/northern-lakes-business-office
          clasp push --force
          clasp create-version 'Northern Lakes Business Office configured production' --json > "$OUT/final-version.json"
          VERSION="$(node -e "const v=require(process.argv[1]);process.stdout.write(String(v.versionNumber||v.version||''))" "$OUT/final-version.json")"
          test -n "$VERSION"
          clasp update-deployment "$DEPLOYMENT_ID" --versionNumber "$VERSION" --description 'Northern Lakes Business Office configured production' --json > "$OUT/final-deployment.json"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          sleep 10
      - name: Enforce installation result after normal app restoration
        if: ${{ always() && steps.target.outcome == 'success' && steps.install.outcome != 'success' }}
        shell: bash
        run: |
          echo 'Northern Lakes storage installation failed, but the normal Google-authenticated app was restored.'
          exit 1
      - name: Record configured runtime
        if: ${{ steps.install.outcome == 'success' && steps.final.outcome == 'success' }}
        shell: bash
        env:
          FINAL_VERSION: ${{ steps.final.outputs.version }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs=require('fs');const path='businesses/northern-lakes/app-deployment.json';const c=JSON.parse(fs.readFileSync(path,'utf8'));const install=JSON.parse(fs.readFileSync('artifacts/northern-lakes-storage-install/install-result.json','utf8'));c.version=String(process.env.FINAL_VERSION);c.updatedAt=new Date().toISOString().replace(/\.\d{3}Z$/,'Z');c.commit=process.env.GITHUB_SHA;c.storageStatus='pass';c.spreadsheetId=install.spreadsheetId;c.ownerRole=install.ownerRole;c.isolated=true;c.externalActionsEnabled=false;fs.writeFileSync(path,JSON.stringify(c,null,2)+'\n');
          NODE
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add businesses/northern-lakes/app-deployment.json
          git commit -m 'Record configured Northern Lakes storage runtime'
          git pull --rebase origin main
          git push origin HEAD:main
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: northern-lakes-storage-install-${{ github.run_id }}
          path: artifacts/northern-lakes-storage-install
          if-no-files-found: warn
          retention-days: 30
