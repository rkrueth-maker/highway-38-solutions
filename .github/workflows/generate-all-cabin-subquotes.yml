name: Generate All Cabin Sub-Quotes

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/generate-all-cabin-subquotes.yml'
      - 'apps-script/business-office/BusinessOffice_CabinDemoSeeder.gs'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: highway-38-cabin-subquotes
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
      CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
      CLASP_CREDENTIALS_B64: ${{ secrets.CLASP_CREDENTIALS_B64 }}
      GOOGLE_CLASPRC_JSON: ${{ secrets.GOOGLE_CLASPRC_JSON }}
      GOOGLE_CLASPRC_JSON_B64: ${{ secrets.GOOGLE_CLASPRC_JSON_B64 }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install isolated clasp
        run: npm install --no-save --package-lock=false --ignore-scripts --no-audit --no-fund @google/clasp@3.3.0

      - name: Load existing production credentials
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          if [[ -n "${CLASPRC_JSON}" ]]; then printf '%s' "${CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASPRC_JSON_B64}" ]]; then printf '%s' "${CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS}" ]]; then printf '%s' "${CLASP_CREDENTIALS}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS_B64}" ]]; then printf '%s' "${CLASP_CREDENTIALS_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON_B64}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          else echo 'Missing existing production clasp credential.'; exit 78; fi
          chmod 600 "$HOME/.clasprc.json"
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME+'/.clasprc.json','utf8'))"

      - name: Generate all 21 cabin sub-quotes in deployed Business Office
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT_ID="$(node -e "const d=require('./business-packs/highway38/deployment.json'); process.stdout.write(d.appsScript.productionProjectId)")"
          WORK="$RUNNER_TEMP/cabin-generator"
          mkdir -p "$WORK"
          printf '{"scriptId":"%s","rootDir":"."}\n' "$SCRIPT_ID" > "$WORK/.clasp.json"
          cd "$WORK"
          "$GITHUB_WORKSPACE/node_modules/.bin/clasp" run boGenerateAllCabinSubquotes --params '[]' 2>&1 | tee "$GITHUB_WORKSPACE/cabin-subquote-generation-result.txt"
          grep -E '21|generated|PASS|Complete' "$GITHUB_WORKSPACE/cabin-subquote-generation-result.txt"

      - name: Upload generation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cabin-subquote-generation-${{ github.run_id }}
          path: cabin-subquote-generation-result.txt
          if-no-files-found: warn
          retention-days: 90

      - name: Report successful cabin generation
        if: success()
        shell: bash
        run: |
          BODY="PASS — All 21 cabin sub-quotes were generated in the existing Business Office from commit ${GITHUB_SHA}. Same project record and approved plan, exterior, and interior visuals were used. Evidence: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue comment 168 --repo "$GITHUB_REPOSITORY" --body "$BODY"

      - name: Report cabin generation hold
        if: failure()
        shell: bash
        run: |
          BODY="HOLD — Cabin sub-quote generation failed for commit ${GITHUB_SHA}. Existing Business Office remained protected. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue comment 168 --repo "$GITHUB_REPOSITORY" --body "$BODY"