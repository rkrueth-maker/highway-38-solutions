name: Integrated Public Expansion Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'sample-library-now.html'
      - 'solutions.html'
      - 'pricing.html'
      - 'about.html'
      - 'contact.html'
      - 'start-request.html'
      - 'portal.html'
      - 'assets/js/h38-site-v2.js'
      - 'assets/css/h38-site-v2.css'
      - 'assets/contractor-demo/**'
      - 'assets/demo-workthroughs/**'
      - 'request-flow.js'
      - 'customer-portal.html'
      - 'customer-portal-*.js'
      - 'supabase/migrations/**'
      - 'scripts/verify-public-expansion.js'
      - 'scripts/verify-commercial-system.js'
      - 'scripts/verify-commercial-browser.js'
      - 'scripts/browser-commercial-smoke.sh'
      - 'scripts/verify-contact-options.js'
      - 'scripts/verify-one-shot-ux.js'
      - 'scripts/verify-customer-portal-supabase.js'
      - 'scripts/verify-public-website-architecture.js'
      - 'scripts/config/public-website-routes.json'
      - 'scripts/config/approved-public-assets.json'
      - 'scripts/config/approved-public-image-placements.json'
      - 'docs/architecture/**'
      - '.github/workflows/integrated-public-expansion.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structural-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify current public architecture
        run: |
          node scripts/verify-change-governance.js
          node scripts/verify-contact-options.js
          node scripts/verify-one-shot-ux.js
          node scripts/verify-public-expansion.js
          node scripts/verify-commercial-system.js
          node scripts/verify-public-website-architecture.js
          node scripts/verify-customer-portal-supabase.js

  browser-regression:
    needs: structural-regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify project-first browser behavior
        run: node scripts/verify-commercial-browser.js
      - name: Verify focused shell screenshots and examples
        run: bash scripts/browser-commercial-smoke.sh
      - name: Upload public regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-regression-${{ github.run_id }}
          path: |
            artifacts/commercial-system/verification.json
            artifacts/change-governance/verification.json
            launch-control/evidence/customer-portal-supabase-verification.json
            browser-artifacts/
          if-no-files-found: warn
          retention-days: 30
