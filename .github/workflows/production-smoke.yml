name: Production Site Smoke Check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/production-smoke.yml'
      - 'index.html'
      - 'products.html'
      - 'product.html'
      - 'sample-library-now.html'
      - 'start-request.html'
      - 'catalog-data.js'
      - 'commercial.js'
      - 'commercial.css'
      - 'catalog-navigation.js'
      - 'product-detail.js'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/production-smoke.yml'
      - 'docs/commercial-system/production-smoke-request.md'
      - 'index.html'
      - 'products.html'
      - 'product.html'
      - 'sample-library-now.html'
      - 'start-request.html'
      - 'catalog-data.js'
      - 'commercial.js'
      - 'commercial.css'
      - 'catalog-navigation.js'
      - 'product-detail.js'

permissions:
  contents: read

jobs:
  pull-request-source-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify proposed public source markers
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'Big problems. Clear plans.' index.html
          grep -Fq 'Choose a result without scrolling through one long product wall.' products.html
          grep -Fq 'data-product-detail-single' product.html
          grep -Fq 'Hypothetical examples' sample-library-now.html
          grep -Fq 'What would you like to have when this is finished?' start-request.html
          grep -Fq 'data-owner-link="true"' sample-library-now.html
          grep -Fq 'product_detail_view' product-detail.js
          echo 'Pull-request public source smoke check passed.'

  production-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployed GitHub Pages site
        shell: bash
        run: |
          set -euo pipefail
          base='https://rkrueth-maker.github.io/highway-38-solutions'
          fetch_until_ready() {
            local path="$1"
            local pattern="$2"
            local out="$3"
            for attempt in $(seq 1 24); do
              if curl --fail --location --silent --show-error --max-time 30 "$base/$path?deployment=${GITHUB_SHA}" -o "$out" && grep -Fq "$pattern" "$out"; then
                return 0
              fi
              sleep 10
            done
            echo "Production check failed for $path; expected: $pattern" >&2
            return 1
          }
          fetch_until_ready '' 'Big problems. Clear plans.' /tmp/home.html
          fetch_until_ready 'products.html' 'Choose a result without scrolling through one long product wall.' /tmp/products.html
          fetch_until_ready 'product.html?id=H38-P001' 'data-product-detail-single' /tmp/product.html
          fetch_until_ready 'sample-library-now.html' 'Hypothetical examples' /tmp/samples.html
          fetch_until_ready 'start-request.html' 'What would you like to have when this is finished?' /tmp/request.html
          grep -Fq 'data-owner-link="true"' /tmp/samples.html
          echo 'Production GitHub Pages smoke check passed.'