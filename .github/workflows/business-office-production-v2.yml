name: Legacy Business Office Acceptance (Manual Only)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: highway-38-legacy-business-office-acceptance
  cancel-in-progress: false

jobs:
  verify-without-deployment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify current Business Office source without production writes
        run: |
          npm install
          npm run test:business-office
          node scripts/verify-owner-business-office-ux.js
          node scripts/verify-business-office-existing-deployment.js
      - name: Confirm legacy workflow cannot create or update production resources
        run: |
          echo 'PASS — this legacy workflow is diagnostic only.'
          echo 'Production authority belongs exclusively to Deploy Unified Owner Portal.'
          echo 'No Apps Script project, deployment, trigger, or external action is created here.'
      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-business-office-diagnostic-${{ github.run_id }}
          path: |
            artifacts/business-office/
            artifacts/owner-business-office-ux/
          if-no-files-found: warn
          retention-days: 30
