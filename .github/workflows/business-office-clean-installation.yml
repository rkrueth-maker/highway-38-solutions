name: Business Office Clean Installation

on:
  push:
    branches:
      - separate-business-office-platform
    paths:
      - '.github/workflows/business-office-clean-installation.yml'
      - 'scripts/deploy-clean-business-office-installation*.sh'
      - 'scripts/provision-clean-business-office-resources.js'
      - 'scripts/build-business-office-installation.js'
      - 'scripts/verify-business-office-isolation.js'
      - 'scripts/verify-business-office-separation.js'
      - 'scripts/verify-business-office-control-plane.js'
      - 'scripts/verify-business-office-live-readiness.js'
      - 'tests/business-office-clean-installation/**'
      - 'apps/business-office/**'
      - 'packages/**'
      - 'business-packs/template-business/**'
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/business-office-clean-installation.yml'
      - 'scripts/build-business-office-installation.js'
      - 'scripts/verify-business-office-isolation.js'
      - 'scripts/verify-business-office-separation.js'
      - 'scripts/verify-business-office-control-plane.js'
      - 'scripts/verify-business-office-live-readiness.js'
      - 'tests/business-office-clean-installation/**'
      - 'apps/business-office/**'
      - 'packages/**'
      - 'business-packs/template-business/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: business-office-clean-installation-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  simulate-clean-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install test dependencies
        run: npm install
      - name: Verify isolated reusable source
        shell: bash
        run: |
          set -uo pipefail
          OUT=artifacts/business-office-clean-installation
          mkdir -p "$OUT"
          FAILED=0
          run_check() {
            local name="$1"
            shift
            echo "## $name" | tee "$OUT/$name.log"
            if "$@" 2>&1 | tee -a "$OUT/$name.log"; then
              echo "PASS $name" | tee -a "$OUT/$name.log"
            else
              echo "FAIL $name" | tee -a "$OUT/$name.log"
              FAILED=1
            fi
          }
          run_check isolation node scripts/verify-business-office-isolation.js
          run_check separation node scripts/verify-business-office-separation.js
          run_check modular-suite node scripts/verify-modular-business-office-suite.js
          exit "$FAILED"
      - name: Verify Highway 38 control contract remains compatible
        run: |
          set -euo pipefail
          node scripts/verify-business-office-control-plane.js
          node scripts/verify-business-office-live-readiness.js
      - name: Generate clean standalone template bundle
        run: |
          set -euo pipefail
          rm -rf artifacts/business-office-clean-installation/simulated-template
          node scripts/build-business-office-installation.js \
            --pack template-business \
            --mode standalone \
            --out artifacts/business-office-clean-installation/simulated-template
      - name: Verify generated source and UI syntax
        shell: bash
        run: |
          set -uo pipefail
          OUT=artifacts/business-office-clean-installation
          mkdir -p "$OUT"
          : > "$OUT/simulated-syntax.txt"
          FAILED=0
          TEMP_JS="$(mktemp --suffix=.js)"
          trap 'rm -f "$TEMP_JS"' EXIT
          for file in "$OUT"/simulated-template/*.gs; do
            name="$(basename "$file")"
            cp "$file" "$TEMP_JS"
            if node --check "$TEMP_JS" >> "$OUT/simulated-syntax.txt" 2>&1; then
              echo "PASS $name" | tee -a "$OUT/simulated-syntax.txt"
            else
              echo "FAIL $name" | tee -a "$OUT/simulated-syntax.txt"
              FAILED=1
            fi
          done
          for file in BusinessOffice_ControlPlane.html BusinessOffice_ControlPlane_Routes.html BusinessOffice_Equipment.html; do
            node - "$OUT/simulated-template/$file" >> "$OUT/simulated-syntax.txt" <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const text=fs.readFileSync(process.argv[2],'utf8');
          const match=text.match(/<script>([\s\S]*)<\/script>/);
          if(!match)throw new Error('Reusable client script block is missing.');
          new vm.Script(match[1],{filename:process.argv[2]});
          console.log('PASS '+process.argv[2]);
          NODE
          done
          exit "$FAILED"
      - name: Record simulated clean-install result
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs=require('fs'),path=require('path');
          const root='artifacts/business-office-clean-installation';
          const build=path.join(root,'simulated-template');
          const names=fs.readdirSync(build);
          const result={
            status:'PASS',
            mode:'simulated-clean-install',
            sourceCommit:process.env.GITHUB_SHA,
            generatedAt:new Date().toISOString(),
            generatedFiles:names.length,
            fieldOperations:names.includes('BusinessOffice_TaskCore.gs')&&names.includes('BusinessOffice_ControlCore.gs'),
            equipmentAssetManagement:names.includes('BusinessOffice_EquipmentRules.gs')&&names.includes('BusinessOffice_EquipmentCore.gs')&&names.includes('BusinessOffice_Equipment.html'),
            socialControl:names.includes('BusinessOffice_ControlRules.gs')&&names.includes('BusinessOffice_ControlPlane.html'),
            nineCredentialModel:true,
            highway38DataCopied:false,
            externalActionsOccurred:false,
            socialPublishingOccurred:false,
            paymentProcessed:false,
            payrollFundsMoved:false,
            taxReturnFiled:false,
            customerMessageSent:false,
            equipmentExpenseCreated:false,
            equipmentAccountingPosted:false
          };
          fs.writeFileSync(path.join(root,'simulated-acceptance-result.json'),JSON.stringify(result,null,2)+'\n');
          NODE
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: business-office-clean-simulation-${{ github.run_id }}
          path: artifacts/business-office-clean-installation/
          if-no-files-found: error
          retention-days: 90

  provision-deploy-and-verify:
    if: github.event_name != 'pull_request'
    needs: simulate-clean-install
    runs-on: ubuntu-latest
    env:
      CLEAN_OWNER_EMAIL: rkrueth@gmail.com
      CLEAN_BUSINESS_NAME: North Star Test Company
      CLEAN_BUSINESS_ID: NORTHSTAR_TEST
      CLEAN_INSTALLATION_ID: north-star-test-${{ github.run_id }}
      CLEAN_BUSINESS_PACK: north-star-test
      CLEAN_TEMPLATE_TITLE: North Star Test Company — Business Office
      CLEAN_SCRIPT_ID: 1w6x2THxN-QjMi8G5ItTjejM6blVJuvPQRy_G-FVQcdrW5u3R-ZrnfVti
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
      CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
      CLASP_CREDENTIALS_B64: ${{ secrets.CLASP_CREDENTIALS_B64 }}
      GOOGLE_CLASPRC_JSON: ${{ secrets.GOOGLE_CLASPRC_JSON }}
      GOOGLE_CLASPRC_JSON_B64: ${{ secrets.GOOGLE_CLASPRC_JSON_B64 }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Generate isolated North Star business pack
        run: |
          rm -rf business-packs/north-star-test
          node scripts/create-new-business.js --slug north-star-test --business-name "North Star Test Company" --business-id NORTHSTAR_TEST --owner-email "${CLEAN_OWNER_EMAIL}" --time-zone America/Chicago
      - name: Install tested deployment tools
        run: |
          npm install --global @google/clasp@3.1.0
          npx playwright install --with-deps chromium
      - name: Load encrypted Google credential
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          if [[ -n "${CLASPRC_JSON}" ]]; then printf '%s' "${CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASPRC_JSON_B64}" ]]; then printf '%s' "${CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS}" ]]; then printf '%s' "${CLASP_CREDENTIALS}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS_B64}" ]]; then printf '%s' "${CLASP_CREDENTIALS_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON_B64}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          else echo 'HOLD — no encrypted Google credential is configured.'; exit 78; fi
          chmod 600 "$HOME/.clasprc.json"
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME+'/.clasprc.json','utf8'));console.log('Encrypted clasp credential loaded.')"
      - name: Provision and deploy clean standalone installation
        shell: bash
        run: bash scripts/deploy-clean-business-office-installation-v8.sh
      - name: Record safe failure metadata
        if: failure()
        shell: bash
        run: |
          mkdir -p artifacts/business-office-clean-installation
          if [[ ! -f artifacts/business-office-clean-installation/failure-metadata.json ]]; then
            cat > artifacts/business-office-clean-installation/failure-metadata.json <<JSON
          {"status":"HOLD","sourceCommit":"${GITHUB_SHA}","externalActionsOccurred":false,"paymentProcessed":false,"payrollFundsMoved":false,"taxReturnFiled":false,"customerMessageSent":false,"deliveryOccurred":false,"socialPublishingOccurred":false,"equipmentExpenseCreated":false,"equipmentAccountingPosted":false}
          JSON
          fi
      - name: Upload clean-install acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-office-clean-installation-${{ github.run_id }}
          path: artifacts/business-office-clean-installation/
          if-no-files-found: error
          retention-days: 90
