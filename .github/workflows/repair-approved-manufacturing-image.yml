name: Manufacturing Image Repair Diagnostics

on:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for sibling workflows to register
        run: sleep 45
      - name: Report all runs for this commit
        shell: bash
        run: |
          set -euo pipefail
          runs="$(gh run list --repo "$GITHUB_REPOSITORY" --commit "$GITHUB_SHA" --limit 100 --json databaseId,name,workflowName,status,conclusion,headSha,event,url,createdAt,updatedAt)"
          issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --search 'Manufacturing image repair diagnostics in:title' --state all --limit 1 --json number --jq '.[0].number // empty')"
          body_file="$RUNNER_TEMP/manufacturing-repair-runs.md"
          {
            echo '# Manufacturing image repair diagnostics'
            echo
            echo "Commit: \`$GITHUB_SHA\`"
            echo
            echo '```json'
            echo "$runs" | jq .
            echo '```'
          } > "$body_file"
          if [[ -n "$issue" ]]; then
            gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --title 'Manufacturing image repair diagnostics' --body-file "$body_file"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title 'Manufacturing image repair diagnostics' --body-file "$body_file"
          fi
