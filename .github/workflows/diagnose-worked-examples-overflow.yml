name: Diagnose Worked Examples Overflow

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-worked-examples-overflow.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Find overflowing elements
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null
          python3 -m http.server 4173 >/tmp/http.log 2>&1 &
          pid=$!
          trap 'kill $pid || true' EXIT
          sleep 2
          node - <<'NODE'
          const { chromium }=require('playwright');
          const fs=require('fs');
          (async()=>{
            const browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:390,height:844}});
            await page.goto('http://127.0.0.1:4173/worked-examples.html',{waitUntil:'networkidle'});
            const data=await page.evaluate(()=>{
              const vw=document.documentElement.clientWidth;
              const rows=[];
              for(const el of document.querySelectorAll('body *')){
                const r=el.getBoundingClientRect();
                const cs=getComputedStyle(el);
                if(r.right>vw+1||r.left<-1||r.width>vw+1){
                  rows.push({tag:el.tagName.toLowerCase(),id:el.id,classes:el.className?.toString()||'',text:(el.textContent||'').trim().replace(/\s+/g,' ').slice(0,90),left:r.left,right:r.right,width:r.width,display:cs.display,position:cs.position,whiteSpace:cs.whiteSpace,minWidth:cs.minWidth,maxWidth:cs.maxWidth,overflowX:cs.overflowX});
                }
              }
              return {viewport:vw,scrollWidth:document.documentElement.scrollWidth,rows};
            });
            await browser.close();
            fs.writeFileSync('/tmp/overflow.json',JSON.stringify(data,null,2));
            console.log(JSON.stringify(data,null,2));
          })().catch(err=>{console.error(err);process.exit(1)});
          NODE
      - name: Record diagnostic and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/verification
          {
            echo '# Worked Examples Mobile Overflow Diagnostic'
            echo
            echo '```json'
            cat /tmp/overflow.json
            echo '```'
          } > docs/verification/WORKED_EXAMPLES_OVERFLOW_DIAGNOSTIC.md
          rm .github/workflows/diagnose-worked-examples-overflow.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record worked examples overflow diagnostic'
          git push origin main
