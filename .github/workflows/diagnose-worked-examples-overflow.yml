name: Diagnose Worked Examples Overflow

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-worked-examples-overflow.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Measure overflow elements
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null
          python3 -m http.server 4173 >/tmp/http.log 2>&1 &
          pid=$!
          trap 'kill $pid || true' EXIT
          sleep 2
          node - <<'NODE'
          const { chromium }=require('playwright');
          (async()=>{
            const browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:390,height:844}});
            await page.goto('http://127.0.0.1:4173/worked-examples.html',{waitUntil:'networkidle'});
            const result=await page.evaluate(()=>{
              const vw=document.documentElement.clientWidth;
              return [...document.querySelectorAll('body *')].map(el=>{
                const r=el.getBoundingClientRect();
                const s=getComputedStyle(el);
                return {tag:el.tagName.toLowerCase(),id:el.id,cls:el.className||'',text:(el.textContent||'').trim().replace(/\s+/g,' ').slice(0,120),left:r.left,right:r.right,width:r.width,scrollWidth:el.scrollWidth,display:s.display,whiteSpace:s.whiteSpace,overflowX:s.overflowX};
              }).filter(x=>x.right>vw+1||x.left<-1||x.scrollWidth>x.width+2).sort((a,b)=>Math.max(b.right-vw,b.scrollWidth-b.width)-Math.max(a.right-vw,a.scrollWidth-a.width)).slice(0,30);
            });
            console.log(JSON.stringify({viewport:390,documentWidth:await page.evaluate(()=>document.documentElement.scrollWidth),offenders:result},null,2));
            await browser.close();
          })();
          NODE
