name: Deploy Owner Portal HTML Include Hotfix

on:
  push:
    branches:
      - main
    paths:
      - 'apps-script/core-engine/owner-portal-next/Portal_Index.html'
      - 'apps-script/core-engine/owner-portal-next/Portal_RawIncludes.js'
      - 'scripts/verify-owner-portal-html-includes.js'
      - '.github/workflows/deploy-owner-portal-html-hotfix.yml'
  workflow_dispatch:

concurrency:
  group: owner-portal-production-html-hotfix
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    env:
      H38_BOUND_SCRIPT_ID: 13Bes6_rs3LD-Sch4Vi5DKssCnlU_qb4hzZpGpDVfoRELRak0htXEj7O-
      H38_EXISTING_DEPLOYMENT_ID: AKfycbzr0hoImRF4iQ1gR90Cr17juP8PODkEWRorXxW6qralEYTGLhOU33E1wYEPU_3duQKpQg
      H38_PRODUCTION_SPREADSHEET_ID: 1P5_7iUVf-yY9ffUEM7Iy5v10VsjE2LZdX7vNMcoQ1Uo
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
    steps:
      - name: Check out exact main source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install clasp
        run: npm install --global @google/clasp

      - name: Verify Owner Portal source and HTML include regression
        run: |
          node scripts/verify-owner-portal-next.js
          node scripts/verify-owner-portal-hard-rule.js
          node scripts/verify-owner-portal-html-includes.js

      - name: Load encrypted clasp credential
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLASPRC_JSON" || { echo 'Missing CLASPRC_JSON repository secret.'; exit 78; }
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME+'/.clasprc.json','utf8')); console.log('clasp credential loaded.');"

      - name: Back up existing bound project and force deployment version advance
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="apps-script/core-engine/owner-portal-next"
          WORK="deployment-work"
          BACKUP="$WORK/backup"
          PROJECT="$WORK/project"
          EVIDENCE="$WORK/evidence"
          mkdir -p "$BACKUP" "$PROJECT" "$EVIDENCE"

          printf '{"scriptId":"%s","rootDir":"."}\n' "$H38_BOUND_SCRIPT_ID" > "$BACKUP/.clasp.json"
          (
            cd "$BACKUP"
            clasp pull
          )
          tar -czf "$EVIDENCE/bound-project-backup.tar.gz" -C "$BACKUP" .
          sha256sum "$EVIDENCE/bound-project-backup.tar.gz" | tee "$EVIDENCE/bound-project-backup.sha256"

          printf '{"scriptId":"%s","rootDir":"."}\n' "$H38_BOUND_SCRIPT_ID" > "$PROJECT/.clasp.json"
          cp "$SOURCE"/*.js "$PROJECT/"
          cp "$SOURCE"/*.html "$PROJECT/"
          cp "$SOURCE/appsscript.json" "$PROJECT/"

          cd "$PROJECT"
          clasp list-deployments | tee "../evidence/deployments-before.txt"
          BEFORE_VERSION="$(awk -v id="$H38_EXISTING_DEPLOYMENT_ID" '$0 ~ id {for(i=1;i<=NF;i++){if($i ~ /^@[0-9]+$/){gsub(/^@/,"",$i);print $i;exit}}}' ../evidence/deployments-before.txt)"
          test -n "$BEFORE_VERSION" || { echo 'Existing deployment version was not found.'; exit 1; }

          clasp push --force | tee "../evidence/clasp-push.txt"
          VERSION_OUTPUT="$(clasp create-version "Owner Portal malformed HTML hotfix ${GITHUB_SHA}" | tee ../evidence/create-version.txt)"
          NEW_VERSION="$(printf '%s\n' "$VERSION_OUTPUT" | grep -Eo '[0-9]+' | tail -n 1)"
          test -n "$NEW_VERSION" || { echo 'New Apps Script version could not be parsed.'; exit 1; }
          test "$NEW_VERSION" -gt "$BEFORE_VERSION" || { echo "Version did not advance: before=$BEFORE_VERSION new=$NEW_VERSION"; exit 1; }

          clasp update-deployment "$H38_EXISTING_DEPLOYMENT_ID" --versionNumber "$NEW_VERSION" --description "Highway 38 Owner Portal HTML hotfix ${GITHUB_SHA}" | tee ../evidence/update-deployment.txt
          clasp list-deployments | tee "../evidence/deployments-after.txt"
          grep -F "$H38_EXISTING_DEPLOYMENT_ID @${NEW_VERSION}" ../evidence/deployments-after.txt

          printf '%s\n' "$BEFORE_VERSION" > ../evidence/previous-version.txt
          printf '%s\n' "$NEW_VERSION" > ../evidence/new-version.txt
          cat > ../evidence/owner-portal-html-hotfix-deployment.json <<JSON
          {
            "status": "DEPLOYED_PENDING_RUNTIME_ACCEPTANCE",
            "sourceCommit": "${GITHUB_SHA}",
            "boundScriptId": "${H38_BOUND_SCRIPT_ID}",
            "existingDeploymentId": "${H38_EXISTING_DEPLOYMENT_ID}",
            "productionSpreadsheetId": "${H38_PRODUCTION_SPREADSHEET_ID}",
            "previousVersion": ${BEFORE_VERSION},
            "newVersion": ${NEW_VERSION},
            "createdNewProject": false,
            "createdSecondDeployment": false,
            "externalActionsEnabled": false,
            "externalActionsOccurred": false,
            "runtimeAcceptancePending": true
          }
          JSON

      - name: Upload rollback and deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owner-portal-html-hotfix-${{ github.run_id }}
          path: deployment-work/evidence/
          if-no-files-found: warn
          retention-days: 90

      - name: Record deployment on control issues
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="$(cat deployment-work/evidence/new-version.txt)"
          URL="https://script.google.com/macros/s/${H38_EXISTING_DEPLOYMENT_ID}/exec"
          BODY="Owner Portal malformed-HTML hotfix deployed to the existing private Apps Script Web App from commit ${GITHUB_SHA}, with the existing deployment explicitly advanced to version ${VERSION}. Raw JavaScript fragments use HtmlTemplate.getRawContent(); no new project or second deployment was created; external actions remain disabled. Runtime acceptance remains required. URL: ${URL}. Evidence: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue comment 33 --repo "$GITHUB_REPOSITORY" --body "$BODY"
          gh issue comment 31 --repo "$GITHUB_REPOSITORY" --body "$BODY"
