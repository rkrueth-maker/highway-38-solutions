name: Deploy Unified Owner Portal

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-owner-portal-hard-rule-production.yml'
      - '.github/workflows/business-office.yml'
      - '.github/workflows/business-office-production-v2.yml'
      - '.github/workflows/business-office-production-repair.yml'
      - 'scripts/deploy-unified-owner-portal-web.sh'
      - 'portal.html'
      - 'customer-portal.html'
      - 'customer-portal-config.js'
      - 'customer-portal-supabase.js'
      - 'supabase/**'
      - 'core-engine/customer-portal/**'
      - 'ecosystem.js'
      - 'brand-global.js'
      - 'scripts/verify-public-ecosystem-tools.js'
      - 'scripts/verify-owner-portal-routing.js'
      - 'scripts/verify-owner-portal-next.js'
      - 'scripts/verify-owner-portal-hard-rule.js'
      - 'scripts/verify-business-office.js'
      - 'scripts/verify-photo-first-record-creation.js'
      - 'scripts/verify-task-messaging.js'
      - 'scripts/verify-customer-portal-supabase.js'
      - 'scripts/verify-unified-app-ux-complete.js'
      - 'apps-script/core-engine/owner-portal-next/**'
      - 'apps-script/business-office/**'
      - 'apps-script/business-office-sync/**'
      - 'business-packs/highway38/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: highway-38-unified-owner-portal
  cancel-in-progress: false

jobs:
  deploy-and-verify:
    runs-on: ubuntu-latest
    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
      CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
      CLASP_CREDENTIALS_B64: ${{ secrets.CLASP_CREDENTIALS_B64 }}
      GOOGLE_CLASPRC_JSON: ${{ secrets.GOOGLE_CLASPRC_JSON }}
      GOOGLE_CLASPRC_JSON_B64: ${{ secrets.GOOGLE_CLASPRC_JSON_B64 }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out exact source
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install repository dependencies and local Apps Script deployment tool
        id: dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm install
          npm install --no-save --package-lock=false @google/clasp@3.1.0
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"
          node -e "const version=require('./node_modules/@google/clasp/package.json').version;if(version!=='3.1.0')throw new Error('Unexpected clasp version '+version);console.log('Local clasp '+version+' installed.');"
          "$GITHUB_WORKSPACE/node_modules/.bin/clasp" --version

      - name: Verify public ecosystem tools
        id: public_tools
        run: node scripts/verify-public-ecosystem-tools.js

      - name: Verify unified Owner Portal routing
        id: routing
        run: node scripts/verify-owner-portal-routing.js

      - name: Verify Owner Portal application
        id: owner_portal
        run: node scripts/verify-owner-portal-next.js

      - name: Verify Owner Portal hard rules
        id: hard_rules
        run: node scripts/verify-owner-portal-hard-rule.js

      - name: Verify Business Office and package controls
        id: business_office
        run: npm run test:business-office

      - name: Verify complete unified application UX
        id: unified_ux
        run: node scripts/verify-unified-app-ux-complete.js

      - name: Verify New record and photo-first creation
        id: photo_first
        run: node scripts/verify-photo-first-record-creation.js

      - name: Verify task assignment and messaging controls
        id: task_messaging
        run: node scripts/verify-task-messaging.js

      - name: Verify separated Tasks and Supabase Customer Portal
        id: customer_portal
        run: node scripts/verify-customer-portal-supabase.js

      - name: Verify local Apps Script deployment tool
        id: install_clasp
        shell: bash
        run: |
          set -euo pipefail
          test -x "$GITHUB_WORKSPACE/node_modules/.bin/clasp"
          clasp --version

      - name: Load encrypted Google credential
        id: credential
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          if [[ -n "${CLASPRC_JSON}" ]]; then printf '%s' "${CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASPRC_JSON_B64}" ]]; then printf '%s' "${CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS}" ]]; then printf '%s' "${CLASP_CREDENTIALS}" > "$HOME/.clasprc.json"
          elif [[ -n "${CLASP_CREDENTIALS_B64}" ]]; then printf '%s' "${CLASP_CREDENTIALS_B64}" | base64 --decode > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON}" > "$HOME/.clasprc.json"
          elif [[ -n "${GOOGLE_CLASPRC_JSON_B64}" ]]; then printf '%s' "${GOOGLE_CLASPRC_JSON_B64}" | base64 --decode > "$HOME/.clasprc.json"
          else echo 'HOLD — no encrypted Google credential is configured.'; exit 78; fi
          chmod 600 "$HOME/.clasprc.json"
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME+'/.clasprc.json','utf8')); console.log('Encrypted clasp credential loaded.')"

      - name: Update accepted existing unified deployment
        id: deploy
        shell: bash
        run: bash scripts/deploy-unified-owner-portal-web.sh

      - name: Upload deployment and rollback evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-owner-portal-${{ github.run_id }}
          path: |
            artifacts/unified-owner-portal/
            artifacts/owner-portal-routing/
            artifacts/business-office/
            artifacts/unified-app-ux/
            artifacts/photo-first-record-creation/
            artifacts/task-messaging/
            launch-control/evidence/customer-portal-supabase-verification.json
          if-no-files-found: warn
          retention-days: 90

      - name: Record live unified application deployment
        if: success()
        shell: bash
        run: |
          REPORT="$RUNNER_TEMP/unified-owner-portal-pass.md"
          cat > "$REPORT" <<EOF
          ## Unified Highway 38 Business System deployed

          - Source commit: ${GITHUB_SHA}
          - Public gateway: https://rkrueth-maker.github.io/highway-38-solutions/portal.html
          - Owner experience: one authenticated application and one adaptive navigation system
          - Complete unified UX verification: PASS
          - Seven workspaces: Today, Customers, Work, Money, Documents, Growth, Control
          - Module Manager, setup wizard, Approval Center, customer/job workspaces, role dashboards, calendar, users, backups, mobile navigation, and command launcher: PASS
          - Secure multi-user task assignment and role permissions: PASS
          - Supabase Customer Portal password authentication and customer isolation: PASS
          - Existing Apps Script project and deployments updated in place
          - New project or deployment: none
          - Google user authentication and role controls: preserved
          - External actions: disabled and approval gated

          Evidence: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          gh issue comment 31 --repo "$GITHUB_REPOSITORY" --body-file "$REPORT"

      - name: Record unified application deployment HOLD
        if: failure()
        shell: bash
        run: |
          BODY="Unified Highway 38 Business System deployment is on HOLD for commit ${GITHUB_SHA}. Stage outcomes: dependencies=${{ steps.dependencies.outcome }}, public_tools=${{ steps.public_tools.outcome }}, routing=${{ steps.routing.outcome }}, owner_portal=${{ steps.owner_portal.outcome }}, hard_rules=${{ steps.hard_rules.outcome }}, business_office=${{ steps.business_office.outcome }}, unified_ux=${{ steps.unified_ux.outcome }}, photo_first=${{ steps.photo_first.outcome }}, task_messaging=${{ steps.task_messaging.outcome }}, customer_portal=${{ steps.customer_portal.outcome }}, install_clasp=${{ steps.install_clasp.outcome }}, credential=${{ steps.credential.outcome }}, deploy=${{ steps.deploy.outcome }}. No replacement project or deployment was created. Review evidence: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue comment 31 --repo "$GITHUB_REPOSITORY" --body "$BODY"
