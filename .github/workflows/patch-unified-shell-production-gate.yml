name: Patch Unified Shell Production Gate

on:
  push:
    branches:
      - rebuild/unified-apps-script-shell
    paths:
      - '.github/workflows/patch-unified-shell-production-gate.yml'

permissions:
  contents: write

jobs:
  patch-production-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out rebuild branch
        uses: actions/checkout@v4
        with:
          ref: rebuild/unified-apps-script-shell
          fetch-depth: 0

      - name: Add deterministic shell paths and verification
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/deploy-owner-portal-hard-rule-production.yml')
          text = workflow.read_text(encoding='utf-8')

          path_anchor = "      - 'scripts/deploy-unified-owner-portal-web.sh'\n"
          path_insert = (
              path_anchor
              + "      - 'scripts/build-unified-apps-script-shell.js'\n"
              + "      - 'scripts/verify-unified-app-shell.js'\n"
              + "      - 'apps-script/unified-shell/**'\n"
          )
          if "      - 'apps-script/unified-shell/**'\n" not in text:
              if path_anchor not in text:
                  raise SystemExit('Production path anchor not found')
              text = text.replace(path_anchor, path_insert, 1)

          verify_anchor = "          set -euo pipefail\n          node scripts/verify-business-office.js\n"
          verify_insert = "          set -euo pipefail\n          node scripts/verify-unified-app-shell.js\n          node scripts/verify-business-office.js\n"
          if '          node scripts/verify-unified-app-shell.js\n' not in text:
              if verify_anchor not in text:
                  raise SystemExit('Production verifier anchor not found')
              text = text.replace(verify_anchor, verify_insert, 1)

          artifact_anchor = "            artifacts/unified-owner-portal/\n"
          artifact_insert = artifact_anchor + "            artifacts/unified-shell/\n"
          if '            artifacts/unified-shell/\n' not in text:
              if artifact_anchor not in text:
                  raise SystemExit('Production evidence anchor not found')
              text = text.replace(artifact_anchor, artifact_insert, 1)

          old_report = '          - Canonical Business Office authentication, Portal authentication bridge, and explicit auth resolver: REMOTE VERIFIED\n'
          new_report = '          - Deterministic unified shell, one entry point, self-contained authentication, and capability ownership: REMOTE VERIFIED\n'
          if old_report in text:
              text = text.replace(old_report, new_report, 1)
          elif new_report not in text:
              raise SystemExit('Production PASS report authentication marker not found')

          workflow.write_text(text, encoding='utf-8')
          PY

      - name: Commit production gate update
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Production gate is already current.'
            exit 0
          fi
          git config user.name 'Highway 38 Build Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add .github/workflows/deploy-owner-portal-hard-rule-production.yml
          git commit -m 'Require unified shell verification before production deploy'
          git push origin HEAD:rebuild/unified-apps-script-shell
