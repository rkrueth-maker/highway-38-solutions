name: Publish Remaining Approved Images

on:
  push:
    branches: [main]
    paths:
      - '.remaining-approved-images-trigger'

permissions:
  contents: write

concurrency:
  group: publish-remaining-approved-images
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Download exact approved source images
        run: |
          set -euo pipefail
          mkdir -p /tmp/h38-approved assets/approved-website-images
          curl -L --fail --retry 3 -o /tmp/h38-approved/05.jpg 'https://at.adobe.com/HxYyQcFLvHXGTLoF'
          curl -L --fail --retry 3 -o /tmp/h38-approved/06.jpg 'https://at.adobe.com/hMu4h2p3ZmccXpJb'
          curl -L --fail --retry 3 -o /tmp/h38-approved/07.jpg 'https://at.adobe.com/7zrjaLIQ2QcTo2UJ'
          curl -L --fail --retry 3 -o /tmp/h38-approved/08.jpg 'https://at.adobe.com/t9lcrxzAraQk70e1'
          curl -L --fail --retry 3 -o /tmp/h38-approved/09.jpg 'https://at.adobe.com/P3ZUod3vcgLTgU36'
          curl -L --fail --retry 3 -o /tmp/h38-approved/10.jpg 'https://at.adobe.com/arckfmvwM6ArgAx8'
          curl -L --fail --retry 3 -o /tmp/h38-approved/11.jpg 'https://at.adobe.com/fftNIZIxAPve1rGK'
          curl -L --fail --retry 3 -o /tmp/h38-approved/12.jpg 'https://at.adobe.com/x56Sc2hb6DmyB1D9'
          curl -L --fail --retry 3 -o /tmp/h38-approved/13.jpg 'https://at.adobe.com/2vY5escQYw20zJzs'
      - name: Optimize images and apply approved placements
        run: |
          set -euo pipefail
          python -m pip install --quiet pillow
          python - <<'PY'
          from PIL import Image
          from pathlib import Path
          src=Path('/tmp/h38-approved')
          out=Path('assets/approved-website-images')
          names={
            '05':'05-organized-tool-wall-workbench.jpg',
            '06':'06-garage-layout-zones.jpg',
            '07':'07-storage-organization-system.jpg',
            '08':'08-request-process-checklist.jpg',
            '09':'09-clean-working-shop-floor.jpg',
            '10':'10-project-planning-documents.jpg',
            '11':'11-exterior-shop-building.jpg',
            '12':'12-cnc-machining-closeup.jpg',
            '13':'13-digital-organization-file-system.jpg',
          }
          for key,name in names.items():
              im=Image.open(src/f'{key}.jpg').convert('RGB')
              w,h=im.size
              if w>1200:
                  im=im.resize((1200,round(h*1200/w)),Image.Resampling.LANCZOS)
              im.save(out/name,'JPEG',quality=84,optimize=True,progressive=True)
          PY
          echo '' | base64 -d > brand-global.js
          echo '' | base64 -d > brand-global.css
      - name: Validate image-only implementation
        run: |
          set -euo pipefail
          node --check brand-global.js
          python - <<'PY'
          from PIL import Image
          from pathlib import Path
          expected=[
            '05-organized-tool-wall-workbench.jpg','06-garage-layout-zones.jpg','07-storage-organization-system.jpg',
            '08-request-process-checklist.jpg','09-clean-working-shop-floor.jpg','10-project-planning-documents.jpg',
            '11-exterior-shop-building.jpg','12-cnc-machining-closeup.jpg','13-digital-organization-file-system.jpg']
          js=Path('brand-global.js').read_text()
          for name in expected:
              p=Path('assets/approved-website-images')/name
              assert p.exists() and p.stat().st_size>25000, name
              im=Image.open(p); assert im.size==(1200,527), (name,im.size)
              assert name in js, name
          assert js.count('Representative imagery, not customer proof.')==1
          assert 'loading=\'lazy\'' in js
          print('approved image validation: PASS')
          PY
          node scripts/verify-highway38-final-polish.js
      - name: Commit directly to main and remove one-time publisher
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f .github/workflows/publish-remaining-approved-images.yml .remaining-approved-images-trigger
          git add assets/approved-website-images brand-global.js brand-global.css
          git commit -m 'Publish nine remaining approved website images'
          git push origin HEAD:main
