name: Deploy Northern Lakes Business Office

on:
  workflow_dispatch:
    inputs:
      script_id:
        description: Existing dedicated NLPS Apps Script project ID; blank uses the recorded runtime ID
        required: false
        type: string
      deployment_id:
        description: Existing dedicated NLPS web-app deployment ID; blank uses the recorded runtime ID
        required: false
        type: string
      allow_first_install:
        description: Allow creation of the first dedicated NLPS project and deployment when no recorded IDs exist
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'businesses/northern-lakes/deploy-trigger.txt'

permissions:
  contents: read

concurrency:
  group: northern-lakes-business-office-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      INPUT_SCRIPT_ID: ${{ inputs.script_id }}
      INPUT_DEPLOYMENT_ID: ${{ inputs.deployment_id }}
      INPUT_ALLOW_FIRST_INSTALL: ${{ inputs.allow_first_install }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install clasp
        run: npm install --global @google/clasp@3.1.0
      - name: Load Google credential
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$CLASPRC_JSON" ]]; then printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          elif [[ -n "$CLASPRC_JSON_B64" ]]; then printf '%s' "$CLASPRC_JSON_B64" | base64 --decode > "$HOME/.clasprc.json"
          else echo 'HOLD — CLASPRC_JSON or CLASPRC_JSON_B64 is required.'; exit 78; fi
          chmod 600 "$HOME/.clasprc.json"
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME+'/.clasprc.json','utf8'))"
          clasp show-authorized-user --json
      - name: Assemble isolated Northern Lakes source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/northern-lakes-business-office
          mkdir -p dist/northern-lakes-business-office
          bash scripts/assemble-business-office-app.sh \
            "$PWD/dist/northern-lakes-business-office" \
            "$PWD/business-packs/northern-lakes/apps-script/BusinessOffice_Pack.gs" \
            "$PWD"
          node scripts/verify-northern-lakes-business-office.js dist/northern-lakes-business-office
      - name: Resolve protected deployment target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_FILE="businesses/northern-lakes/app-deployment.json"
          RUNTIME_SCRIPT_ID=""
          RUNTIME_DEPLOYMENT_ID=""
          if [[ -f "$RUNTIME_FILE" ]]; then
            RUNTIME_SCRIPT_ID="$(node -e "const c=require('./$RUNTIME_FILE');process.stdout.write(String(c.scriptId||''))")"
            RUNTIME_DEPLOYMENT_ID="$(node -e "const c=require('./$RUNTIME_FILE');process.stdout.write(String(c.deploymentId||''))")"
          fi
          SCRIPT_ID="${INPUT_SCRIPT_ID:-$RUNTIME_SCRIPT_ID}"
          DEPLOYMENT_ID="${INPUT_DEPLOYMENT_ID:-$RUNTIME_DEPLOYMENT_ID}"
          FIRST_INSTALL=false
          if [[ -z "$SCRIPT_ID" || -z "$DEPLOYMENT_ID" ]]; then
            if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$INPUT_ALLOW_FIRST_INSTALL" == "true" ]]; then
              FIRST_INSTALL=true
            elif grep -q '^ALLOW_FIRST_INSTALL=TRUE$' businesses/northern-lakes/deploy-trigger.txt; then
              FIRST_INSTALL=true
            else
              echo 'HOLD — no recorded NLPS project/deployment IDs. First installation was not explicitly authorized.'
              exit 78
            fi
          fi
          if [[ "$FIRST_INSTALL" == "false" && ( -z "$SCRIPT_ID" || -z "$DEPLOYMENT_ID" ) ]]; then
            echo 'HOLD — both the existing script ID and deployment ID are required.'
            exit 78
          fi
          echo "script_id=$SCRIPT_ID" >> "$GITHUB_OUTPUT"
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "first_install=$FIRST_INSTALL" >> "$GITHUB_OUTPUT"
      - name: Create or connect dedicated Apps Script project
        id: project
        shell: bash
        working-directory: dist/northern-lakes-business-office
        env:
          RESOLVED_SCRIPT_ID: ${{ steps.target.outputs.script_id }}
        run: |
          set -euo pipefail
          mkdir -p ../../artifacts/northern-lakes-business-office
          if [[ -n "$RESOLVED_SCRIPT_ID" ]]; then
            printf '{"scriptId":"%s","rootDir":"."}\n' "$RESOLVED_SCRIPT_ID" > .clasp.json
            SCRIPT_ID="$RESOLVED_SCRIPT_ID"
          else
            CREATE_DIR="$(mktemp -d)"
            set +e
            (cd "$CREATE_DIR" && DEBUG=clasp:* clasp create-script --type standalone --title 'Northern Lakes Business Office') > ../../artifacts/northern-lakes-business-office/create-project.log 2>&1
            CREATE_STATUS=$?
            set -e
            cat ../../artifacts/northern-lakes-business-office/create-project.log
            [[ "$CREATE_STATUS" -eq 0 ]] || exit "$CREATE_STATUS"
            SCRIPT_ID="$(node -p "require('$CREATE_DIR/.clasp.json').scriptId")"
            printf '{"scriptId":"%s","rootDir":"."}\n' "$SCRIPT_ID" > .clasp.json
            rm -rf "$CREATE_DIR"
          fi
          [[ -n "$SCRIPT_ID" ]] || { echo 'Could not determine Apps Script project ID.'; exit 1; }
          echo "script_id=$SCRIPT_ID" >> "$GITHUB_OUTPUT"
      - name: Push exact source and deploy web app
        id: deployment
        shell: bash
        working-directory: dist/northern-lakes-business-office
        env:
          RESOLVED_DEPLOYMENT_ID: ${{ steps.target.outputs.deployment_id }}
        run: |
          set -euo pipefail
          clasp push --force
          VERSION_OUTPUT="$(clasp create-version 'Northern Lakes isolated Business Office release')"
          printf '%s\n' "$VERSION_OUTPUT"
          VERSION="$(printf '%s\n' "$VERSION_OUTPUT" | sed -nE 's/.*[Vv]ersion[^0-9]*([0-9]+).*/\1/p' | tail -1)"
          [[ -n "$VERSION" ]] || { echo 'Could not determine Apps Script version.'; exit 1; }
          if [[ -n "$RESOLVED_DEPLOYMENT_ID" ]]; then
            OUTPUT="$(clasp create-deployment --deploymentId "$RESOLVED_DEPLOYMENT_ID" --versionNumber "$VERSION" --description 'Northern Lakes Business Office production')"
            DEPLOYMENT_ID="$RESOLVED_DEPLOYMENT_ID"
          else
            OUTPUT="$(clasp create-deployment --versionNumber "$VERSION" --description 'Northern Lakes Business Office production')"
            DEPLOYMENT_ID="$(printf '%s\n' "$OUTPUT" | sed -nE 's/.*(AKfy[A-Za-z0-9_-]+).*/\1/p' | head -1)"
          fi
          printf '%s\n' "$OUTPUT"
          [[ -n "$DEPLOYMENT_ID" ]] || { echo 'Could not determine deployment ID.'; exit 1; }
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=https://script.google.com/macros/s/$DEPLOYMENT_ID/exec" >> "$GITHUB_OUTPUT"
      - name: Record deployment evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/northern-lakes-business-office
          cat > artifacts/northern-lakes-business-office/deployment.json <<EOF
          {
            "status": "pass",
            "businessId": "NLPS",
            "scriptId": "${{ steps.project.outputs.script_id }}",
            "deploymentId": "${{ steps.deployment.outputs.deployment_id }}",
            "version": "${{ steps.deployment.outputs.version }}",
            "businessOfficeUrl": "${{ steps.deployment.outputs.url }}",
            "updatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${GITHUB_SHA}",
            "isolated": true,
            "externalActionsEnabled": false,
            "openAiKeyAvailableToWorkflow": ${{ env.OPENAI_API_KEY != '' }}
          }
          EOF
          cat artifacts/northern-lakes-business-office/deployment.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: northern-lakes-business-office-${{ github.run_id }}
          path: artifacts/northern-lakes-business-office
          if-no-files-found: warn
          retention-days: 90
