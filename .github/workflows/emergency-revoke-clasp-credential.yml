name: Emergency revoke compromised clasp credential

on:
  push:
    branches: [main]
    paths:
      - 'security/clasp-credential-revoke-trigger.txt'

permissions:
  actions: write
  contents: read

jobs:
  revoke-and-clean:
    runs-on: ubuntu-latest
    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
      GH_TOKEN: ${{ github.token }}
      COMPROMISED_RUN_ID: '29768311831'
      COMPROMISED_ARTIFACT_ID: '8471693976'
    steps:
      - name: Revoke exposed Google OAuth refresh token
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="$(node <<'NODE'
          const raw=process.env.CLASPRC_JSON || Buffer.from(process.env.CLASPRC_JSON_B64||'', 'base64').toString('utf8');
          if(!raw)process.exit(2);
          const data=JSON.parse(raw);
          function find(value){
            if(!value||typeof value!=='object')return '';
            if(typeof value.refresh_token==='string'&&value.refresh_token)return value.refresh_token;
            for(const key of Object.keys(value)){const found=find(value[key]);if(found)return found;}
            return '';
          }
          const token=find(data);
          if(!token)process.exit(3);
          process.stdout.write(token);
          NODE
          )"
          curl --silent --show-error --fail \
            --request POST \
            --data-urlencode "token=$TOKEN" \
            https://oauth2.googleapis.com/revoke >/dev/null
          unset TOKEN
          echo 'Google OAuth refresh token revoked.'
      - name: Delete exposed artifact and workflow run
        shell: bash
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          curl --silent --show-error --fail \
            --request DELETE \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "$API/actions/artifacts/$COMPROMISED_ARTIFACT_ID" || true
          curl --silent --show-error --fail \
            --request DELETE \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "$API/actions/runs/$COMPROMISED_RUN_ID"
          echo 'Compromised Actions run and logs deleted.'
