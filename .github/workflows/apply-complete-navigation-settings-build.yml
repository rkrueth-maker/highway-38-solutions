name: Apply Complete Navigation and Settings Build

on:
  push:
    branches:
      - agent/complete-navigation-settings-audit
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: complete-navigation-settings-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-verify:
    if: github.ref_name == 'agent/complete-navigation-settings-audit' || github.event.pull_request.head.ref == 'agent/complete-navigation-settings-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-navigation-settings-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply complete build
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-complete-navigation-settings-build.py
          python3 scripts/align-complete-navigation-verifiers.py
      - name: Verify every heading, Settings boundary, and Quote Builder separation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/h38-navigation-checks
          run_check() {
            name="$1"; shift
            echo "RUN: $name"
            if "$@" >"/tmp/h38-navigation-checks/$name.log" 2>&1; then
              echo "PASS: $name"
            else
              code=$?
              echo "FAIL: $name (exit $code)"
              tail -n 180 "/tmp/h38-navigation-checks/$name.log"
              exit "$code"
            fi
          }
          run_check complete-audit node scripts/audit-complete-navigation-and-settings.js
          run_check quote-routing node scripts/verify-quote-builder-business-office-routing.js
          run_check unified-shell node scripts/verify-unified-app-shell.js
          run_check unified-architecture node scripts/verify-unified-app-architecture.js
          run_check navigation-cache node scripts/verify-navigation-cache-performance.js
          run_check business-office node scripts/verify-business-office.js
          run_check owner-portal node scripts/verify-owner-portal-next.js
          run_check hard-rule node scripts/verify-owner-portal-hard-rule.js
          run_check client-routing node scripts/verify-unified-client-routing-runtime.js
          run_check task-messaging node scripts/verify-task-messaging-hardening.js
          run_check quote-complete node scripts/verify-quote-builder-complete.js
          run_check quote-performance node scripts/verify-quote-builder-direct-performance.js
          run_check quote-camera node scripts/verify-quote-camera-polish.js
          run_check unified-ux node scripts/verify-unified-app-ux-complete.js
      - name: Keep branch source-only
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git restore --source=origin/main --worktree --staged artifacts launch-control/evidence || true
          git clean -fd artifacts launch-control/evidence
          rm -f scripts/apply-complete-navigation-settings-build.py
          rm -f scripts/align-complete-navigation-verifiers.py
          rm -f .github/workflows/apply-complete-navigation-settings-build.yml
          node scripts/audit-complete-navigation-and-settings.js
          node scripts/verify-quote-builder-business-office-routing.js
          node scripts/verify-unified-app-shell.js
          git diff --check
      - name: Commit completed build
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete navigation, settings, and quote workspace separation'
          git push origin HEAD:agent/complete-navigation-settings-audit
