<style>
.qb-ai-panel{margin-top:14px;padding:15px;border:1px solid #b9ccda;border-radius:14px;background:linear-gradient(135deg,#f8fbfd,#edf5f9)}
.qb-ai-panel h3{margin:0 0 5px;color:var(--navy)}.qb-ai-panel p{margin:4px 0;color:var(--muted);line-height:1.45}.qb-ai-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.qb-ai-actions button{flex:0 1 auto}.qb-ai-result{margin-top:12px;padding:12px;border-radius:10px;background:#fff;border:1px solid var(--border);white-space:pre-wrap;line-height:1.45}.qb-ai-warning{margin-top:10px;padding:10px;border-left:4px solid #d9a400;background:#fff7d8;font-size:12px}.qb-ai-visual{margin-top:12px}.qb-ai-visual img{display:block;width:min(100%,760px);border-radius:12px;border:1px solid var(--border)}.qb-ai-label{font-weight:900;color:#7a3d00;margin-top:7px}.qb-upload-input{display:none}@media(max-width:760px){.qb-ai-actions button{width:100%}}
</style>
<script>
(function(){
'use strict';
let uploadInput=null,selectedVisualPhoto='';
const call=(action,args)=>new Promise((resolve,reject)=>{const runner=google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);const payload=(args&&args.payload)||{};if(action==='buildAiQuoteDraft')return runner.boBuildAiQuoteDraft(payload);if(action==='createAiCompletionVisual')return runner.boCreateAiCompletionVisual(payload);return runner.boApi({action:action,args:args||{}});});
const toast=(message,bad)=>{const node=document.getElementById('qbToast');if(node){node.textContent=message;node.style.background=bad?'#8f1d1d':'#162331';node.classList.add('show');setTimeout(()=>node.classList.remove('show'),5000)}};
const text=(selector)=>{const el=document.querySelector(selector);return el?String(el.value||el.textContent||'').trim():''};
function ensureUploadInput(){
  if(uploadInput)return uploadInput;
  uploadInput=document.createElement('input');uploadInput.type='file';uploadInput.accept='image/*';uploadInput.multiple=true;uploadInput.className='qb-upload-input';
  uploadInput.addEventListener('change',()=>{const files=Array.from(uploadInput.files||[]);uploadInput.value='';if(!files.length)return;
    if(typeof window.qbHandleUploadedPhotos==='function')return window.qbHandleUploadedPhotos(files);
    if(typeof window.qbCameraHandleFiles==='function')return window.qbCameraHandleFiles(files);
    const fallback=document.querySelector('input[type=file][accept*="image"]');if(fallback&&fallback!==uploadInput){const dt=new DataTransfer();files.forEach(f=>dt.items.add(f));fallback.files=dt.files;fallback.dispatchEvent(new Event('change',{bubbles:true}));}
  });document.body.appendChild(uploadInput);return uploadInput;
}
function splitCameraAndUpload(){
  ensureUploadInput();
  document.querySelectorAll('.qb-camera-actions').forEach(host=>{
    if(host.querySelector('[data-qb-upload]'))return;
    const take=Array.from(host.querySelectorAll('button')).find(b=>/take|camera|picture/i.test(b.textContent));
    if(take)take.textContent='📷 Take Picture';
    const upload=document.createElement('button');upload.type='button';upload.className='secondary';upload.dataset.qbUpload='1';upload.textContent='🖼️ Upload Photos';upload.addEventListener('click',()=>uploadInput.click());host.appendChild(upload);
  });
  const dialogFile=document.getElementById('qbCameraFile');if(dialogFile){dialogFile.textContent='Upload Existing Photo';dialogFile.onclick=function(){const dialog=document.getElementById('qbCameraDialog');if(dialog&&dialog.open)dialog.close();uploadInput.click();};}
}
function currentPhotos(){
  const urls=[];document.querySelectorAll('#qbPendingPhotos img,.qb-photo-queue img,.qb-saved-photos img').forEach(img=>{if(img.src&&urls.indexOf(img.src)<0)urls.push(img.src)});return urls;
}
function currentCustomerId(){
  const selectors=['#qbCustomerId','#customerId','select[name="customerId"]','[data-field="customerId"] select'];
  for(const s of selectors){const el=document.querySelector(s);if(el&&el.value)return el.value;}
  const selected=document.querySelector('[data-customer-id].selected,[data-customer-id][aria-selected="true"]');return selected?selected.getAttribute('data-customer-id'):'';
}
function currentNotes(){return text('#qbFieldNotes')||text('#fieldNotes')||text('#qbScope')||text('textarea[name="scope"]')||text('textarea');}
function currentTitle(){return text('#qbProjectTitle')||text('#projectTitle')||text('input[name="projectTitle"]')||'Field quote';}
function addAiPanel(){
  const content=document.getElementById('qbContent');if(!content||content.querySelector('.qb-ai-panel'))return;
  const camera=document.querySelector('.qb-camera-panel');if(!camera)return;
  const panel=document.createElement('section');panel.className='qb-ai-panel';panel.innerHTML='<h3>AI Quote Assistant</h3><p>Use the field photos and notes to prepare a structured owner-review draft and an optional proposed-completion concept.</p><div class="qb-ai-actions"><button type="button" class="primary" id="qbBuildAiDraft">✨ Build Quote with AI</button><button type="button" class="secondary" id="qbCreateAiVisual">🖼️ Create Completion Visual</button></div><div class="qb-ai-warning"><strong>Owner review required.</strong> AI cannot approve pricing, send a quote, schedule work, charge a customer, or treat a concept rendering as proof of completion.</div><div id="qbAiResult" class="qb-ai-result" hidden></div><div id="qbAiVisual" class="qb-ai-visual"></div>';
  camera.insertAdjacentElement('afterend',panel);
  document.getElementById('qbBuildAiDraft').addEventListener('click',buildDraft);
  document.getElementById('qbCreateAiVisual').addEventListener('click',createVisual);
}
async function buildDraft(){
  const customerId=currentCustomerId(),notes=currentNotes(),photos=currentPhotos();
  if(!customerId)return toast('Select a customer before building the AI draft.',true);
  if(!notes&&!photos.length)return toast('Add field notes or photos first.',true);
  const button=document.getElementById('qbBuildAiDraft');button.disabled=true;button.textContent='Building draft…';
  try{
    const result=await call('buildAiQuoteDraft',{payload:{customerId:customerId,projectTitle:currentTitle(),notes:notes,photos:photos}});
    const draft=result&&result.draft;const box=document.getElementById('qbAiResult');box.hidden=false;
    if(draft){box.textContent='PROJECT: '+(draft.projectTitle||'')+'\n\nSCOPE\n'+(draft.scope||'')+'\n\nMISSING INFORMATION\n'+((draft.missingInformation||[]).map(x=>'• '+x).join('\n')||'None listed')+'\n\nSUGGESTED ITEMS\n'+((draft.suggestedLines||[]).map(x=>'• '+(x.description||'')+' — '+(x.quantity||'quantity needed')+' '+(x.unit||'')+(x.rate!==''?' @ '+x.rate:' — manual price required')).join('\n')||'No matches');applyDraft(draft);}else box.textContent=(result&&result.message)||'Owner-review draft staged.';
    toast((result&&result.message)||'AI draft prepared for owner review.');
  }catch(error){toast(error&&error.message||String(error),true)}finally{button.disabled=false;button.textContent='✨ Build Quote with AI';}
}
function applyDraft(draft){
  const scope=document.querySelector('#qbScope,#scope,textarea[name="scope"]');if(scope&&draft.scope&&!scope.value)scope.value=draft.scope;
  const title=document.querySelector('#qbProjectTitle,#projectTitle,input[name="projectTitle"]');if(title&&draft.projectTitle&&!title.value)title.value=draft.projectTitle;
  window.H38_QB_LAST_AI_DRAFT=draft;
  if(typeof window.qbApplyAiDraft==='function')window.qbApplyAiDraft(draft);
}
async function createVisual(){
  const photos=currentPhotos();if(!photos.length)return toast('Take or upload a jobsite photo first.',true);
  const customerId=currentCustomerId();if(!customerId)return toast('Select a customer first.',true);
  const instructions=window.prompt('Describe exactly what the completed work should look like. Include materials, colors, layout, and what must remain unchanged.');if(!instructions)return;
  selectedVisualPhoto=photos[0];
  const button=document.getElementById('qbCreateAiVisual');button.disabled=true;button.textContent='Creating visual…';
  try{
    const result=await call('createAiCompletionVisual',{payload:{customerId:customerId,projectTitle:currentTitle(),imageDataUrl:selectedVisualPhoto,instructions:instructions}});
    const host=document.getElementById('qbAiVisual');host.innerHTML='<img src="'+result.visualUrl+'" alt="AI proposed completion concept"><div class="qb-ai-label">'+result.label+'</div><p>Stored for owner review. It is not included in the customer proposal until explicitly approved.</p>';
    toast('Completion concept created for owner review.');
  }catch(error){toast(error&&error.message||String(error),true)}finally{button.disabled=false;button.textContent='🖼️ Create Completion Visual';}
}
function refresh(){splitCameraAndUpload();addAiPanel();}
new MutationObserver(refresh).observe(document.documentElement,{childList:true,subtree:true});
document.addEventListener('DOMContentLoaded',refresh);setTimeout(refresh,500);setTimeout(refresh,1800);
})();
</script>
