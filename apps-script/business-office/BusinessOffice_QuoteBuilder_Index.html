<!doctype html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="utf-8">

  <title>Quote Builder</title>
  <style>
    :root{--navy:#173a5e;--blue:#326a9e;--orange:#e85d18;--bg:#f3f6f9;--panel:#fff;--text:#162331;--muted:#647384;--border:#d8e1e9;--good:#dff5e7;--warn:#fff2c7;--bad:#fee2e2;--shadow:0 10px 30px rgba(15,39,65,.09)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,Arial,Helvetica,sans-serif;color:var(--text);background:var(--bg)}button,input,select,textarea{font:inherit}button{min-height:44px;border:0;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer}button.primary{background:var(--navy);color:#fff}button.secondary{background:#e8eef4;color:var(--navy)}button.danger{background:#8f1d1d;color:#fff}button:disabled{opacity:.55;cursor:not-allowed}
    .top{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 18px;box-shadow:0 3px 14px rgba(0,0,0,.16)}.brand{display:flex;align-items:center;gap:11px}.brand img{width:40px;height:40px;object-fit:contain;border-radius:7px;background:#fff;display:none}.brand h1{font-size:20px;margin:0}.brand small{display:block;color:#dbe8f3;margin-top:2px}.user{text-align:right;font-size:12px;line-height:1.35}
    .app{display:grid;grid-template-columns:220px minmax(0,1fr);min-height:calc(100vh - 64px)}.nav{background:#fff;border-right:1px solid var(--border);padding:14px;display:grid;align-content:start;gap:6px}.nav button{text-align:left;background:transparent;color:var(--text);width:100%}.nav button.active{background:#eaf2fa;color:var(--navy);box-shadow:inset 4px 0 var(--blue)}.nav .full-system{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
    main{min-width:0;padding:18px}.boundary{background:var(--warn);border:1px solid #e4ca73;border-radius:10px;padding:11px 13px;line-height:1.4;margin-bottom:14px}.shell{display:grid;gap:14px}.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--navy),#0c2945);color:#fff;border-radius:16px;padding:20px;box-shadow:var(--shadow);display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.hero h2{font-size:clamp(1.8rem,4vw,2.6rem);margin:4px 0}.hero p{margin:7px 0;color:#dbe8f3;max-width:760px;line-height:1.5}.hero .actions{justify-content:flex-end}.actions,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}.loading-card{min-height:180px;display:grid;place-items:center;color:var(--muted);font-weight:800}.metrics{display:grid;grid-template-columns:repeat(3,minmax(150px,1fr));gap:10px}.metric{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:14px}.metric span,.metric strong{display:block}.metric strong{font-size:28px;color:var(--navy);margin-top:7px}.grid{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(280px,.7fr);gap:14px}.stack{display:grid;gap:14px;align-content:start}.pipeline{display:grid;grid-template-columns:repeat(2,minmax(120px,1fr));gap:8px}.stage{border:1px solid var(--border);border-radius:10px;padding:10px;background:#f7fafc}.stage strong{font-size:22px;color:var(--navy);display:block;margin-top:4px}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:10px}table{border-collapse:collapse;width:100%;min-width:760px}th,td{padding:9px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;white-space:nowrap}th{background:var(--navy);color:#fff}.empty{padding:28px;text-align:center;color:var(--muted)}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.full{grid-column:1/-1}label{font-weight:800;font-size:13px}input,select,textarea{width:100%;min-height:44px;margin-top:5px;padding:9px 10px;border:1px solid var(--border);border-radius:8px;background:#fff}textarea{min-height:92px;resize:vertical}.lines{display:grid;gap:9px;margin-top:12px}.line{display:grid;grid-template-columns:minmax(220px,2fr) 85px 85px 110px 90px 75px auto;gap:7px;align-items:end;padding:10px;background:#f8fafc;border:1px solid var(--border);border-radius:10px}.totals{margin-left:auto;width:min(360px,100%);display:grid;gap:4px}.total-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}.total-row.final{font-size:20px;font-weight:900;color:var(--navy);border:0}.catalog{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}.catalog-card{border:1px solid var(--border);border-radius:11px;padding:12px}.catalog-card h3{margin:3px 0 7px}.price{font-size:21px;font-weight:900;color:var(--navy)}.notice{padding:11px;border-radius:9px;margin-top:12px}.notice.good{background:var(--good);color:#15552e}.notice.bad{background:var(--bad);color:#7a1515}.perf{font-size:11px;color:var(--muted);text-align:right;margin-top:7px}.toast{position:fixed;right:18px;bottom:18px;z-index:50;max-width:440px;background:#162331;color:#fff;border-radius:10px;padding:12px 15px;display:none}.toast.show{display:block}.overlay{position:fixed;inset:0;background:rgba(255,255,255,.62);display:none;place-items:center;z-index:40;font-weight:900}.overlay.show{display:grid}
    @media(max-width:950px){.grid{grid-template-columns:1fr}.line{grid-template-columns:repeat(3,minmax(100px,1fr))}.line .description{grid-column:1/-1}}@media(max-width:760px){.top{align-items:flex-start}.user{display:none}.app{grid-template-columns:1fr}.nav{position:sticky;top:64px;z-index:15;display:flex;overflow:auto;border-right:0;border-bottom:1px solid var(--border);padding:8px}.nav button{min-width:max-content;width:auto}.nav .full-system{margin:0 0 0 8px;border:0;border-left:1px solid var(--border);padding:0 0 0 8px}main{padding:12px}.hero{display:block}.hero .actions{margin-top:12px}.metrics,.form-grid{grid-template-columns:1fr}.full{grid-column:auto}.line{grid-template-columns:1fr 1fr}.line .description{grid-column:1/-1}}
  </style>
</head>
