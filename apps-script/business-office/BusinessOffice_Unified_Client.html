<script>
(function(){
  'use strict';
  var embedded = new URLSearchParams(location.search).get('embedded') === '1';

  function requestedModule(){
    var raw = location.hash.replace(/^#/, '');
    var params = new URLSearchParams(raw);
    return params.get('module') || '';
  }

  function moduleAllowed(module){
    var modules = state && state.bootstrap && Array.isArray(state.bootstrap.modules) ? state.bootstrap.modules : [];
    return modules.some(function(item){ return item.key === module; });
  }

  function ensureDocumentUploadAction(){
    var existing = document.getElementById('embeddedUploadAction');
    if (existing) existing.remove();
    if (!embedded || !state || state.module !== 'documents') return;
    var content = document.getElementById('content');
    if (!content) return;
    var bar = document.createElement('div');
    bar.id = 'embeddedUploadAction';
    bar.className = 'panel quick-upload';
    bar.innerHTML = '<div class="toolbar" style="margin:0"><button class="primary" onclick="openUpload()">Upload PDF / Take Picture</button><span class="boundary">Choose an existing PDF or image, or use camera capture. OCR remains review-only until approved. Nothing posts automatically.</span></div>';
    content.insertBefore(bar, content.firstChild);
  }

  function openRequestedModule(){
    var module = requestedModule();
    if (!module || !state || !state.bootstrap || !moduleAllowed(module)) return;
    Promise.resolve(openModule(module)).then(ensureDocumentUploadAction);
  }

  function installUnifiedBehavior(){
    if (embedded) document.documentElement.classList.add('h38-embedded-business-office');
    if (typeof window.openModule === 'function' && !window.openModule.__h38UnifiedWrapped) {
      var originalOpenModule = window.openModule;
      var wrapped = async function(module){
        if (!moduleAllowed(module)) throw new Error('MODULE NOT INCLUDED — ' + module + ' is disabled by the installed package.');
        var result = await originalOpenModule(module);
        history.replaceState(null, '', location.pathname + location.search + '#module=' + encodeURIComponent(module));
        ensureDocumentUploadAction();
        return result;
      };
      wrapped.__h38UnifiedWrapped = true;
      window.openModule = wrapped;
    }
    openRequestedModule();
  }

  window.addEventListener('hashchange', openRequestedModule);
  window.addEventListener('message', function(event){
    var data = event && event.data;
    if (!data || data.type !== 'h38-open-business-module') return;
    var module = String(data.module || '');
    if (!moduleAllowed(module)) return;
    Promise.resolve(openModule(module)).then(ensureDocumentUploadAction);
  });

  var attempts = 0;
  var timer = setInterval(function(){
    attempts += 1;
    if (state && state.bootstrap) {
      clearInterval(timer);
      installUnifiedBehavior();
    } else if (attempts > 120) {
      clearInterval(timer);
    }
  }, 100);
})();
</script>
<style>
html.h38-embedded-business-office body{background:#f6f8fa}
html.h38-embedded-business-office header{display:none!important}
html.h38-embedded-business-office .layout{display:block;min-height:100vh}
html.h38-embedded-business-office nav{display:none!important}
html.h38-embedded-business-office main{padding:14px;min-height:100vh}
html.h38-embedded-business-office .notice{margin-top:0}
@media(max-width:800px){html.h38-embedded-business-office main{padding:8px}}
</style>
