<script>
(function(){
'use strict';
const ctx=window.H38_QB_CONTEXT||{};
const state={view:'dashboard',customers:null,priceBook:null,templates:null,documents:null,draftLines:[],aiDraft:null};
const $=id=>document.getElementById(id);
const esc=value=>String(value==null?'':value).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const js=value=>String(value==null?'':value).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/[\r\n]+/g,' ');
const num=value=>{const n=Number(String(value==null?'':value).replace(/[$,]/g,''));return Number.isFinite(n)?n:0};
const money=value=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(num(value));
const date=days=>{const d=new Date();d.setDate(d.getDate()+(days||0));return d.toISOString().slice(0,10)};

function toast(message,bad){const node=$('qbToast');node.textContent=message;node.style.background=bad?'#8f1d1d':'#162331';node.classList.add('show');setTimeout(()=>node.classList.remove('show'),4200)}
function busy(on){$('qbOverlay').classList.toggle('show',!!on)}
function perf(label,started){const ms=Math.round(performance.now()-started);$('qbPerf').textContent=label+' rendered in '+ms+' ms';console.log('H38_QB_CLIENT_TIMING',{stage:label,durationMs:ms})}
function call(action,args){return new Promise((resolve,reject)=>{google.script.run.withSuccessHandler(resolve).withFailureHandler(error=>{toast(error.message||String(error),true);reject(error)}).boApi({action:action,args:args||{}})})}
function fullSystemUrl(){const url=new URL(location.href);url.searchParams.delete('quoteBuilder');url.searchParams.delete('v');url.hash='module=dashboard';return url.toString()}
function button(label,onclick,kind){return '<button type="button" class="'+(kind||'secondary')+'" onclick="'+onclick+'">'+esc(label)+'</button>'}
function hero(title,subtitle,actions){return '<div class="hero"><div><small>HIGHWAY 38 QUOTE BUILDER</small><h2>'+esc(title)+'</h2><p>'+esc(subtitle)+'</p></div><div class="actions">'+(actions||'')+'</div></div>'}
function loading(label){$('qbContent').innerHTML='<div class="panel loading-card">'+esc(label||'Loading…')+'</div>'}
function nav(){
  const items=[['dashboard','Quote Builder'],['new','New Quote'],['priceBook','Price Book'],['templates','Templates'],['ai','Photo / AI Draft'],['documents','Documents']];
  $('qbNav').innerHTML=items.filter(item=>item[0]!=='documents'||(ctx.permissions&&ctx.permissions.documents)).map(item=>'<button class="'+(state.view===item[0]?'active':'')+'" onclick="qbOpen(\''+item[0]+'\')">'+esc(item[1])+'</button>').join('')+'<div class="full-system"><button onclick="location.href=\''+esc(fullSystemUrl())+'\'">Full Business System</button></div>';
}
function setupBrand(){
  const brand=ctx.branding||{};document.documentElement.style.setProperty('--navy',brand.primaryColor||'#173a5e');document.documentElement.style.setProperty('--blue',brand.secondaryColor||'#326a9e');
  $('qbTitle').textContent=(brand.businessName||'Highway 38 Solutions')+' Quote Builder';
  $('qbUser').innerHTML='<strong>'+esc((ctx.user&&ctx.user.displayName)||'Authorized user')+'</strong><br>'+esc((ctx.user&&ctx.user.role)||'')+' · '+esc((ctx.user&&ctx.user.email)||'');
  if(brand.logoUrl){$('qbLogo').src=brand.logoUrl;$('qbLogo').style.display='block'}
}

async function loadCustomers(){if(state.customers)return state.customers;state.customers=await call('quoteBuilderCustomers');return state.customers}
async function loadPriceBook(query){if(!query&&state.priceBook)return state.priceBook;const rows=await call('quoteBuilderPriceBook',{options:{query:query||''}});if(!query)state.priceBook=rows;return rows}
async function loadTemplates(){if(state.templates)return state.templates;state.templates=await call('quoteBuilderTemplates');return state.templates}
async function loadDocuments(){if(state.documents)return state.documents;state.documents=await call('quoteBuilderDocuments');return state.documents}

window.qbOpen=async function(view){
  state.view=view||'dashboard';nav();const started=performance.now();
  try{
    if(state.view==='dashboard'){loading('Loading recent quote activity…');renderDashboard(await call('quoteBuilderDashboard'));return perf('dashboard',started)}
    if(state.view==='new'){loading('Loading customers…');renderNew(await loadCustomers());return perf('new_quote',started)}
    if(state.view==='priceBook'){loading('Loading Price Book…');renderPriceBook(await loadPriceBook(''));return perf('price_book',started)}
    if(state.view==='templates'){loading('Loading proposal templates…');renderTemplates(await loadTemplates());return perf('templates',started)}
    if(state.view==='ai'){loading('Loading customer choices…');renderAi(await loadCustomers());return perf('photo_ai',started)}
    if(state.view==='documents'){loading('Loading recent documents…');renderDocuments(await loadDocuments());return perf('documents',started)}
  }catch(error){$('qbContent').innerHTML='<div class="panel notice bad"><strong>Quote Builder stopped safely.</strong><br>'+esc(error.message||String(error))+'</div>'}
};

function renderDashboard(data){
  const metrics=data.metrics||{},pipeline=data.pipeline||{},recent=data.recent||[],stages=['Draft','Internal Review','Sent','Viewed','Accepted','Declined','Changes Requested'];
  $('qbContent').innerHTML='<div class="shell">'+hero('Build and control every quote.','The dedicated app loads only quoting data. Customers, Price Book, templates, documents, and full quote details stay unloaded until opened.',button('New Quote','qbOpen(\'new\')','primary')+button('Photo / AI Draft','qbOpen(\'ai\')')+button('Refresh','qbRefresh()'))+
  '<div class="metrics"><div class="metric"><span>Draft quotes</span><strong>'+esc(metrics.draftQuotes||0)+'</strong></div><div class="metric"><span>Needs follow-up</span><strong>'+esc(metrics.needsFollowUp||0)+'</strong></div><div class="metric"><span>Open quote value</span><strong>'+money(metrics.openQuoteValue||0)+'</strong></div></div>'+
  '<div class="grid"><section class="panel"><h3>Recent quotes</h3>'+recentTable(recent)+'</section><div class="stack"><section class="panel"><h3>Pipeline</h3><div class="pipeline">'+stages.map(s=>'<div class="stage"><span>'+esc(s)+'</span><strong>'+esc(pipeline[s]||0)+'</strong></div>').join('')+'</div></section><section class="panel"><h3>Fast actions</h3><div class="toolbar">'+button('Create Quote','qbOpen(\'new\')','primary')+button('Price Book','qbOpen(\'priceBook\')')+button('Templates','qbOpen(\'templates\')')+button('Documents','qbOpen(\'documents\')')+'</div></section></div></div></div>';
}
function recentTable(rows){if(!rows.length)return '<div class="empty">No quotes yet.</div>';return '<div class="table-wrap"><table><thead><tr><th>Quote</th><th>Project</th><th>Status</th><th>Approval</th><th>Total</th><th>Actions</th></tr></thead><tbody>'+rows.map(row=>{const id=row['Quote ID']||'';return '<tr><td>'+esc(row['Quote Number']||id)+'</td><td>'+esc(row['Project Title']||'')+'</td><td>'+esc(row.Status||'Draft')+'</td><td>'+esc(row['Approval Status']||'')+'</td><td>'+money(row.Total||0)+'</td><td><div class="toolbar">'+button('Open',"qbDetails('"+js(id)+"')")+button('Duplicate',"qbDuplicate('"+js(id)+"')")+button('PDF',"qbPdf('"+js(id)+"')")+(ctx.permissions&&ctx.permissions.approve?button('Approve',"qbApprove('"+js(id)+"')",'primary'):'')+button('To Job',"qbConvert('"+js(id)+"')")+'</div></td></tr>'}).join('')+'</tbody></table></div>'}
window.qbRefresh=function(){state.customers=null;state.priceBook=null;state.templates=null;state.documents=null;qbOpen('dashboard')};

function customerOptions(rows){return '<option value="">Choose customer…</option>'+rows.map(c=>'<option value="'+esc(c['Customer ID'])+'">'+esc(c['Display Name']||c.Email||c['Customer ID'])+'</option>').join('')}
function newLine(item){item=item||{};return {catalogId:item['Product / Service ID']||item.catalogId||'',description:item['Customer Description']||item.Description||item.Name||item.description||'',quantity:item.quantity||1,unit:item.Unit||item.unit||'each',rate:item['Standard Selling Price']||item.Price||item.rate||0,discount:item.discount||0,taxable:item.taxable===true||item.taxable==='Yes',taxRate:item.taxRate||0,notes:item.notes||''}}
function ensureLines(){if(!state.draftLines.length)state.draftLines=[newLine()]}
function renderNew(customers){
  ensureLines();$('qbContent').innerHTML='<div class="shell">'+hero('Create a new quote.','Only customer choices load for this screen. Price Book data stays unloaded until you open it.',button('Dashboard','qbOpen(\'dashboard\')')+button('Price Book','qbOpen(\'priceBook\')'))+
  '<form class="panel" onsubmit="qbSave(event)"><div class="form-grid"><label>Customer *<select id="customer" required>'+customerOptions(customers)+'</select></label><label>Project title *<input id="project" required></label><label>Quote date<input id="quoteDate" type="date" value="'+date(0)+'"></label><label>Expiration date<input id="expiration" type="date" value="'+date(30)+'"></label><label>Payment terms<input id="terms" value="Net 15"></label><label>Deposit<input id="deposit" type="number" min="0" step="0.01" value="0" oninput="qbCalc()"></label><label class="full">Scope<textarea id="scope"></textarea></label><label class="full">Assumptions<textarea id="assumptions"></textarea></label><label class="full">Exclusions<textarea id="exclusions"></textarea></label><label class="full">Customer notes<textarea id="customerNotes"></textarea></label><label class="full">Internal notes<textarea id="internalNotes"></textarea></label></div><div class="toolbar" style="justify-content:space-between;margin-top:16px"><h3>Quote lines</h3><div>'+button('Add Line','qbAddLine()')+button('Open Price Book','qbOpen(\'priceBook\')')+'</div></div><div id="lines" class="lines"></div><div id="totals" class="totals"></div><div class="notice" style="background:var(--warn)"><strong>Internal draft only.</strong> Saving does not approve or send the quote.</div><div class="toolbar"><button class="primary" type="submit">Save Draft Quote</button>'+button('Cancel','qbOpen(\'dashboard\')')+'</div></form></div>';renderLines()
}
window.qbAddLine=function(item){state.draftLines.push(newLine(item));if(state.view!=='new')qbOpen('new');else renderLines()};
window.qbRemoveLine=function(i){state.draftLines.length===1?state.draftLines=[newLine()]:state.draftLines.splice(i,1);renderLines()};
window.qbLine=function(i,key,value){state.draftLines[i][key]=key==='taxable'?!!value:value;qbCalc()};
function renderLines(){const host=$('lines');if(!host)return;host.innerHTML=state.draftLines.map((line,i)=>'<div class="line"><label class="description">Description *<input required value="'+esc(line.description||'')+'" oninput="qbLine('+i+',\'description\',this.value)"></label><label>Qty<input type="number" min="0" step="0.01" value="'+esc(line.quantity)+'" oninput="qbLine('+i+',\'quantity\',this.value)"></label><label>Unit<input value="'+esc(line.unit||'each')+'" oninput="qbLine('+i+',\'unit\',this.value)"></label><label>Rate<input type="number" min="0" step="0.01" value="'+esc(line.rate)+'" oninput="qbLine('+i+',\'rate\',this.value)"></label><label>Discount<input type="number" min="0" step="0.01" value="'+esc(line.discount||0)+'" oninput="qbLine('+i+',\'discount\',this.value)"></label><label>Taxable<input type="checkbox" '+(line.taxable?'checked':'')+' onchange="qbLine('+i+',\'taxable\',this.checked)"></label><button type="button" class="danger" onclick="qbRemoveLine('+i+')">Remove</button></div>').join('');qbCalc()}
window.qbCalc=function(){let subtotal=0,tax=0;state.draftLines.forEach(line=>{const base=Math.max(0,num(line.quantity)*num(line.rate)-num(line.discount));subtotal+=base;if(line.taxable)tax+=base*num(line.taxRate)});const deposit=$('deposit')?num($('deposit').value):0,total=subtotal+tax;const host=$('totals');if(host)host.innerHTML='<div class="total-row"><span>Subtotal</span><strong>'+money(subtotal)+'</strong></div><div class="total-row"><span>Tax</span><strong>'+money(tax)+'</strong></div><div class="total-row"><span>Deposit</span><strong>'+money(deposit)+'</strong></div><div class="total-row final"><span>Total</span><strong>'+money(total)+'</strong></div>'};
window.qbSave=async function(event){event.preventDefault();const lines=state.draftLines.map(line=>({catalogId:line.catalogId||'',description:String(line.description||'').trim(),quantity:num(line.quantity),unit:line.unit||'each',rate:num(line.rate),discount:num(line.discount),taxable:!!line.taxable,taxRate:num(line.taxRate),notes:line.notes||''})).filter(line=>line.description&&line.quantity>0);if(!$('customer').value||!$('project').value.trim()||!lines.length)return toast('Choose a customer, project title, and at least one quote line.',true);busy(true);try{const result=await call('createQuote',{payload:{customerId:$('customer').value,projectTitle:$('project').value.trim(),quoteDate:$('quoteDate').value,expirationDate:$('expiration').value,paymentTerms:$('terms').value,deposit:num($('deposit').value),scope:$('scope').value,assumptions:$('assumptions').value,exclusions:$('exclusions').value,customerNotes:$('customerNotes').value,internalNotes:$('internalNotes').value,lines:lines}});state.draftLines=[];toast('Draft '+(result['Quote Number']||'quote')+' saved. Nothing was sent.');qbOpen('dashboard')}finally{busy(false)}};

function renderPriceBook(items){state.priceBook=items;$('qbContent').innerHTML='<div class="shell">'+hero('Price Book','This cached catalog loads only when opened.',button('New Quote','qbOpen(\'new\')','primary')+button('Dashboard','qbOpen(\'dashboard\')'))+'<section class="panel"><div class="toolbar"><input id="priceSearch" placeholder="Search products, services, or categories" onkeydown="if(event.key===\'Enter\'){event.preventDefault();qbPriceSearch()}"><button onclick="qbPriceSearch()">Search</button><button onclick="qbPriceClear()">Clear</button></div><div class="catalog">'+(items.length?items.map((item,i)=>'<article class="catalog-card"><small>'+esc(item.Category||'Price Book')+'</small><h3>'+esc(item.Name||item['Product / Service ID']||'Item')+'</h3><p>'+esc(item['Customer Description']||item.Description||'')+'</p><div class="price">'+money(item['Standard Selling Price']||item.Price||0)+' / '+esc(item.Unit||'each')+'</div><div class="toolbar"><button class="primary" onclick="qbCatalog('+i+')">Add to Quote</button></div></article>').join(''):'<div class="empty">No matching Price Book items.</div>')+'</div></section></div>'}
window.qbPriceSearch=async function(){const started=performance.now();loading('Searching Price Book…');renderPriceBook(await loadPriceBook(($('priceSearch')&&$('priceSearch').value||'').trim()));perf('price_search',started)};
window.qbPriceClear=async function(){state.priceBook=null;renderPriceBook(await loadPriceBook(''))};
window.qbCatalog=function(i){const item=state.priceBook[i];if(item){state.draftLines.push(newLine(item));toast('Price Book item added.');qbOpen('new')}};

function renderTemplates(items){$('qbContent').innerHTML='<div class="shell">'+hero('Proposal Templates','Templates are cached for several minutes and load only on this screen.',button('New Quote','qbOpen(\'new\')','primary')+button('Dashboard','qbOpen(\'dashboard\')'))+'<section class="panel">'+(items.length?'<div class="table-wrap"><table><thead><tr><th>Template</th><th>Type</th><th>Status</th><th>Reference</th></tr></thead><tbody>'+items.map(row=>'<tr><td>'+esc(row['Template Name']||row.Name||row['PDF Template ID']||'Template')+'</td><td>'+esc(row['Document Type']||row.Type||'Quote')+'</td><td>'+esc(row.Status||'Active')+'</td><td>'+esc(row.Notes||row['File ID']||row['Template File ID']||'')+'</td></tr>').join('')+'</tbody></table></div>':'<div class="empty">No active templates found.</div>')+'</section></div>'}
function renderDocuments(items){$('qbContent').innerHTML='<div class="shell">'+hero('Recent quote documents','Only the newest compact document records load here.',button('Photo / AI Draft','qbOpen(\'ai\')','primary')+button('Dashboard','qbOpen(\'dashboard\')'))+'<section class="panel">'+(items.length?'<div class="table-wrap"><table><thead><tr><th>File</th><th>Type</th><th>Source</th><th>Review</th><th>Uploaded</th></tr></thead><tbody>'+items.map(row=>'<tr><td>'+esc(row['File Name']||row['Document ID'])+'</td><td>'+esc(row['Document Type']||'')+'</td><td>'+esc([row['Source Type'],row['Source ID']].filter(Boolean).join(' · '))+'</td><td>'+esc(row['Review Status']||row['Approval Status']||'')+'</td><td>'+esc(row['Uploaded Time']||'')+'</td></tr>').join('')+'</tbody></table></div>':'<div class="empty">No documents found.</div>')+'</section></div>'}

function renderAi(customers){$('qbContent').innerHTML='<div class="shell">'+hero('Photo / AI Draft','Upload private photos or PDFs, then stage Price Book matches for owner review.',button('New Quote','qbOpen(\'new\')','primary')+button('Dashboard','qbOpen(\'dashboard\')'))+'<section class="panel"><form class="form-grid" onsubmit="qbPrepareAi(event)"><label>Customer *<select id="aiCustomer" required>'+customerOptions(customers)+'</select></label><label>Project title<input id="aiTitle"></label><label class="full">Photos or PDFs<input id="aiFiles" type="file" multiple accept="image/jpeg,image/png,image/webp,image/heic,image/heif,application/pdf,.jpg,.jpeg,.png,.webp,.heic,.heif,.pdf" capture="environment"></label><label class="full">Field notes *<textarea id="aiNotes" required></textarea></label><div class="full toolbar"><button class="primary" type="submit">Upload and Prepare Review Draft</button>'+button('Cancel','qbOpen(\'dashboard\')')+'</div></form><div id="aiResult"></div></section></div>'}
function dataUrl(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file)})}
window.qbPrepareAi=async function(event){event.preventDefault();busy(true);try{const files=Array.from(($('aiFiles').files||[])),refs=[];for(const file of files){if(file.size>20*1024*1024)throw new Error(file.name+' exceeds 20 MB.');const doc=await call('uploadDocument',{payload:{fileName:file.name,mimeType:file.type||'application/octet-stream',base64Data:await dataUrl(file),documentType:'Quote Field Photo',sourceType:'Quote Builder',sourceId:$('aiCustomer').value,accessClassification:'Private Customer'}});refs.push((doc['Document ID']||'Document')+' | '+(doc['File Name']||file.name))}const result=await call('prepareAiQuoteDraft',{payload:{customerId:$('aiCustomer').value,projectTitle:$('aiTitle').value,notes:$('aiNotes').value,photos:refs}});state.aiDraft=result;let details={};try{details=JSON.parse(result.Details||'{}')}catch(e){details={raw:result.Details||''}}result._parsed=details;$('aiResult').innerHTML='<div class="notice good"><strong>Review draft prepared.</strong> No quote was approved or sent.</div><div class="catalog">'+((details.suggestedLines||[]).map((line,i)=>'<article class="catalog-card"><h3>'+esc(line.description||line.catalogId||'Suggested line')+'</h3><div class="price">'+(line.rate!==''?money(line.rate):'Manual price required')+'</div><button class="primary" onclick="qbAiLine('+i+')">Add to Quote</button></article>').join('')||'<div class="empty">No Price Book match found.</div>')+'</div>';state.documents=null;toast('AI review draft staged. Nothing was sent.')}finally{busy(false)}};
window.qbAiLine=function(i){const line=state.aiDraft&&state.aiDraft._parsed&&state.aiDraft._parsed.suggestedLines&&state.aiDraft._parsed.suggestedLines[i];if(line){state.draftLines.push(newLine(line));qbOpen('new')}};

window.qbDetails=async function(id){const started=performance.now();loading('Loading full quote details…');const data=await call('quoteBuilderQuoteDetails',{quoteId:id}),q=data.quote||{},lines=data.lines||[];$('qbContent').innerHTML='<div class="shell">'+hero(q['Quote Number']||'Quote details',q['Project Title']||'',button('Dashboard','qbOpen(\'dashboard\')')+button('Duplicate',"qbDuplicate('"+js(id)+"')")+button('PDF',"qbPdf('"+js(id)+"')"))+'<section class="panel"><div class="form-grid"><div><strong>Status</strong><p>'+esc(q.Status||'')+'</p></div><div><strong>Approval</strong><p>'+esc(q['Approval Status']||'')+'</p></div><div class="full"><strong>Scope</strong><p>'+esc(q.Scope||'')+'</p></div><div class="full"><strong>Exclusions</strong><p>'+esc(q.Exclusions||'')+'</p></div></div><div class="table-wrap"><table><thead><tr><th>#</th><th>Description</th><th>Qty</th><th>Unit</th><th>Rate</th><th>Total</th></tr></thead><tbody>'+lines.map(line=>'<tr><td>'+esc(line['Line Number']||'')+'</td><td>'+esc(line.Description||'')+'</td><td>'+esc(line.Quantity||'')+'</td><td>'+esc(line.Unit||'')+'</td><td>'+money(line.Rate||0)+'</td><td>'+money(line['Line Total']||0)+'</td></tr>').join('')+'</tbody></table></div><div class="totals"><div class="total-row"><span>Subtotal</span><strong>'+money(q.Subtotal||0)+'</strong></div><div class="total-row"><span>Tax</span><strong>'+money(q.Tax||0)+'</strong></div><div class="total-row final"><span>Total</span><strong>'+money(q.Total||0)+'</strong></div></div></section></div>';perf('quote_details',started)};
window.qbDuplicate=async id=>{if(confirm('Duplicate this quote as a new internal draft?')){busy(true);try{await call('duplicateQuote',{quoteId:id});toast('Quote duplicated.');qbOpen('dashboard')}finally{busy(false)}}};
window.qbPdf=async id=>{busy(true);try{const result=await call('generatePdf',{documentType:'Quote',recordId:id});toast('Private PDF created. Nothing was sent.');if(result&&result.fileUrl)window.open(result.fileUrl,'_blank')}finally{busy(false)}};
window.qbApprove=async id=>{if(!confirm('Approve this quote for customer release? This does not send it.'))return;busy(true);try{await call('approve',{recordType:'Quote',recordId:id,approvalType:'Send',decision:'Approved',notes:''});toast('Quote approved. It was not sent.');qbOpen('dashboard')}finally{busy(false)}};
window.qbConvert=async id=>{if(!confirm('Convert this accepted quote into a work order and job?'))return;busy(true);try{await call('quoteToJob',{quoteId:id});toast('Work order and job created.');qbOpen('dashboard')}finally{busy(false)}};

setupBrand();nav();$('qbContent').innerHTML='<div class="shell">'+hero('Quote Builder is ready.','The shell is already visible. Loading only recent quote metrics now.',button('New Quote','qbOpen(\'new\')','primary'))+'<div class="panel loading-card">Loading recent quotes…</div></div>';requestAnimationFrame(()=>qbOpen('dashboard'));
})();
</script>
