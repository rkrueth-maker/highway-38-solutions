<style>
:root{--ux-gray:#64748b;--ux-draft:#e2e8f0;--ux-active:#dbeafe;--ux-active-text:#1d4ed8;--ux-wait:#fef3c7;--ux-wait-text:#92400e;--ux-risk:#fee2e2;--ux-risk-text:#991b1b;--ux-done:#dcfce7;--ux-done-text:#166534;--ux-shadow:0 14px 35px rgba(23,58,94,.1)}
header{min-height:66px}.header-actions{flex-wrap:wrap}.ux-global-search{display:flex;gap:6px;align-items:center;min-width:min(460px,48vw)}.ux-global-search input{min-height:44px;min-width:220px;flex:1;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:9px 11px}.ux-global-search button{background:white;color:var(--navy)}
.layout{grid-template-columns:280px minmax(0,1fr)}nav{padding:10px}.ux-nav-group{margin:5px 0;border:1px solid var(--border);border-radius:10px;overflow:hidden}.ux-nav-toggle{display:flex!important;justify-content:space-between;align-items:center;margin:0!important;background:#f7fafc!important;color:var(--navy)!important;border-radius:0!important}.ux-nav-items{display:none;padding:4px}.ux-nav-group.open .ux-nav-items{display:block}.ux-nav-items button{padding-left:16px}.ux-nav-items button.active{box-shadow:inset 4px 0 var(--blue)}
.ux-page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}.ux-page-head h2,.ux-page-head h1{margin:.2rem 0}.ux-eyebrow{text-transform:uppercase;letter-spacing:.09em;font-size:11px;font-weight:900;color:var(--blue)}
.ux-metrics{display:grid;grid-template-columns:repeat(6,minmax(145px,1fr));gap:10px;margin:14px 0}.ux-metric{display:block;text-align:left;background:white;border:1px solid var(--border);box-shadow:var(--ux-shadow);padding:14px;border-radius:12px;color:var(--text);min-height:120px}.ux-metric b,.ux-metric small{display:block}.ux-metric strong{display:block;font-size:26px;color:var(--navy);margin:8px 0}.ux-metric small{color:var(--muted);font-weight:400}.ux-metric:hover,.ux-metric:focus-visible{outline:3px solid rgba(50,106,158,.3);transform:translateY(-1px)}
.ux-dashboard-grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(300px,.8fr);gap:14px}.ux-stack{display:grid;gap:14px;align-content:start}.ux-section{background:white;border:1px solid var(--border);border-radius:12px;padding:15px;box-shadow:0 4px 18px rgba(23,58,94,.06)}.ux-section-head{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.ux-section h2,.ux-section h3{margin:.2rem 0 .7rem}.ux-financial-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.ux-financial{background:#f7fafc;border:1px solid var(--border);border-radius:9px;padding:10px}.ux-financial b,.ux-financial span{display:block}.ux-financial span{font-size:20px;font-weight:800;margin-top:4px;color:var(--navy)}
.ux-action-list,.ux-activity,.ux-alert-list{display:grid;gap:7px}.ux-action,.ux-activity-row,.ux-alert{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;border:1px solid var(--border);border-radius:9px;padding:10px;background:#fff}.ux-action-main b,.ux-action-main small,.ux-activity-row b,.ux-activity-row small{display:block}.ux-action-main small,.ux-activity-row small{color:var(--muted);margin-top:3px}.ux-alert strong{font-size:18px}.ux-alert button{min-height:38px}
.status.draft,.status.gray{background:var(--ux-draft);color:#334155}.status.active,.status.inprogress,.status.blue{background:var(--ux-active);color:var(--ux-active-text)}.status.required,.status.pending,.status.review,.status.overdue,.status.amber{background:var(--ux-wait);color:var(--ux-wait-text)}.status.rejected,.status.error,.status.voided,.status.blocked,.status.red{background:var(--ux-risk);color:var(--ux-risk-text)}.status.approved,.status.complete,.status.posted,.status.recorded,.status.green{background:var(--ux-done);color:var(--ux-done-text)}
.ux-table-actions{display:flex;gap:6px;white-space:nowrap}.ux-open{background:var(--navy);color:white;min-height:38px;padding:7px 12px}.ux-breadcrumbs{font-size:12px;color:var(--muted);margin-bottom:8px}.ux-breadcrumbs button{padding:0;min-height:auto;background:transparent;color:var(--blue)}
.ux-board{display:grid;grid-template-columns:repeat(5,minmax(230px,1fr));gap:10px;overflow:auto;padding-bottom:8px}.ux-board-column{background:#eef3f7;border:1px solid var(--border);border-radius:12px;padding:10px;min-height:180px}.ux-board-column>h3{font-size:14px;margin:0 0 8px}.ux-board-card{width:100%;display:block;text-align:left;background:white;border:1px solid var(--border);border-radius:9px;padding:10px;margin:7px 0;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.05)}.ux-board-card b,.ux-board-card small{display:block}.ux-board-card small{color:var(--muted);margin-top:4px}.ux-board-card:hover{outline:2px solid var(--blue)}
.ux-search-results{display:grid;gap:14px}.ux-search-group{background:white;border:1px solid var(--border);border-radius:12px;padding:13px}.ux-search-item{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;border-top:1px solid var(--border);padding:9px 0}.ux-search-item:first-of-type{border-top:0}.ux-search-item b,.ux-search-item small{display:block}.ux-search-item small{color:var(--muted)}
#uxWorkspaceDialog{width:min(1180px,98vw)}.ux-workspace-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.ux-workspace-summary{display:grid;grid-template-columns:repeat(4,minmax(145px,1fr));gap:8px;margin:12px 0}.ux-summary-card{border:1px solid var(--border);border-radius:9px;padding:10px;background:#f8fafc}.ux-summary-card b,.ux-summary-card span{display:block}.ux-summary-card b{font-size:11px;color:var(--muted)}.ux-summary-card span{font-weight:800;margin-top:4px}.ux-tabs{display:flex;gap:6px;overflow:auto;border-bottom:1px solid var(--border);padding:7px 0;margin:10px 0}.ux-tab{background:#e7eef5;color:var(--navy);white-space:nowrap}.ux-tab.active{background:var(--navy);color:#fff}.ux-record-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px}.ux-record-field{border:1px solid var(--border);border-radius:8px;padding:9px;overflow-wrap:anywhere}.ux-record-field b{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}.ux-timeline{border-left:3px solid var(--blue);padding-left:16px}.ux-timeline-row{position:relative;padding:0 0 14px}.ux-timeline-row:before{content:"";position:absolute;width:10px;height:10px;border-radius:50%;background:var(--blue);left:-22px;top:5px}.ux-timeline-row b,.ux-timeline-row small{display:block}.ux-timeline-row small{color:var(--muted)}
.ux-form-note{grid-column:1/-1;background:var(--light);border:1px solid var(--border);border-radius:8px;padding:9px;font-size:12px;color:var(--muted)}label .ux-required{color:#991b1b}.ux-empty{padding:24px;border:1px dashed var(--border);border-radius:10px;text-align:center;color:var(--muted)}.ux-empty strong{display:block;color:var(--text);margin-bottom:5px}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,a:focus-visible{outline:3px solid rgba(50,106,158,.55);outline-offset:2px}
@media(max-width:1180px){.ux-metrics{grid-template-columns:repeat(3,minmax(145px,1fr))}.ux-dashboard-grid{grid-template-columns:1fr}.ux-board{grid-template-columns:repeat(3,minmax(230px,1fr))}}
@media(max-width:800px){.layout{grid-template-columns:1fr}.ux-global-search{min-width:100%;width:100%;order:3}.ux-global-search input{min-width:0}.ux-metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.ux-workspace-summary{grid-template-columns:repeat(2,minmax(0,1fr))}.ux-board{grid-template-columns:repeat(2,minmax(220px,1fr))}.table-wrap table{min-width:0}.table-wrap thead{display:none}.table-wrap tbody,.table-wrap tr,.table-wrap td{display:block;width:100%}.table-wrap tr{border:1px solid var(--border);border-radius:10px;margin:9px 0;padding:8px;background:white}.table-wrap td{white-space:normal;border:0;border-bottom:1px solid var(--border);padding:7px 7px 7px 42%}.table-wrap td:before{content:attr(data-label);float:left;width:38%;margin-left:-40%;font-size:11px;font-weight:800;color:var(--muted)}.table-wrap td:last-child{border-bottom:0}.ux-table-actions{justify-content:flex-end}.dialog-actions{position:sticky;bottom:0;background:white}}
@media(max-width:520px){.ux-metrics,.ux-financial-grid,.ux-workspace-summary{grid-template-columns:1fr}.ux-board{grid-template-columns:1fr}.ux-action,.ux-search-item{grid-template-columns:1fr}.ux-action button,.ux-search-item button{width:100%}}
</style>
<script>
(function(){
'use strict';
var ux={dashboard:null,workspace:null,workspaceTab:'overview',search:null};
var virtualModules=['salesPipeline','jobBoard','accountingHealth'];
var moduleLabels={salesPipeline:'Sales Pipeline',jobBoard:'Job Stage Board',accountingHealth:'Accounting Health'};
function arr(v){return Array.isArray(v)?v:[]}
function text(v){return String(v==null?'':v)}
function currency(v){var n=Number(String(v||0).replace(/[$,]/g,''));return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(isNaN(n)?0:n)}
function uxStatusClass(value){var v=text(value).toLowerCase();if(/approved|complete|posted|active|recorded|paid|pass|delivered/.test(v))return 'green';if(/blocked|rejected|error|voided|failed|overdue/.test(v))return 'red';if(/required|pending|review|awaiting|prepared|hold|revision|waiting/.test(v))return 'amber';if(/draft|new|open|progress|ready/.test(v))return 'blue';return 'gray'}
function pill(value){return '<span class="status '+uxStatusClass(value)+'">'+escapeHtml(value||'—')+'</span>'}
function labelFor(key){return moduleLabels[key]||(state.bootstrap&&state.bootstrap.definitions[key]&&state.bootstrap.definitions[key].title)||key}
function enabled(key){return virtualModules.includes(key)||arr(state.bootstrap&&state.bootstrap.modules).some(function(m){return m.key===key})}
function toggleBoGroup(id){var el=document.getElementById('bo-nav-'+id);if(!el)return;var open=!el.classList.contains('open');el.classList.toggle('open',open);var b=el.querySelector('.ux-nav-toggle');if(b)b.setAttribute('aria-expanded',String(open));localStorage.setItem('boNav:'+id,open?'open':'closed')}
window.toggleBoGroup=toggleBoGroup;
window.renderNav=function(){
  var groups=[
    ['work','Work',[['dashboard','Home'],['approvals','Approvals'],['documents','Documents / Upload']]],
    ['sales','Sales',[['requests','New Requests'],['customers','Customers'],['quotes','Quotes'],['salesPipeline','Sales Pipeline']]],
    ['fulfillment','Fulfillment',[['workOrders','Work Orders'],['jobs','Jobs'],['jobBoard','Job Stage Board'],['time','Time Tracking']]],
    ['purchasing','Purchasing',[['vendors','Vendors'],['purchaseOrders','Purchase Orders'],['receipts','Receipts'],['vendorBills','Vendor Bills'],['expenses','Expenses']]],
    ['revenue','Revenue',[['invoices','Invoices'],['payments','Payments']]],
    ['accounting','Accounting & Tax',[['accountingHealth','Accounting Health'],['accounting','Accounting Preparation'],['reports','Reports'],['tax','Tax Preparation'],['payroll','Payroll Preparation'],['contractors','Contractors / W-9'],['employees','Employees']]],
    ['control','Control',[['setup','Setup / Product Controls']]]
  ];
  document.getElementById('nav').innerHTML=groups.map(function(group){
    var id=group[0],items=group[2].filter(function(item){return enabled(item[0])});
    if(!items.length)return '';
    var contains=items.some(function(item){return item[0]===state.module});
    var saved=localStorage.getItem('boNav:'+id),open=contains||saved!=='closed';
    return '<section class="ux-nav-group '+(open?'open':'')+'" id="bo-nav-'+id+'"><button class="ux-nav-toggle" aria-expanded="'+open+'" onclick="toggleBoGroup(\''+id+'\')"><span>'+escapeHtml(group[1])+'</span><span aria-hidden="true">'+(open?'−':'+')+'</span></button><div class="ux-nav-items">'+items.map(function(item){return '<button class="'+(state.module===item[0]?'active':'')+'" onclick="openModule(\''+item[0]+'\')">'+escapeHtml(item[1])+'</button>'}).join('')+'</div></section>'
  }).join('')
};
function ensureGlobalSearch(){
  if(document.getElementById('boGlobalSearch'))return;
  var host=document.querySelector('.header-actions');if(!host)return;
  var wrap=document.createElement('div');wrap.className='ux-global-search';wrap.innerHTML='<input id="boGlobalSearch" aria-label="Search all Business Office records" placeholder="Search customers, jobs, invoices, files…" onkeydown="if(event.key===\'Enter\')boGlobalSearch()"><button type="button" onclick="boGlobalSearch()">Search</button>';host.insertBefore(wrap,host.firstChild)
}
window.boGlobalSearch=async function(){
  var input=document.getElementById('boGlobalSearch'),q=(input&&input.value||'').trim();if(!q)return;
  try{ux.search=await call('uxSearch',{query:q});state.module='search';renderNav();renderSearchResults(ux.search)}catch(error){ownerMessage('Search could not load all records. Nothing was changed.',true)}
};
function renderSearchResults(data){
  document.getElementById('content').innerHTML='<div class="ux-page-head"><div><div class="ux-eyebrow">Grouped global search</div><h2>Search results</h2><p>'+escapeHtml(data.total||0)+' matching records for “'+escapeHtml(data.query||'')+'”.</p></div></div><div class="ux-search-results">'+(arr(data.groups).length?arr(data.groups).map(function(group){return '<section class="ux-search-group"><h3>'+escapeHtml(group.label)+' <span class="status gray">'+group.results.length+'</span></h3>'+group.results.map(function(item){return '<div class="ux-search-item"><div><b>'+escapeHtml(item.title||item.id)+'</b><small>'+escapeHtml(item.id)+' · '+escapeHtml(item.status||'')+'</small></div><button class="ux-open" onclick="openUxWorkspace(\''+js(item.module)+'\',\''+js(item.id)+'\')">Open</button></div>'}).join('')+'</section>'}).join(''):'<div class="ux-empty"><strong>No matching records.</strong>Try a customer, job, invoice, file, task, or amount.</div>')+'</div>'
}
window.openModule=async function(module){
  state.module=module;state.selected=null;state.query='';state.filters={};state.savedViews=[];state.savedViewId='';renderNav();
  if(module==='dashboard')return renderDashboard();
  if(module==='salesPipeline')return renderUxBoard('sales');
  if(module==='jobBoard')return renderUxBoard('jobs');
  if(module==='accountingHealth')return renderAccountingHealth();
  if(module==='reports')return renderReports();
  await loadRows()
};
window.renderDashboard=function(){
  state.module='dashboard';renderNav();document.getElementById('content').innerHTML='<div class="panel">Loading action center…</div>';
  call('uxDashboard').then(function(data){ux.dashboard=data;renderUxDashboard(data)}).catch(function(error){ownerMessage('The dashboard opened without all related data. Review the affected module or try Refresh.',true)})
};
function metric(label,value,detail,action,isMoney){return '<button class="ux-metric" onclick="'+action+'"><b>'+escapeHtml(label)+'</b><strong>'+(isMoney?currency(value):escapeHtml(value))+'</strong><small>'+escapeHtml(detail)+'</small></button>'}
function renderUxDashboard(data){var m=data.metrics||{},a=data.alerts||{};
  document.getElementById('content').innerHTML='<div class="ux-page-head"><div><div class="ux-eyebrow">Operational and financial work center</div><h2>What needs to move next?</h2><p>Sales, fulfillment, purchasing, revenue, accounting preparation, approvals, and exceptions in one view.</p></div><button class="primary" onclick="openModule(\'approvals\')">Review '+escapeHtml(m.approvals||0)+' approvals</button></div>'+ 
  '<div class="ux-metrics">'+metric('Requests to review',m.requestsReview||0,'New or incomplete requests','openModule(\'requests\')')+metric('Quotes needing approval',m.quotesApproval||0,'Draft, review, or hold','openModule(\'quotes\')')+metric('Active jobs',m.activeJobs||0,(m.noNextAction||0)+' without a next action','openModule(\'jobBoard\')')+metric('Expected cash',m.expectedCash||0,(m.unpaidInvoices||0)+' unpaid invoices','openModule(\'invoices\')',true)+metric('Overdue invoices',m.overdueInvoices||0,'Past due with balance','openModule(\'invoices\')')+metric('Documents to review',m.documentsReview||0,'OCR or approval required','openModule(\'documents\')')+'</div>'+ 
  '<div class="ux-dashboard-grid"><div class="ux-stack">'+dashboardSection('Sales',processSummary(data.process.sales),'<button class="secondary" onclick="openModule(\'salesPipeline\')">Open pipeline</button>')+dashboardSection('Fulfillment',processSummary(data.process.fulfillment),'<button class="secondary" onclick="openModule(\'jobBoard\')">Open job board</button>')+dashboardActivity(data.recentActivity)+'</div><div class="ux-stack">'+financialSnapshot(m)+dashboardAlerts(a)+systemBoundary()+'</div></div>'
}
function processSummary(section){var items=[];Object.keys(section||{}).forEach(function(key){items.push('<div class="ux-alert"><span>'+escapeHtml(labelFor(key))+'</span><strong>'+arr(section[key]).length+'</strong></div>')});return '<div class="ux-alert-list">'+items.join('')+'</div>'}
function dashboardSection(title,body,actions){return '<section class="ux-section"><div class="ux-section-head"><h2>'+escapeHtml(title)+'</h2><div>'+actions+'</div></div>'+body+'</section>'}
function financialSnapshot(m){return '<section class="ux-section"><h2>Financial snapshot</h2><div class="ux-financial-grid">'+fin('Paid this month',m.paidThisMonth,true)+fin('Expenses this month',m.expensesThisMonth,true)+fin('Missing receipts',m.missingReceipts,false)+fin('Unreconciled payments',m.unreconciled,false)+fin('Jobs losing money',m.losingJobs,false)+fin('Missing tax documents',m.missingTaxDocuments,false)+'</div><div class="toolbar"><button class="secondary" onclick="openModule(\'accountingHealth\')">Accounting health</button><button class="secondary" onclick="openModule(\'reports\')">Reports</button></div></section>'}
function fin(label,value,moneyFlag){return '<div class="ux-financial"><b>'+escapeHtml(label)+'</b><span>'+(moneyFlag?currency(value):escapeHtml(value||0))+'</span></div>'}
function dashboardAlerts(a){var groups=[['Overdue invoices','overdueInvoices','invoices'],['Missing receipts','missingReceipts','expenses'],['Unreconciled payments','unreconciledPayments','payments'],['Jobs losing money','jobsLosingMoney','jobs'],['Jobs with no next action','jobsNoNextAction','jobs']];return '<section class="ux-section"><h2>Exceptions</h2><div class="ux-alert-list">'+groups.map(function(g){return '<div class="ux-alert"><span>'+escapeHtml(g[0])+'</span><strong>'+arr(a[g[1]]).length+'</strong><button class="secondary" onclick="openModule(\''+g[2]+'\')">Review</button></div>'}).join('')+'</div></section>'}
function dashboardActivity(rows){return '<section class="ux-section"><h2>Recently changed</h2><div class="ux-activity">'+(arr(rows).length?arr(rows).slice(0,12).map(function(row){return '<div class="ux-activity-row"><div><b>'+escapeHtml(row.title||row.id||row.module)+'</b><small>'+escapeHtml(labelFor(row.module))+' · '+escapeHtml(row.date||'')+'</small></div>'+pill(row.status)+'</div>'}).join(''):'<div class="ux-empty"><strong>No recent activity.</strong>New work will appear here after records are created or updated.</div>')+'</div></section>'}
function systemBoundary(){return '<section class="ux-section"><h2>Control boundary</h2><p>'+pill('Owner approval required')+'</p><p>Customer sends, delivery, financial posting, payroll export, tax finalization, money movement, and external actions remain approval gated.</p></section>'}
async function renderUxBoard(type){document.getElementById('content').innerHTML='<div class="panel">Loading board…</div>';try{var data=await call('uxPipeline',{type:type});var title=type==='jobs'?'Job Stage Board':'Sales Pipeline';document.getElementById('content').innerHTML='<div class="ux-page-head"><div><div class="ux-eyebrow">Workflow view</div><h2>'+title+'</h2><p>Every active item should have one stage, one responsible person, one next action, and one next date.</p></div></div><div class="ux-board">'+arr(data.columns).map(function(column){return '<section class="ux-board-column"><h3>'+escapeHtml(column.stage)+' <span class="status gray">'+column.records.length+'</span></h3>'+column.records.map(function(row){var id=row._uxId||'';var module=type==='jobs'?'jobs':(/QUOTE/i.test(id)?'quotes':'requests');return '<button class="ux-board-card" onclick="openUxWorkspace(\''+module+'\',\''+js(id)+'\')"><b>'+escapeHtml(row.Customer||row['Project Title']||row['Pipeline ID']||row['Job ID']||id)+'</b><small>'+escapeHtml(row['Product / Bundle ID']||row['Next Action']||row['Due Date']||'')+'</small>'+(row.Value?'<strong>'+currency(row.Value)+'</strong>':'')+'</button>'}).join('')+'</section>'}).join('')+'</div>'}catch(error){ownerMessage('The board could not load. No records were changed.',true)}}
async function renderAccountingHealth(){document.getElementById('content').innerHTML='<div class="panel">Loading accounting health…</div>';try{var data=ux.dashboard||await call('uxDashboard'),m=data.metrics||{},a=data.alerts||{};document.getElementById('content').innerHTML='<div class="ux-page-head"><div><div class="ux-eyebrow">Preparation and control</div><h2>Accounting health</h2><p>Preparation indicators only—not tax advice, filing, or automatic posting.</p></div></div><div class="ux-metrics">'+metric('Expected cash',m.expectedCash||0,'Outstanding invoice balances','openModule(\'invoices\')',true)+metric('Paid this month',m.paidThisMonth||0,'Recorded payments','openModule(\'payments\')',true)+metric('Expenses this month',m.expensesThisMonth||0,'Recorded expenses','openModule(\'expenses\')',true)+metric('Missing receipts',m.missingReceipts||0,'Expense evidence needed','openModule(\'expenses\')')+metric('Unreconciled',m.unreconciled||0,'Payments not posted/reconciled','openModule(\'payments\')')+metric('Unbalanced entries',m.unbalancedEntries||0,'Ledger review needed','openModule(\'accounting\')')+'</div>'+dashboardAlerts(a)+'<div class="toolbar"><button class="primary" onclick="openModule(\'accounting\')">Accounting preparation</button><button class="secondary" onclick="openModule(\'tax\')">Tax preparation</button><button class="secondary" onclick="openModule(\'reports\')">Financial reports</button></div>'}catch(error){ownerMessage('Accounting health could not load completely. No posting or external action occurred.',true)}}
window.renderTable=function(def){
  var fields=[def.primaryKey].concat(def.fields.filter(function(f){return f!==def.primaryKey})).slice(0,9);
  var empty='<div class="ux-empty"><strong>No '+escapeHtml(def.title.toLowerCase())+' yet.</strong>'+emptyGuidance(state.module)+'</div>';
  document.getElementById('content').innerHTML='<div class="ux-page-head"><div><div class="ux-eyebrow">'+escapeHtml(processName(state.module))+'</div><h2>'+escapeHtml(def.title)+'</h2><p>'+escapeHtml(moduleHelp(state.module))+'</p></div>'+(canCreate(state.module)?'<button class="primary" onclick="openNewRecord()">New '+escapeHtml(def.title.replace(/s$/,''))+'</button>':'')+'</div><div class="toolbar"><input id="searchBox" aria-label="Search '+escapeHtml(def.title)+'" placeholder="Search '+escapeHtml(def.title.toLowerCase())+'" value="'+escapeHtml(state.query)+'" onkeydown="if(event.key===\'Enter\')searchRows()"><select id="savedViews" aria-label="Saved views" onchange="applySavedView(this.value)"><option value="">Saved views</option>'+state.savedViews.map(function(view){return '<option value="'+escapeHtml(view['Saved View ID'])+'" '+(state.savedViewId===view['Saved View ID']?'selected':'')+'>'+escapeHtml(view['View Name'])+'</option>'}).join('')+'</select><button class="secondary" onclick="searchRows()">Search</button><button class="secondary" onclick="clearView()">Clear</button><button class="secondary" onclick="loadRows()">Refresh</button>'+(state.module==='documents'?'<button class="primary" onclick="openUpload()">Upload PDF / Take Picture</button>':'')+'</div><div id="selectionActions"></div><div class="table-wrap">'+(state.rows.length?'<table><thead><tr>'+fields.map(function(f){return '<th>'+escapeHtml(f)+'</th>'}).join('')+'<th>Action</th></tr></thead><tbody>'+state.rows.map(function(row,index){var id=row[def.primaryKey]||'';return '<tr>'+fields.map(function(f){return '<td data-label="'+escapeHtml(f)+'">'+formatCell(f,row[f])+'</td>'}).join('')+'<td data-label="Action"><div class="ux-table-actions"><button class="ux-open" onclick="openUxWorkspace(\''+state.module+'\',\''+js(id)+'\')">Open</button><button class="secondary" onclick="selectRow('+index+')">Select</button></div></td></tr>'}).join('')+'</tbody></table>':empty)+'</div>';
  renderSelectionActions()
};
function processName(module){if(['requests','customers','quotes'].includes(module))return 'Sales';if(['workOrders','jobs','time','documents'].includes(module))return 'Fulfillment';if(['vendors','purchaseOrders','receipts','vendorBills','expenses'].includes(module))return 'Purchasing';if(['invoices','payments'].includes(module))return 'Revenue';return 'Accounting and control'}
function moduleHelp(module){var map={requests:'Review new requests and move each one toward a product recommendation or hold.',customers:'Open one customer workspace for jobs, money, files, approvals, and history.',quotes:'Review scope, price, assumptions, exclusions, turnaround, revisions, and approval state.',workOrders:'Connect accepted scope to the work that must be performed.',jobs:'Every active job needs one current stage, next action, owner, and due date.',invoices:'See total, paid, balance, due date, age, payment history, and reminder state.',payments:'Record amount, date, method, invoice, reference, deposit, and reconciliation status.',expenses:'Track evidence, category, approval, posting, and job/customer links.',documents:'Review original files, OCR suggestions, field approvals, and posting state.',accounting:'Prepare balanced entries and preserve approval gates.',tax:'Preparation and document control only; no direct filing.',payroll:'Preparation and approved export only; no funding.'};return map[module]||'Open a record to view related work, money, files, approvals, proof, and timeline.'}
function emptyGuidance(module){var map={invoices:'Create an invoice from an approved job or open an existing job workspace.',quotes:'Create a quote from a reviewed request and customer.',jobs:'Convert an accepted quote or create an internal job record.',payments:'Record a payment against an existing invoice.',documents:'Upload a PDF or take a picture to begin private review.',expenses:'Upload a receipt or create an approved expense record.'};return escapeHtml(map[module]||'Use New record or open the related customer/job workflow to create the first item.')}
window.openEditor=function(row){
  var def=state.bootstrap.definitions[state.module],form=document.getElementById('recordForm');document.getElementById('dialogTitle').textContent=(row?'Edit ':'New ')+def.title.replace(/s$/,'');
  form.innerHTML='<div class="ux-form-note"><strong>Internal record only.</strong> Required fields are marked. Customer sends, money movement, posting, payroll funding, tax filing, and delivery remain locked.</div>'+def.fields.map(function(field){var value=row?row[field]||'':'';return uxFormField(field,value)}).join('');form.dataset.recordId=row?row[def.primaryKey]||'':'';document.getElementById('recordDialog').showModal()
};
function uxFormField(field,value){var long=/Notes|Scope|Assumptions|Exclusions|Description|Checklist|Problem|Result|Address/.test(field),required=/Display Name|Project Title|Status|Date|Customer ID|Vendor ID|Amount|Total|Description/.test(field),type=/Date$| Date$/.test(field)?'date':/Amount|Price|Total|Balance|Revenue|Spend|Budget|Tax|Rate|Hours|Margin/.test(field)?'number':'text',options=null;if(/Status$|Approval Status|Posting Status|Review Status/.test(field))options=['Draft','Active','In progress','Waiting','Owner review','Approved','Complete','On hold','Blocked','Rejected'];if(field==='Priority')options=['Low','Normal','High','Urgent'];var control=options?'<select name="'+escapeHtml(field)+'"><option value="">Choose…</option>'+options.map(function(o){return '<option '+(String(value)===o?'selected':'')+'>'+escapeHtml(o)+'</option>'}).join('')+'</select>':long?'<textarea name="'+escapeHtml(field)+'">'+escapeHtml(value)+'</textarea>':'<input name="'+escapeHtml(field)+'" type="'+type+'" '+(type==='number'?'step="0.01"':'')+' value="'+escapeHtml(value)+'">';return '<label class="'+(long?'full':'')+'">'+escapeHtml(field)+(required?' <span class="ux-required" aria-label="required">*</span>':'')+control+'</label>'}
function ensureWorkspaceDialog(){if(document.getElementById('uxWorkspaceDialog'))return;var d=document.createElement('dialog');d.id='uxWorkspaceDialog';d.innerHTML='<div class="dialog-head"><strong id="uxWorkspaceTitle">Workspace</strong><button class="secondary" onclick="closeUxWorkspace()">Close</button></div><div class="dialog-body" id="uxWorkspaceBody"></div><div class="dialog-actions"><button class="secondary" onclick="closeUxWorkspace()">Close</button></div>';document.body.appendChild(d)}
window.openUxWorkspace=async function(module,id){ensureWorkspaceDialog();document.getElementById('uxWorkspaceTitle').textContent='Loading workspace…';document.getElementById('uxWorkspaceBody').innerHTML='<div class="panel">Loading related records…</div>';document.getElementById('uxWorkspaceDialog').showModal();try{ux.workspace=await call('uxWorkspace',{module:module,recordId:id});ux.workspaceTab='overview';renderUxWorkspace()}catch(error){document.getElementById('uxWorkspaceBody').innerHTML='<div class="notice"><strong>This record opened without all related data.</strong><br>The record is safe. Refresh or review the affected module for details.</div>';ownerMessage('Related data could not be loaded. No record was changed.',true)}};
window.closeUxWorkspace=function(){document.getElementById('uxWorkspaceDialog').close();ux.workspace=null};
window.setUxWorkspaceTab=function(tab){ux.workspaceTab=tab;renderUxWorkspace()};
function renderUxWorkspace(){var w=ux.workspace||{},s=w.summary||{},primary=w.primary||{};document.getElementById('uxWorkspaceTitle').textContent=primary['Display Name']||primary['Project Title']||primary['File Name']||w.recordId||'Workspace';var tabs=[['overview','Overview'],['tasks','Related records'],['money','Money'],['files','Files'],['approvals','Approvals'],['timeline','Timeline']];document.getElementById('uxWorkspaceBody').innerHTML='<div class="ux-breadcrumbs">'+escapeHtml(labelFor(w.module))+' → '+escapeHtml(w.recordId||'')+'</div><div class="ux-workspace-head"><div><h2>'+escapeHtml(primary['Display Name']||primary['Project Title']||w.recordId)+'</h2><div>'+pill(s.stage||primary.Status||primary.Stage)+'</div></div><div><strong>Next action:</strong> '+escapeHtml(s.nextAction||'No next action recorded')+'<br><strong>Due:</strong> '+escapeHtml(s.dueDate||'—')+'</div></div><div class="ux-workspace-summary">'+summaryCard('Customer',s.customer)+summaryCard('Job',s.job)+summaryCard('Outstanding',currency(s.outstanding||0))+summaryCard('Estimated gross profit',currency(s.estimatedGrossProfit||0))+summaryCard('Approvals',s.approvals||0)+summaryCard('Documents',s.documents||0)+'</div><div class="ux-tabs">'+tabs.map(function(t){return '<button class="ux-tab '+(ux.workspaceTab===t[0]?'active':'')+'" onclick="setUxWorkspaceTab(\''+t[0]+'\')">'+t[1]+'</button>'}).join('')+'</div><div id="uxWorkspaceSection">'+workspaceSection(w)+'</div><div class="notice"><strong>Control boundary:</strong> '+escapeHtml(w.boundary||'Selected-record approval remains required.')+'</div>'}
function summaryCard(label,value){return '<div class="ux-summary-card"><b>'+escapeHtml(label)+'</b><span>'+escapeHtml(value==null?'—':value)+'</span></div>'}
function workspaceSection(w){if(ux.workspaceTab==='overview')return '<h3>Focused record</h3>'+recordGrid(w.primary);if(ux.workspaceTab==='timeline')return timeline(w.timeline);var related=w.related||{};if(ux.workspaceTab==='files')return relatedTable('documents',related.documents||[]);if(ux.workspaceTab==='approvals')return relatedTable('approvals',related.approvals||[]);if(ux.workspaceTab==='money')return ['quotes','purchaseOrders','expenses','invoices','payments','accounting'].map(function(k){return relatedTable(k,related[k]||[])}).join('');return Object.keys(related).filter(function(k){return !['customers','documents','approvals','quotes','purchaseOrders','expenses','invoices','payments','accounting'].includes(k)}).map(function(k){return relatedTable(k,related[k]||[])}).join('')}
function recordGrid(row){return '<div class="ux-record-grid">'+Object.keys(row||{}).filter(function(k){return k.charAt(0)!=='_'}).map(function(k){return '<div class="ux-record-field"><b>'+escapeHtml(k)+'</b>'+formatCell(k,row[k])+'</div>'}).join('')+'</div>'}
function relatedTable(module,rows){rows=arr(rows);if(!rows.length)return '';var keys=Object.keys(rows[0]).filter(function(k){return k.charAt(0)!=='_'}).slice(0,6);return '<section class="panel"><h3>'+escapeHtml(labelFor(module))+' <span class="status gray">'+rows.length+'</span></h3><div class="table-wrap"><table><thead><tr>'+keys.map(function(k){return '<th>'+escapeHtml(k)+'</th>'}).join('')+'</tr></thead><tbody>'+rows.map(function(row){return '<tr>'+keys.map(function(k){return '<td data-label="'+escapeHtml(k)+'">'+formatCell(k,row[k])+'</td>'}).join('')+'</tr>'}).join('')+'</tbody></table></div></section>'}
function timeline(rows){rows=arr(rows);return '<div class="ux-timeline">'+(rows.length?rows.map(function(row){return '<div class="ux-timeline-row"><b>'+escapeHtml(row.title||row.id||row.module)+'</b><small>'+escapeHtml(labelFor(row.module))+' · '+escapeHtml(row.date||'')+'</small>'+pill(row.status)+'</div>'}).join(''):'<div class="ux-empty"><strong>No activity recorded yet.</strong>Changes to linked records will appear here.</div>')+'</div>'}
function ownerMessage(message,error){showToast(message,!!error)}
function initUx(){ensureGlobalSearch();ensureWorkspaceDialog();if(state.bootstrap){renderNav();if(state.module==='dashboard')renderDashboard()}}
var tries=0,timer=setInterval(function(){tries++;ensureGlobalSearch();ensureWorkspaceDialog();if(state.bootstrap){clearInterval(timer);renderNav();if(state.module==='dashboard')renderDashboard()}else if(tries>80)clearInterval(timer)},100);
window.addEventListener('keydown',function(event){if(event.key==='/'&&!/input|textarea|select/i.test(document.activeElement.tagName)){event.preventDefault();document.getElementById('boGlobalSearch')?.focus()}if(event.key==='Escape'){var d=document.getElementById('uxWorkspaceDialog');if(d&&d.open)d.close()}});
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initUx,{once:true});else initUx()
})();
</script>
