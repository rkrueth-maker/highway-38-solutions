<style>
:root{--h38-ai-accent:#2563eb;--h38-ai-ink:#17212b;--h38-ai-soft:#eef5ff;--h38-ai-line:#d8e3f0;--h38-surface:#fff;--h38-bg:#f4f7fb;--h38-shadow:0 8px 24px rgba(23,43,77,.07)}
body{background:var(--h38-bg)!important}
#ownerTopbar{position:sticky;top:0;z-index:120;display:flex;align-items:center;gap:8px;padding:10px 12px!important;background:rgba(12,29,48,.96)!important;backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
#ownerTopbar #search,#ownerTopbar #search+button{display:none!important}
#ownerTopbar #quickCreate,#ownerTopbar #quickCreate+button{display:none!important}
#ownerTopbar .command-trigger{min-width:240px;flex:1;max-width:520px;justify-content:space-between!important;background:rgba(255,255,255,.08)!important;border-color:rgba(255,255,255,.14)!important;color:#f8fbff!important}
#ownerTopbar #savedViews{max-width:150px;background:#fff}
#ownerTopbar .h38-new-record{min-width:86px;background:#18a0fb!important;color:#fff!important;border-color:#18a0fb!important;font-weight:900}
#ownerTopbar .h38-refresh{width:40px;min-width:40px;padding:9px!important;font-size:0}.h38-refresh:before{content:'↻';font-size:18px}
#h38-ai-launch{display:inline-flex!important;align-items:center;gap:8px;border-radius:11px!important;padding:10px 14px!important;background:linear-gradient(135deg,#1d4ed8,#2563eb)!important;box-shadow:0 6px 18px rgba(37,99,235,.22)!important}
#h38-ai-launch:before{content:'✦';font-size:15px}#h38-ai-launch:not(.h38-ai-inline){display:none!important}
#h38-ai-panel{width:min(500px,100vw)!important;background:#f7f9fc!important;border-left:1px solid var(--h38-ai-line)}.h38-ai-head{padding:18px 20px!important;background:linear-gradient(135deg,#172b4d,#24456c)!important}.h38-ai-tools{grid-template-columns:repeat(2,minmax(0,1fr))!important;padding:12px 14px!important;background:#fff;gap:9px!important}.h38-ai-tools button{min-height:42px;text-align:left;font-weight:800;background:#fff!important;border-color:var(--h38-ai-line)!important}.h38-ai-log{padding:18px!important;background:#f7f9fc!important}.h38-ai-msg{border-radius:14px!important;line-height:1.5}.h38-ai-bot{box-shadow:0 4px 14px rgba(23,43,77,.06)}.h38-ai-compose{background:#fff;padding:14px!important}.h38-ai-compose textarea{border-radius:12px!important;border-color:#b8c8db!important;min-height:92px!important}
.h38-native-ai-strip{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:0 0 14px;padding:12px 14px;background:linear-gradient(135deg,#fbfdff,#eef5ff);border:1px solid var(--h38-ai-line);border-radius:14px;box-shadow:0 4px 14px rgba(23,43,77,.045)}
.h38-ai-strip-copy{min-width:190px}.h38-ai-label{display:flex;align-items:center;gap:7px;color:#1d4ed8;font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.h38-ai-label:before{content:'✦';font-size:13px}.h38-ai-strip-copy strong{display:block;margin-top:3px;color:#20354e}.h38-ai-prompt-row{display:flex;flex:1;gap:7px;overflow-x:auto;padding:2px}.h38-ai-prompt{white-space:nowrap;border:1px solid #bfd0e5;border-radius:999px;background:#fff;color:#24456c;padding:7px 10px;font-weight:800;cursor:pointer}.h38-ai-prompt:hover{background:#eef5ff;border-color:#7ea5d6}.h38-ai-open{border:0;border-radius:9px;background:#1d4ed8;color:#fff;padding:9px 12px;font-weight:900;cursor:pointer;white-space:nowrap}
#view{max-width:1500px;margin:0 auto;padding:18px 18px 34px}.ux-metrics{gap:10px!important}.ux-metric{border-radius:14px!important;box-shadow:none!important;border:1px solid #dde6ef!important;background:#fff!important;min-height:104px}.ux-section,.card{border-radius:15px!important;border-color:#dfe7ef!important;box-shadow:0 4px 16px rgba(23,43,77,.045)!important}.ux-page-head{padding:2px 0 10px}.ux-page-head h1{letter-spacing:-.025em;margin-bottom:4px}.nav-group-toggle{font-size:11px!important;letter-spacing:.05em;text-transform:uppercase}.nav-group-items button{border-radius:8px!important;min-height:38px}.nav-group-items button.active{font-weight:900!important}
#notice.notice.ok{display:none!important}#notice.notice.hold,#notice.notice.bad{border-radius:10px!important;padding:9px 12px!important;font-size:12px!important;margin:10px 18px 0!important}.h38-control-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid #d7b45b;background:#fff8df;color:#6f5313;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}.h38-control-chip:before{content:'🔒';font-size:12px}
.h38-loading-shell{display:grid;gap:14px}.h38-loading-hero,.h38-loading-card{border-radius:15px;background:linear-gradient(90deg,#edf1f6 25%,#f8fafc 40%,#edf1f6 60%);background-size:300% 100%;animation:h38Shimmer 1.35s infinite}.h38-loading-hero{height:110px}.h38-loading-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.h38-loading-card{height:120px}@keyframes h38Shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
body.h38-ai-panel-open:before{content:'';position:fixed;inset:0;background:rgba(13,26,45,.22);z-index:9997;pointer-events:none}
@media(max-width:1000px){#ownerTopbar #savedViews{display:none}.h38-native-ai-strip{align-items:flex-start}.h38-ai-strip-copy{display:none}.h38-loading-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:800px){#ownerTopbar{gap:6px;padding:8px!important}#ownerTopbar .command-trigger{min-width:0;max-width:none}#ownerTopbar .command-trigger span:first-child{font-size:0}#ownerTopbar .command-trigger span:first-child:after{content:'Search';font-size:13px}#ownerTopbar .h38-new-record{min-width:42px;width:42px;font-size:0}.h38-new-record:before{content:'+';font-size:22px}#h38-ai-launch{padding:9px 10px!important;font-size:0}#h38-ai-launch:before{font-size:17px}#h38-ai-panel{width:100vw!important}.h38-native-ai-strip{margin:0 0 12px;padding:10px}.h38-ai-prompt-row{overflow-x:auto}.h38-ai-open{display:none}.ux-metrics{grid-template-columns:repeat(2,minmax(0,1fr))!important}.h38-loading-grid{grid-template-columns:1fr}#view{padding:12px 10px 86px}}
</style>
<script>
(function(){
 'use strict';
 var wrappedDashboard=false,observer=null,lastRoute='';
 function currentRoute(){return String(typeof CURRENT!=='undefined'?CURRENT:'today').replace(/^bo:/,'');}
 function aiOpen(prompt){var launch=document.getElementById('h38-ai-launch');if(launch)launch.click();setTimeout(function(){var input=document.getElementById('h38-ai-input');if(input&&prompt){input.value=prompt;input.focus();}},40);}
 window.h38AiOpenPrompt=aiOpen;
 function prompts(){var route=currentRoute();var map={today:['Give me today’s business brief','What needs my attention first?','Find stalled work'],customers:['Summarize this customer','Who needs follow-up?','Find missing next actions'],requests:['Triage new requests','Draft missing intake questions','Choose the next quote'],quotes:['Review scope and risk','Show aging quotes','Draft follow-up'],workOrders:['Find missing information','What is ready to schedule?','Show blocked work'],jobs:['Summarize job health','Find delay risk','Build field priorities'],invoices:['Show overdue risk','Which invoices need follow-up?','Draft payment reminder'],expenses:['Find missing receipts','Summarize spending','Flag unusual expenses'],documents:['Summarize documents','Find items needing review','Extract action items'],reports:['Explain the numbers','What changed?','Find improvements'],decisions:['Summarize approvals','What should I approve first?','Explain downstream impact'],approvalsCenter:['Summarize approvals','What should I approve first?','Explain downstream impact']};return map[route]||['Summarize this workspace','What needs attention?','Teach me the next step'];}
 function strip(){var items=prompts();return '<div class="h38-native-ai-strip" data-h38-ai-native="1"><div class="h38-ai-strip-copy"><div class="h38-ai-label">H38 AI</div><strong>Work with the current screen</strong></div><div class="h38-ai-prompt-row">'+items.map(function(p){return '<button class="h38-ai-prompt" onclick="h38AiOpenPrompt(\''+attr(p)+'\')">'+esc(p)+'</button>';}).join('')+'</div><button class="h38-ai-open" onclick="h38AiOpenPrompt(\'\')">Open AI</button></div>';}
 function configureTopbar(){var top=document.getElementById('ownerTopbar');if(!top)return;var command=document.getElementById('commandTrigger');if(command){var label=command.querySelector('span');if(label)label.textContent='Search anything';}var create=document.getElementById('h38NewRecord');if(!create){create=document.createElement('button');create.id='h38NewRecord';create.className='btn h38-new-record';create.type='button';create.textContent='New';create.onclick=function(){if(typeof h38OpenCommandPalette==='function')h38OpenCommandPalette('create ');};var saved=document.getElementById('savedViews');top.insertBefore(create,saved||document.getElementById('h38-ai-launch')||null);}var refreshButtons=[].slice.call(top.querySelectorAll('button')).filter(function(button){return (button.textContent||'').trim()==='Refresh';});refreshButtons.forEach(function(button){button.classList.add('h38-refresh');button.title='Refresh workspace';button.setAttribute('aria-label','Refresh workspace');});}
 function removeDuplicateAi(){document.querySelectorAll('#view button,.ux-page-head button').forEach(function(button){if(button.id!=='h38-ai-launch'&&/ask h38 ai/i.test((button.textContent||'').trim()))button.style.display='none';});}
 function collapseForRoute(){var route=currentRoute();if(route===lastRoute)return;lastRoute=route;var active=document.querySelector('.nav-group-items button.active');document.querySelectorAll('.nav-group').forEach(function(group){var contains=!!(active&&group.contains(active));group.classList.toggle('open',contains);var toggle=group.querySelector('.nav-group-toggle');if(toggle)toggle.setAttribute('aria-expanded',contains?'true':'false');});}
 function compactControlNotice(){var notice=document.getElementById('notice');if(!notice)return;var text=(notice.textContent||'').replace(/\s+/g,' ').trim();if(/external actions remain locked|controlled business system|customer sending/i.test(text)){notice.className='';notice.innerHTML='<span class="h38-control-chip" title="Customer sends, financial posting, payroll export, tax finalization, publishing, advertising spend, and SMS remain approval-gated.">Owner-controlled actions</span>';}}
 function loadingSkeleton(){var view=document.getElementById('view');if(!view)return;var loading=view.querySelector('[data-h38-workspace-state="loading"]');if(loading&&!loading.querySelector('.h38-loading-shell'))loading.innerHTML='<div class="h38-loading-shell" aria-label="Loading workspace"><div class="h38-loading-hero"></div><div class="h38-loading-grid"><div class="h38-loading-card"></div><div class="h38-loading-card"></div><div class="h38-loading-card"></div></div></div>';}
 function inject(){configureTopbar();removeDuplicateAi();collapseForRoute();compactControlNotice();loadingSkeleton();var view=document.getElementById('view');if(!view||view.querySelector('[data-h38-ai-native]')||view.querySelector('[data-h38-workspace-state="loading"]'))return;view.insertAdjacentHTML('afterbegin',strip());}
 function wrapDashboard(){if(wrappedDashboard||typeof window.renderDashboard!=='function')return;wrappedDashboard=true;var base=window.renderDashboard;window.renderDashboard=function(){var result=base.apply(this,arguments);setTimeout(inject,0);return result;};}
 function observe(){if(observer)return;observer=new MutationObserver(function(){clearTimeout(window.__h38PolishTimer);window.__h38PolishTimer=setTimeout(inject,30);});observer.observe(document.body,{childList:true,subtree:true});}
 function panelState(){var panel=document.getElementById('h38-ai-panel');if(!panel)return;new MutationObserver(function(){document.body.classList.toggle('h38-ai-panel-open',panel.classList.contains('open'));}).observe(panel,{attributes:true,attributeFilter:['class']});}
 function boot(){wrapDashboard();observe();panelState();setTimeout(inject,120);}
 if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
})();
</script>
