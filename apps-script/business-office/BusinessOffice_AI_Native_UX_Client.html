<style>
:root{--h38-ai-accent:#2563eb;--h38-ai-ink:#17212b;--h38-ai-soft:#eef5ff;--h38-ai-line:#d8e3f0;--h38-surface:#fff;--h38-bg:#f4f7fb;--h38-shadow:0 8px 24px rgba(23,43,77,.07);--h38-dark:#0d1d30;--h38-dark-2:#132b45;--h38-dark-card:#13263b;--h38-dark-line:rgba(255,255,255,.1);--h38-dark-text:#eef6ff;--h38-dark-muted:#9fb3c8}

#h38-ai-panel{width:min(500px,100vw)!important;background:#f7f9fc!important;border-left:1px solid var(--h38-ai-line)}#h38-ai-panel:not(.open){visibility:hidden!important;pointer-events:none!important;right:-520px!important;box-shadow:none!important}.h38-ai-head{padding:18px 20px!important;background:linear-gradient(135deg,#172b4d,#24456c)!important}.h38-ai-tools{grid-template-columns:repeat(2,minmax(0,1fr))!important;padding:12px 14px!important;background:#fff;gap:9px!important}.h38-ai-tools button{min-height:42px;text-align:left;font-weight:800;background:#fff!important;border-color:var(--h38-ai-line)!important}.h38-ai-log{padding:18px!important;background:#f7f9fc!important}.h38-ai-msg{border-radius:14px!important;line-height:1.5}.h38-ai-bot{box-shadow:0 4px 14px rgba(23,43,77,.06)}.h38-ai-compose{background:#fff;padding:14px!important}.h38-ai-compose textarea{border-radius:12px!important;border-color:#b8c8db!important;min-height:92px!important}

.h38-ai-strip-copy{min-width:112px}.h38-ai-label{display:flex;align-items:center;gap:6px;color:#1d4ed8;font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.h38-ai-label:before{content:'✦';font-size:12px}.h38-ai-strip-copy strong{display:block;margin-top:1px;color:#20354e;font-size:12px}.h38-ai-prompt-row{display:flex;flex:1;gap:6px;overflow-x:auto;padding:1px}.h38-ai-prompt{white-space:nowrap;border:1px solid #bfd0e5;border-radius:999px;background:#fff;color:#24456c;padding:6px 9px;font-size:11px;font-weight:800;cursor:pointer}.h38-ai-prompt:hover{background:#eef5ff;border-color:#7ea5d6}.h38-ai-open{border:0;border-radius:8px;background:#1d4ed8;color:#fff;padding:7px 10px;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap}
#view{max-width:1500px;margin:0 auto;padding:10px 14px 30px}.ux-metrics{gap:9px!important}.ux-metric{border-radius:13px!important;box-shadow:none!important;border:1px solid #dde6ef!important;background:#fff!important;min-height:96px}.ux-section,.card{border-radius:14px!important;border-color:#dfe7ef!important;box-shadow:0 3px 13px rgba(23,43,77,.04)!important}.ux-page-head{padding:0 0 8px}.ux-page-head h1{letter-spacing:-.025em;margin-bottom:3px}.nav-group-toggle{font-size:10px!important;letter-spacing:.05em;text-transform:uppercase}.nav-group-items button{border-radius:8px!important;min-height:36px}.nav-group-items button.active{font-weight:900!important}
#notice{display:none!important}.h38-control-chip{display:none!important}
.h38-loading-shell{display:grid;gap:12px}.h38-loading-hero,.h38-loading-card{border-radius:14px;background:linear-gradient(90deg,#edf1f6 25%,#f8fafc 40%,#edf1f6 60%);background-size:300% 100%;animation:h38Shimmer 1.35s infinite}.h38-loading-hero{height:92px}.h38-loading-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.h38-loading-card{height:105px}@keyframes h38Shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
body.h38-ai-panel-open:before{content:'';position:fixed;inset:0;background:rgba(13,26,45,.22);z-index:9997;pointer-events:none}
#side .h38-rail-redundant{display:none!important}
/* Unified dark treatment for every embedded Business Office workspace. */

body.h38-business-module #view>.h38-native-ai-strip .h38-ai-strip-copy strong,body.h38-business-module #view>.h38-native-ai-strip .h38-ai-label{color:var(--h38-dark-text)}

body.h38-business-module #view h1,body.h38-business-module #view h2,body.h38-business-module #view h3,body.h38-business-module #view h4,body.h38-business-module #view strong,body.h38-business-module #view b{color:var(--h38-dark-text)}
body.h38-business-module #view p,body.h38-business-module #view small,body.h38-business-module #view .muted,body.h38-business-module #view .help,body.h38-business-module #view .subtle{color:var(--h38-dark-muted)!important}
body.h38-business-module #view .card,body.h38-business-module #view .panel,body.h38-business-module #view .section,body.h38-business-module #view .ux-section,body.h38-business-module #view .module-card,body.h38-business-module #view .workspace-card,body.h38-business-module #view .table-wrap{background:var(--h38-dark-card)!important;border:1px solid var(--h38-dark-line)!important;box-shadow:none!important;color:var(--h38-dark-text)!important;border-radius:12px!important}
body.h38-business-module #view .workspace-head,body.h38-business-module #view .module-head,body.h38-business-module #view .page-head,body.h38-business-module #view .ux-page-head{padding:0 0 10px!important;margin:0 0 10px!important;border-bottom:1px solid var(--h38-dark-line)!important;background:transparent!important}
body.h38-business-module #view .toolbar,body.h38-business-module #view .filters,body.h38-business-module #view .filter-bar,body.h38-business-module #view .module-toolbar{background:rgba(255,255,255,.045)!important;border:1px solid var(--h38-dark-line)!important;border-radius:10px!important;padding:8px!important;gap:7px!important}
body.h38-business-module #view input,body.h38-business-module #view select,body.h38-business-module #view textarea{background:#0c1c2d!important;color:var(--h38-dark-text)!important;border:1px solid rgba(255,255,255,.16)!important;border-radius:8px!important;min-height:38px!important}

body.h38-business-module #view button,body.h38-business-module #view .btn{border-radius:8px!important;min-height:36px}
body.h38-business-module #view button:not(.primary):not(.danger):not(.h38-ai-prompt):not(.h38-ai-open),body.h38-business-module #view .btn:not(.primary):not(.danger){background:rgba(255,255,255,.075)!important;color:var(--h38-dark-text)!important;border:1px solid var(--h38-dark-line)!important}
body.h38-business-module #view button.primary,body.h38-business-module #view .btn.primary{background:#1597e5!important;color:#fff!important;border-color:#1597e5!important}
body.h38-business-module #view table{width:100%;border-collapse:separate!important;border-spacing:0!important;background:transparent!important;color:var(--h38-dark-text)!important}
body.h38-business-module #view thead th{position:sticky;top:0;background:#102238!important;color:#b9cee2!important;border-bottom:1px solid var(--h38-dark-line)!important;font-size:10px!important;letter-spacing:.05em;text-transform:uppercase;padding:10px 9px!important}
body.h38-business-module #view tbody td{background:transparent!important;color:var(--h38-dark-text)!important;border-bottom:1px solid rgba(255,255,255,.07)!important;padding:10px 9px!important}
body.h38-business-module #view tbody tr:hover td{background:rgba(53,151,229,.09)!important}
body.h38-business-module #view a{color:#6ec5ff!important}
body.h38-business-module #view .status,body.h38-business-module #view .pill{box-shadow:none!important;border:1px solid rgba(255,255,255,.08)}
body.h38-business-module #view .empty,body.h38-business-module #view .ux-empty{background:rgba(255,255,255,.035)!important;border-color:rgba(255,255,255,.15)!important;color:var(--h38-dark-muted)!important}
body.h38-business-module #view [data-h38-workspace-state="loading"]{background:transparent!important;border:0!important;padding:0!important}
body.h38-business-module #view .h38-loading-hero,body.h38-business-module #view .h38-loading-card{background:linear-gradient(90deg,#13263b 25%,#1a334e 40%,#13263b 60%);background-size:300% 100%}
@media(max-width:1000px){.h38-native-ai-strip{align-items:flex-start}.h38-ai-strip-copy{display:none}.h38-loading-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:800px){#ownerTopbar{gap:5px;padding:7px!important}#ownerTopbar .command-trigger{min-width:0;max-width:none}#ownerTopbar .command-trigger span:first-child{font-size:0}#ownerTopbar .command-trigger span:first-child:after{content:'Search';font-size:13px}#ownerTopbar .h38-new-record{min-width:40px;width:40px;font-size:0}.h38-new-record:before{content:'+';font-size:21px}#h38-ai-launch{padding:8px 9px!important;font-size:0}#h38-ai-launch:before{font-size:16px}#h38-ai-panel{width:100vw!important}.h38-native-ai-strip{margin:0 0 8px;padding:8px}.h38-ai-prompt-row{overflow-x:auto}.h38-ai-open{display:none}.ux-metrics{grid-template-columns:repeat(2,minmax(0,1fr))!important}.h38-loading-grid{grid-template-columns:1fr}#view{padding:8px 8px 86px}body.h38-business-module #view .toolbar,body.h38-business-module #view .filters{align-items:stretch!important}body.h38-business-module #view .toolbar>*{width:100%}}
</style>
<script>
(function(){
 'use strict';
 var wrappedDashboard=false,observer=null,lastRoute='';
 function currentRoute(){return String(typeof CURRENT!=='undefined'?CURRENT:'today').replace(/^bo:/,'');}
 function aiOpen(prompt){var launch=document.getElementById('h38-ai-launch');if(launch)launch.click();setTimeout(function(){var input=document.getElementById('h38-ai-input');if(input&&prompt){input.value=prompt;input.focus();}},40);}
 window.h38AiOpenPrompt=aiOpen;
 function prompts(){var route=currentRoute();var map={today:['Today’s brief','First priority','Find stalled work'],customers:['Summarize customer','Who needs follow-up?','Missing next actions'],requests:['Triage requests','Missing intake questions','Choose next quote'],quotes:['Review scope and risk','Aging quotes','Draft follow-up'],workOrders:['Missing information','Ready to schedule','Blocked work'],jobs:['Job health','Delay risk','Field priorities'],invoices:['Overdue risk','Needs follow-up','Payment reminder'],expenses:['Missing receipts','Spending summary','Unusual expenses'],documents:['Summarize documents','Needs review','Extract actions'],reports:['Explain numbers','What changed?','Find improvements'],decisions:['Summarize approvals','Approve first','Downstream impact'],approvalsCenter:['Summarize approvals','Approve first','Downstream impact']};return map[route]||['Summarize workspace','What needs attention?','Next best step'];}
 function strip(){var items=prompts();return '<div class="h38-native-ai-strip" data-h38-ai-native="1"><div class="h38-ai-strip-copy"><div class="h38-ai-label">H38 AI</div><strong>Current screen</strong></div><div class="h38-ai-prompt-row">'+items.map(function(p){return '<button class="h38-ai-prompt" onclick="h38AiOpenPrompt(\''+attr(p)+'\')">'+esc(p)+'</button>';}).join('')+'</div><button class="h38-ai-open" onclick="h38AiOpenPrompt(\'\')">Open AI</button></div>';}
 function configureTopbar(){var top=document.getElementById('ownerTopbar');if(!top)return;var command=document.getElementById('commandTrigger');if(command){var label=command.querySelector('span');if(label)label.textContent='Search anything';}var create=document.getElementById('h38NewRecord');if(!create){create=document.createElement('button');create.id='h38NewRecord';create.className='btn h38-new-record';create.type='button';create.textContent='New';create.onclick=function(){if(typeof h38OpenCommandPalette==='function')h38OpenCommandPalette('create ');};top.insertBefore(create,document.getElementById('h38-ai-launch')||null);}var refreshButtons=[].slice.call(top.querySelectorAll('button')).filter(function(button){return (button.textContent||'').trim()==='Refresh';});refreshButtons.forEach(function(button){button.classList.add('h38-refresh');button.title='Refresh workspace';button.setAttribute('aria-label','Refresh workspace');});}
 function removeDuplicateAi(){document.querySelectorAll('#view button,.ux-page-head button').forEach(function(button){if(button.id!=='h38-ai-launch'&&/ask h38 ai/i.test((button.textContent||'').trim()))button.style.display='none';});}
 function simplifyRail(){var side=document.getElementById('side');if(!side)return;[].slice.call(side.querySelectorAll('*')).forEach(function(node){if(node.closest('.brand'))return;var text=(node.textContent||'').replace(/\s+/g,' ').trim();if(['Business Office','Control Center','Business Apps'].indexOf(text)>=0&&node.children.length===0)node.classList.add('h38-rail-redundant');});}
 function collapseForRoute(){var route=currentRoute();if(route===lastRoute)return;lastRoute=route;var active=document.querySelector('.nav-group-items button.active');document.querySelectorAll('.nav-group').forEach(function(group){var contains=!!(active&&group.contains(active));group.classList.toggle('open',contains);var toggle=group.querySelector('.nav-group-toggle');if(toggle)toggle.setAttribute('aria-expanded',contains?'true':'false');});}
 function compactControlNotice(){var notice=document.getElementById('notice');if(!notice)return;var text=(notice.textContent||'').replace(/\s+/g,' ').trim();if(/external actions remain locked|controlled business system|customer sending/i.test(text)){notice.className='';notice.innerHTML='<span class="h38-control-chip">Owner-controlled actions</span>';}}
 function loadingSkeleton(){var view=document.getElementById('view');if(!view)return;var loading=view.querySelector('[data-h38-workspace-state="loading"]');if(loading&&!loading.querySelector('.h38-loading-shell'))loading.innerHTML='<div class="h38-loading-shell" aria-label="Loading workspace"><div class="h38-loading-hero"></div><div class="h38-loading-grid"><div class="h38-loading-card"></div><div class="h38-loading-card"></div><div class="h38-loading-card"></div></div></div>';}
 function markBusinessModule(){document.body.classList.toggle('h38-business-module',currentRoute()!=='today'&&String(typeof CURRENT!=='undefined'?CURRENT:'').indexOf('bo:')===0);}
 function inject(){configureTopbar();removeDuplicateAi();simplifyRail();collapseForRoute();compactControlNotice();loadingSkeleton();markBusinessModule();var view=document.getElementById('view');if(!view||view.querySelector('[data-h38-ai-native]')||view.querySelector('[data-h38-workspace-state="loading"]'))return;view.insertAdjacentHTML('afterbegin',strip());}
 function wrapDashboard(){if(wrappedDashboard||typeof window.renderDashboard!=='function')return;wrappedDashboard=true;var base=window.renderDashboard;window.renderDashboard=function(){var result=base.apply(this,arguments);setTimeout(inject,0);return result;};}
 function observe(){if(observer)return;observer=new MutationObserver(function(){clearTimeout(window.__h38PolishTimer);window.__h38PolishTimer=setTimeout(inject,30);});observer.observe(document.body,{childList:true,subtree:true});}
 function panelState(){var panel=document.getElementById('h38-ai-panel');if(!panel)return;new MutationObserver(function(){document.body.classList.toggle('h38-ai-panel-open',panel.classList.contains('open'));}).observe(panel,{attributes:true,attributeFilter:['class']});}
 function boot(){wrapDashboard();observe();panelState();setTimeout(inject,120);}
 if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
})();
</script>
