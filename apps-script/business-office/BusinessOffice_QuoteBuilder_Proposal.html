<!doctype html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{--navy:#173a5e;--blue:#326a9e;--orange:#e85d18;--ink:#142131;--muted:#647384;--line:#d8e1e9;--paper:#fff;--bg:#eef3f7;--good:#1b6b3a;--bad:#8f1d1d}*{box-sizing:border-box}body{margin:0;font:15px/1.55 Inter,Arial,sans-serif;color:var(--ink);background:var(--bg)}button,input,textarea{font:inherit}.wrap{width:min(1120px,calc(100% - 28px));margin:20px auto 60px}.top{background:linear-gradient(135deg,var(--navy),#0b2946);color:#fff;border-radius:20px;padding:28px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start}.brand{font-weight:900;letter-spacing:.08em;text-transform:uppercase;font-size:12px}.top h1{font-size:clamp(2rem,5vw,3.4rem);line-height:1.05;margin:10px 0}.top p{color:#dce8f2;margin:0}.status{background:rgba(255,255,255,.12);padding:10px 13px;border-radius:999px;font-weight:900;white-space:nowrap}.layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:18px;margin-top:18px}.stack{display:grid;gap:18px}.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 10px 28px rgba(20,49,76,.08)}.card h2,.card h3{margin-top:0;color:var(--navy)}.summary{position:sticky;top:14px}.money{font-size:34px;font-weight:950;color:var(--navy)}.row{display:flex;justify-content:space-between;gap:16px;padding:8px 0;border-bottom:1px solid var(--line)}.row:last-child{border:0}.option-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.option{border:2px solid var(--line);border-radius:14px;padding:15px;cursor:pointer;background:#fff}.option.selected{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,93,24,.14)}.option h3{margin:0}.option .price{font-size:24px;font-weight:950;color:var(--navy)}.addon{display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--line);padding:11px 0}.addon:last-child{border:0}.photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}.photos img{width:100%;height:150px;object-fit:cover;border-radius:12px;background:#e6edf2}.actions{display:grid;gap:9px;margin-top:14px}.actions button{min-height:48px;border:0;border-radius:10px;font-weight:900;cursor:pointer}.approve{background:var(--good);color:#fff}.change{background:#f5b942;color:#392600}.decline{background:#eef1f4;color:var(--bad)}.download{background:var(--navy);color:#fff}.notice{padding:12px;border-radius:10px;background:#fff4cf;color:#594300;margin-bottom:14px}.signature{display:grid;gap:9px}.signature canvas{width:100%;height:150px;border:2px dashed #9fb2c2;border-radius:10px;background:#fff;touch-action:none}.signature input{min-height:44px;border:1px solid var(--line);border-radius:8px;padding:9px}.small{font-size:12px;color:var(--muted)}.hidden{display:none!important}.toast{position:fixed;right:18px;bottom:18px;background:#162331;color:#fff;padding:12px 15px;border-radius:10px;display:none;max-width:420px}.toast.show{display:block}@media(max-width:850px){.top{grid-template-columns:1fr}.layout{grid-template-columns:1fr}.summary{position:static}.wrap{width:min(100% - 16px,1120px);margin-top:8px}.top,.card{border-radius:13px;padding:16px}}
    @media print{body{background:#fff}.wrap{width:100%;margin:0}.actions,.signature,.notice,.toast{display:none!important}.layout{grid-template-columns:1fr 280px}.card,.top{box-shadow:none}}
  </style>
</head>
<body>
<div class="wrap" id="proposalRoot"></div><div class="toast" id="proposalToast"></div>
<script>window.H38_PROPOSAL=<?!= proposalJson ?>;</script>
<script>
(function(){'use strict';
const data=window.H38_PROPOSAL||{},state=data.state||{},quote=data.quote||{},customer=data.customer||{},details=data.details||{},branding=data.branding||{},preview=!!data.preview,token=data.token||'';
const esc=v=>String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(Number(String(v||0).replace(/[$,]/g,''))||0);
let selectedOptions=(state.customerSelection&&state.customerSelection.optionIds||[]).slice(),selectedAddOns=(state.customerSelection&&state.customerSelection.addOnIds||[]).slice();
function toast(msg){const n=document.getElementById('proposalToast');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),5000)}
function lines(){return details.lines||details.quoteLines||[]}
function optionTotal(option){return Number(option.total||0)||((option.lineItems||[]).reduce((s,l)=>s+(Number(l.quantity||1)*Number(l.rate||0)),0))}
function selectedTotal(){let total=Number(String(quote.Total||0).replace(/[$,]/g,''))||0;if((state.options||[]).length){const chosen=(state.options||[]).filter(o=>selectedOptions.includes(o.id));total=chosen.reduce((s,o)=>s+optionTotal(o),0)}total+=(state.addOns||[]).filter(a=>selectedAddOns.includes(a.id)).reduce((s,a)=>s+Number(a.total||a.price||0),0);return total}
function render(){
 const options=state.options||[],addons=state.addOns||[],docs=(data.documents||[]).filter(d=>String(d.mimeType||'').indexOf('image/')===0);
 const optionHtml=options.length?'<div class="card"><h2>Choose your option</h2><div class="option-grid">'+options.map(o=>'<article class="option '+(selectedOptions.includes(o.id)?'selected':'')+'" data-option="'+esc(o.id)+'"><div class="small">'+esc(o.label||'Option')+'</div><h3>'+esc(o.name||'Proposal option')+'</h3><p>'+esc(o.outcome||o.description||'')+'</p><div class="price">'+money(optionTotal(o))+'</div></article>').join('')+'</div></div>':'';
 const addonHtml=addons.length?'<div class="card"><h2>Recommended add-ons</h2>'+addons.map(a=>'<label class="addon"><input type="checkbox" data-addon="'+esc(a.id)+'" '+(selectedAddOns.includes(a.id)?'checked':'')+'><span><strong>'+esc(a.name||a.description)+'</strong>'+(a.recommended?'<div class="small">Recommended</div>':'')+'<div>'+money(a.total||a.price)+'</div></span></label>').join('')+'</div>':'';
 const photos=docs.length?'<div class="card"><h2>Project photos</h2><div class="photos">'+docs.map(d=>'<img loading="lazy" src="https://drive.google.com/thumbnail?id='+encodeURIComponent(d.fileId)+'&sz=w700" alt="'+esc(d.fileName||'Project photo')+'">').join('')+'</div></div>':'';
 const signature=preview?'':'<div class="card signature"><h3>Signature</h3><input id="signerName" placeholder="Your full name"><canvas id="signaturePad" width="800" height="300"></canvas><button type="button" class="decline" id="clearSignature">Clear signature</button><div class="small">Your signature is tied to this exact quote version and selected options.</div></div>';
 document.getElementById('proposalRoot').innerHTML='<header class="top"><div><div class="brand">'+esc(branding.name||branding.publicName||'Highway 38 Quote Builder')+'</div><h1>'+esc(quote['Project Title']||'Professional Proposal')+'</h1><p>Prepared for '+esc(customer['Display Name']||customer.Name||'Customer')+'</p></div><div class="status">'+esc(state.lifecycleStatus||quote.Status||'Draft')+'</div></header><div class="layout"><main class="stack"><div class="card"><h2>Recommended result</h2><p>'+esc(state.summary||quote.Scope||'')+'</p>'+(state.includedWork||[]).length?'<ul>'+(state.includedWork||[]).map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>':''+'</div>'+optionHtml+addonHtml+photos+'<div class="card"><h2>Terms, assumptions, and exclusions</h2><h3>Terms</h3><p>'+esc(state.terms||quote['Payment Terms']||'')+'</p><h3>Assumptions</h3><p>'+esc(state.assumptions||quote.Assumptions||'')+'</p><h3>Exclusions</h3><p>'+esc(state.exclusions||quote.Exclusions||'')+'</p></div>'+signature+'</main><aside><div class="card summary"><div class="small">Investment</div><div class="money" id="proposalTotal">'+money(selectedTotal())+'</div><div class="row"><span>Quote</span><strong>'+esc(quote['Quote Number']||quote['Quote ID']||'')+'</strong></div><div class="row"><span>Version</span><strong>'+esc(state.quoteVersion||quote['Revision Number']||1)+'</strong></div><div class="row"><span>Valid through</span><strong>'+esc(state.expirationDate||quote['Expiration Date']||'Not set')+'</strong></div><div class="notice">'+(preview?'Preview mode. Customer actions are disabled.':'Review the exact proposal before approving. No job or payment starts automatically.')+'</div><div class="actions"><button class="download" onclick="window.print()">Download / Print PDF</button>'+(preview?'':'<button class="approve" id="approveProposal">Approve & Sign</button><button class="change" id="requestChanges">Request Changes</button><button class="decline" id="declineProposal">Decline</button>')+'</div></div></aside></div>';
 wire();
}
function wire(){document.querySelectorAll('[data-option]').forEach(n=>n.onclick=()=>{const id=n.dataset.option;if(state.approvalRule==='multiple_options'){selectedOptions=selectedOptions.includes(id)?selectedOptions.filter(x=>x!==id):selectedOptions.concat(id)}else selectedOptions=[id];render()});document.querySelectorAll('[data-addon]').forEach(n=>n.onchange=()=>{selectedAddOns=n.checked?selectedAddOns.concat(n.dataset.addon):selectedAddOns.filter(x=>x!==n.dataset.addon);document.getElementById('proposalTotal').textContent=money(selectedTotal())});if(preview)return;setupSignature();document.getElementById('approveProposal').onclick=approve;document.getElementById('requestChanges').onclick=()=>act('request_changes',{notes:prompt('What changes are needed?')||''});document.getElementById('declineProposal').onclick=()=>act('decline',{notes:prompt('Optional reason')||''})}
let drawing=false,ctx=null;function setupSignature(){const c=document.getElementById('signaturePad');if(!c)return;ctx=c.getContext('2d');ctx.lineWidth=4;ctx.lineCap='round';const point=e=>{const r=c.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*(c.width/r.width),y:(p.clientY-r.top)*(c.height/r.height)}};const start=e=>{drawing=true;const p=point(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault()};const move=e=>{if(!drawing)return;const p=point(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault()};const end=()=>drawing=false;c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);window.addEventListener('mouseup',end);c.addEventListener('touchstart',start,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',end);document.getElementById('clearSignature').onclick=()=>ctx.clearRect(0,0,c.width,c.height)}
function act(action,payload){google.script.run.withSuccessHandler(r=>{toast('Proposal updated: '+r.status);setTimeout(()=>location.reload(),900)}).withFailureHandler(e=>toast(e.message||String(e))).boCustomerProposalAction(token,action,Object.assign({optionIds:selectedOptions,addOnIds:selectedAddOns},payload||{}))}
function approve(){const name=document.getElementById('signerName').value.trim(),c=document.getElementById('signaturePad');if(!name)return toast('Enter your name.');act('sign',{signerName:name,signatureDataUrl:c.toDataURL('image/png'),optionIds:selectedOptions,addOnIds:selectedAddOns})}
render();
})();
</script>
</body></html>
