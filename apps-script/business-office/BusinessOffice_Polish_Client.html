<style>
:root{--bo-polish-radius:14px;--bo-polish-speed:180ms}
#content{transition:opacity var(--bo-polish-speed) ease,transform var(--bo-polish-speed) ease}
#content.bo-polish-enter{opacity:.45;transform:translateY(3px)}
.bo-polish-loading{display:grid;gap:14px;min-height:360px}
.bo-polish-hero,.bo-polish-card,.bo-polish-row{position:relative;overflow:hidden;background:linear-gradient(90deg,#eef2f6 25%,#f8fafc 37%,#eef2f6 63%);background-size:400% 100%;animation:boPolishShimmer 1.25s ease-in-out infinite;border:1px solid var(--border);border-radius:var(--bo-polish-radius)}
.bo-polish-hero{height:132px}.bo-polish-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.bo-polish-card{height:104px}.bo-polish-table{display:grid;gap:8px;padding:14px;background:#fff;border:1px solid var(--border);border-radius:var(--bo-polish-radius)}.bo-polish-row{height:42px;border-radius:8px}
.bo-polish-status{display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px}.bo-polish-status strong{color:var(--navy)}
.bo-polish-error{background:#fff;border:1px solid #efb7b7;border-radius:var(--bo-polish-radius);padding:18px;box-shadow:0 8px 24px rgba(122,21,21,.08)}.bo-polish-error h3{margin:.1rem 0 .5rem;color:#7a1515}.bo-polish-error p{color:var(--muted);line-height:1.5}.bo-polish-error-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
@keyframes boPolishShimmer{0%{background-position:100% 0}100%{background-position:0 0}}
@media(max-width:800px){.bo-polish-grid{grid-template-columns:1fr}.bo-polish-hero{height:112px}}
@media(prefers-reduced-motion:reduce){#content{transition:none}.bo-polish-hero,.bo-polish-card,.bo-polish-row{animation:none}}
</style>
<script>
(function(){
'use strict';
var BO_TIMEOUT_MS=30000;
var activeRequest=0;
function contentHost(){return document.getElementById('content')}
function loadingMarkup(label){
  return '<div class="bo-polish-loading" role="status" aria-live="polite">'+
    '<div class="bo-polish-status"><strong>'+escapeHtml(label||'Loading workspace')+'</strong><span>This should only take a moment.</span></div>'+
    '<div class="bo-polish-hero"></div><div class="bo-polish-grid"><div class="bo-polish-card"></div><div class="bo-polish-card"></div><div class="bo-polish-card"></div></div>'+
    '<div class="bo-polish-table"><div class="bo-polish-row"></div><div class="bo-polish-row"></div><div class="bo-polish-row"></div><div class="bo-polish-row"></div></div></div>'
}
function showLoading(label){var host=contentHost();if(!host)return;host.classList.add('bo-polish-enter');host.innerHTML=loadingMarkup(label);requestAnimationFrame(function(){host.classList.remove('bo-polish-enter')})}
function showRecoverableError(error,retry){
  var host=contentHost();if(!host)return;var message=error&&error.message?error.message:String(error||'The request did not finish.');
  host.innerHTML='<div class="bo-polish-error"><h3>This screen took too long to load.</h3><p>'+escapeHtml(message)+'</p><p>No records were changed. You can retry or return to the dashboard.</p><div class="bo-polish-error-actions"><button class="primary" id="boPolishRetry">Retry</button><button class="secondary" onclick="openModule(\'dashboard\')">Dashboard</button></div></div>';
  var button=document.getElementById('boPolishRetry');if(button)button.onclick=retry
}
function withTimeout(promise,label){
  var timer;var timeout=new Promise(function(_,reject){timer=setTimeout(function(){reject(new Error((label||'Request')+' timed out after 30 seconds.'))},BO_TIMEOUT_MS)});
  return Promise.race([Promise.resolve(promise),timeout]).finally(function(){clearTimeout(timer)})
}
function install(){
  if(window.__h38BusinessOfficePolishInstalled||typeof window.call!=='function'||typeof window.openModule!=='function')return false;
  window.__h38BusinessOfficePolishInstalled=true;
  var originalCall=window.call;
  window.call=function(action,args){return withTimeout(originalCall.call(this,action,args),action)};
  var originalOpen=window.openModule;
  window.openModule=async function(module){
    var requestId=++activeRequest;var label=module==='quoteBuilder'?'Loading Quote Builder':'Loading '+String(module||'workspace').replace(/([A-Z])/g,' $1');showLoading(label);
    try{var result=await withTimeout(originalOpen.apply(this,arguments),label);if(requestId===activeRequest){var host=contentHost();if(host)host.classList.remove('bo-polish-enter')}return result}
    catch(error){if(requestId===activeRequest)showRecoverableError(error,function(){window.openModule(module)});throw error}
  };
  setTimeout(function(){
    try{
      if(window.state&&state.bootstrap){
        originalCall('uxDashboard').catch(function(){});
        originalCall('list',{module:'customers',options:{limit:100}}).catch(function(){});
      }
    }catch(ignore){}
  },900);
  return true
}
var attempts=0,timer=setInterval(function(){attempts+=1;if(install()||attempts>200)clearInterval(timer)},100)
})();
</script>
