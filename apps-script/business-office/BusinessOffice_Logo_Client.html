 const SOURCE_ID='1tJZtDEl60NGrUFaOwrMvPzONeVZn2r3V';
 const TARGET_IDS=['appLogo','qbLogo','h38PortalLogo'];
 function applyOne(logo){
  if(!logo)return;
  if(logo.getAttribute('src')!==APPROVED_LOGO)logo.setAttribute('src',APPROVED_LOGO);
  if(logo.alt!=='Highway 38 Solutions')logo.alt='Highway 38 Solutions';
  if(logo.style.display!=='block')logo.style.display='block';
  if(logo.dataset.driveSource!==SOURCE_ID)logo.dataset.driveSource=SOURCE_ID;
  if(logo.dataset.approvedBrand!=='1')logo.dataset.approvedBrand='1';
 }
 function apply(){TARGET_IDS.forEach(function(id){applyOne(document.getElementById(id));});}
 function watch(){
  TARGET_IDS.forEach(function(id){
   const logo=document.getElementById(id);
   if(!logo||logo.dataset.logoWatch==='1')return;
   logo.dataset.logoWatch='1';
   new MutationObserver(function(){applyOne(logo);}).observe(logo,{attributes:true,attributeFilter:['src','alt','style']});
  });
 }
 function pin(){apply();watch();}
 if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',pin,{once:true});else pin();
 setTimeout(pin,0);setTimeout(pin,350);setTimeout(pin,1400);
})();
</script>
