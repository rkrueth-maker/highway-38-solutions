<style>
#h38-ai-launch{position:fixed;right:22px;bottom:22px;z-index:9998;border:0;border-radius:999px;padding:13px 18px;background:#243447;color:#fff;font-weight:800;box-shadow:0 8px 30px rgba(0,0,0,.24);cursor:pointer}
#h38-ai-panel{position:fixed;top:0;right:-430px;width:min(430px,100vw);height:100vh;z-index:9999;background:#fff;box-shadow:-8px 0 30px rgba(0,0,0,.2);transition:right .22s ease;display:flex;flex-direction:column;font-family:inherit}
#h38-ai-panel.open{right:0}.h38-ai-head{padding:16px;background:#243447;color:#fff;display:flex;justify-content:space-between;align-items:center}.h38-ai-head button{border:0;background:transparent;color:#fff;font-size:24px;cursor:pointer}.h38-ai-tools{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;border-bottom:1px solid #ddd}.h38-ai-tools button,.h38-ai-send button{padding:10px;border:1px solid #ccd3da;border-radius:8px;background:#f7f9fb;cursor:pointer}.h38-ai-log{flex:1;overflow:auto;padding:14px;background:#f4f6f8}.h38-ai-msg{padding:10px 12px;border-radius:10px;margin:0 0 10px;white-space:pre-wrap}.h38-ai-user{background:#dfeaf5;margin-left:35px}.h38-ai-bot{background:#fff;border:1px solid #dde2e7;margin-right:20px}.h38-ai-compose{padding:12px;border-top:1px solid #ddd}.h38-ai-compose textarea{width:100%;min-height:72px;box-sizing:border-box;padding:10px;border:1px solid #bbc4cd;border-radius:8px;resize:vertical}.h38-ai-send{display:flex;gap:8px;margin-top:8px}.h38-ai-send button:first-child{flex:1;background:#243447;color:#fff}.h38-ai-status{font-size:12px;color:#607080;padding-top:6px}.h38-ai-confirm{background:#fff4d6;border:1px solid #e1bd55;padding:10px;border-radius:8px;margin-top:8px}.h38-ai-confirm button{background:#243447;color:#fff;border:0;border-radius:7px;padding:9px 12px;cursor:pointer}
</style>
<button id="h38-ai-launch" type="button" aria-label="Open H38 AI">Ask H38</button>
<aside id="h38-ai-panel" aria-label="H38 AI assistant">
 <div class="h38-ai-head"><div><strong>H38 AI</strong><div style="font-size:12px;opacity:.85">Owner → Operations assistant</div></div><button id="h38-ai-close" aria-label="Close">×</button></div>
 <div class="h38-ai-tools"><button data-ai-action="coach">Teach me</button><button data-ai-action="email">Email brief</button><button data-ai-action="improve">Improvements</button></div>
 <div class="h38-ai-log" id="h38-ai-log"><div class="h38-ai-msg h38-ai-bot">Ask about this screen, request a walkthrough, or say “read my important emails.” H38 will always ask before sending or finalizing anything.</div></div>
 <div class="h38-ai-compose"><textarea id="h38-ai-input" placeholder="Ask H38…"></textarea><div class="h38-ai-send"><button id="h38-ai-submit">Send</button><button id="h38-ai-mic" title="Talk">🎙</button></div><div class="h38-ai-status" id="h38-ai-status">AI can teach, draft, summarize and recommend. Core actions remain approval controlled.</div></div>
</aside>
<script>
(function(){
 const panel=document.getElementById('h38-ai-panel'),log=document.getElementById('h38-ai-log'),input=document.getElementById('h38-ai-input'),status=document.getElementById('h38-ai-status');
 let lastDraft=null,recognition=null;
 function api(action,args){return new Promise(function(resolve,reject){if(!(window.google&&google.script&&google.script.run)){reject(new Error('H38 server connection is unavailable.'));return;}google.script.run.withSuccessHandler(resolve).withFailureHandler(function(e){reject(new Error((e&&e.message)||String(e)));}).boApi({action:action,args:args||{}});});}
 function context(){const active=document.querySelector('[data-module].active,[data-route].active,[aria-current="page"]');return{module:(active&&((active.dataset&&active.dataset.module)||active.textContent.trim()))||document.body.dataset.module||'dashboard',screen:document.title,task:'current screen'};}
 function add(text,user){const el=document.createElement('div');el.className='h38-ai-msg '+(user?'h38-ai-user':'h38-ai-bot');el.textContent=text;log.appendChild(el);log.scrollTop=log.scrollHeight;return el;}
 function busy(text){status.textContent=text||'Working…';}
 function speak(text){if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const utterance=new SpeechSynthesisUtterance(String(text).slice(0,3500));utterance.rate=1;window.speechSynthesis.speak(utterance);}
 async function ask(message){message=String(message||'').trim();if(!message)return;add(message,true);input.value='';busy('H38 is thinking…');try{const result=await api('aiChat',{message:message,context:context()});add(result.answer,false);busy('Ready');if(localStorage.getItem('h38-ai-voice')==='on')speak(result.answer);}catch(e){add(e.message,false);busy('Needs attention');}}
 function showDraft(result){lastDraft=result;const wrap=document.createElement('div');wrap.className='h38-ai-msg h38-ai-bot';wrap.textContent='Draft to '+result.draft.to+'\nSubject: '+result.draft.subject+'\n\n'+result.draft.body;const confirm=document.createElement('div');confirm.className='h38-ai-confirm';confirm.textContent='Nothing has been sent. Review the recipient and message, then confirm. ';const btn=document.createElement('button');btn.textContent='SEND this email';btn.onclick=sendDraft;confirm.appendChild(btn);wrap.appendChild(confirm);log.appendChild(wrap);log.scrollTop=log.scrollHeight;speak('I prepared the draft. Nothing has been sent. Say send or press the confirmation button after reviewing it.');}
 async function sendDraft(){if(!lastDraft)return;busy('Sending confirmed draft…');try{const result=await api('aiSendEmail',{confirmationToken:lastDraft.confirmationToken,confirmation:'SEND'});add('Sent to '+result.to+' with subject “'+result.subject+'”.',false);lastDraft=null;busy('Sent');speak('The email was sent.');}catch(e){add(e.message,false);busy('Send failed');}}
 async function emailBrief(){busy('Reading the inbox…');try{const result=await api('aiEmailBrief',{limit:5});add(result.summary,false);busy('Ready');speak(result.summary);}catch(e){add(e.message,false);busy('Needs attention');}}
 async function coach(){busy('Preparing the next step…');try{const result=await api('aiCoach',{task:'Help me understand and complete the work on this screen.',context:context()});add(result.answer,false);busy('Ready');speak(result.answer);}catch(e){add(e.message,false);busy('Needs attention');}}
 async function improvements(){busy('Reviewing workflow signals…');try{const result=await api('aiBootstrap',{}),items=result.recommendations||[];add(items.length?items.map(function(x,i){return(i+1)+'. '+x.title+' — '+x.reason+(x.requiresApproval?' [H38 approval required]':'');}).join('\n'):'No repeated workflow pattern is strong enough for a recommendation yet.',false);busy('Ready');}catch(e){add(e.message,false);busy('Needs attention');}}
 function voice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){add('Voice recognition is not available in this browser.',false);return;}if(recognition){recognition.stop();return;}recognition=new SR();recognition.continuous=false;recognition.interimResults=false;recognition.lang='en-US';recognition.onstart=function(){busy('Listening…');};recognition.onerror=function(){recognition=null;busy('Voice unavailable');};recognition.onend=function(){recognition=null;if(status.textContent==='Listening…')busy('Ready');};recognition.onresult=function(e){const words=e.results[0][0].transcript.trim();if(lastDraft&&/^send( it| email| this)?$/i.test(words)){add(words,true);sendDraft();return;}ask(words);};recognition.start();}
 document.getElementById('h38-ai-launch').onclick=function(){panel.classList.add('open');api('aiTelemetry',{event:{type:'module_open',module:'ai_assistant',outcome:'opened'}}).catch(function(){});};
 document.getElementById('h38-ai-close').onclick=function(){panel.classList.remove('open');};
 document.getElementById('h38-ai-submit').onclick=function(){ask(input.value);};
 document.getElementById('h38-ai-mic').onclick=voice;
 input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask(input.value);}});
 document.querySelectorAll('[data-ai-action]').forEach(function(btn){btn.onclick=function(){({coach:coach,email:emailBrief,improve:improvements})[btn.dataset.aiAction]();};});
 window.H38AI={ask:ask,prepareEmail:async function(to,subject,request,ctx){const result=await api('aiPrepareEmail',{to:to,subject:subject,request:request,context:ctx||context()});showDraft(result);return result;},open:function(){panel.classList.add('open');},speak:speak};
})();
</script>
