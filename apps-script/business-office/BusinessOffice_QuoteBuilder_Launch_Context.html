<script>
(function(){
'use strict';
var params=new URLSearchParams(location.search);
var requestedView=params.get('view')||'';
var customerId=params.get('customerId')||'';
var quoteId=params.get('quoteId')||'';
var returnUrl=params.get('returnUrl')||'';
var from=params.get('from')||'';
var launchHandled=false;
var baseOpen=window.qbOpen;

function businessOfficeReturnUrl(){
  if(returnUrl){
    try{
      var configured=new URL(returnUrl);
      configured.search='';
      configured.hash='module=quotes';
      return configured.toString();
    }catch(error){}
  }
  var url=new URL(location.href);
  ['app','quoteBuilder','view','customerId','quoteId','from','returnUrl','v'].forEach(function(key){url.searchParams.delete(key);});
  url.hash='module=quotes';
  return url.toString();
}

function returnToBusinessOffice(){
  location.assign(businessOfficeReturnUrl());
}

function wirePersistentOfficeReturn(){
  var button=document.getElementById('qbBackToOffice');
  if(!button)return;
  button.textContent='Business Office';
  button.setAttribute('aria-label','Return to Business Office');
  button.title='Return to Business Office · Customers → Quotes';
  button.onclick=returnToBusinessOffice;
}

function patchReturnAction(){
  wirePersistentOfficeReturn();
  var button=document.querySelector('#qbNav .full-system button');
  if(!button||button.dataset.launchReturnAction==='1')return;
  var label=from==='business-office'?'Back to Quotes':'Business Office';
  button.dataset.launchReturnAction='1';
  button.dataset.label=label;
  button.setAttribute('aria-label',label);
  button.title=from==='business-office'?'Return to the Quotes workspace':'Return to the Business Office';
  var text=button.querySelector('.nav-text');
  if(text){
    if(text.textContent!==label)text.textContent=label;
  }else if((button.textContent||'').trim()!==label){
    button.textContent=label;
  }
  button.onclick=returnToBusinessOffice;
}

function selectLaunchCustomer(){
  if(!customerId)return;
  var attempts=0;
  var timer=setInterval(function(){
    attempts+=1;
    var select=document.getElementById('customer');
    if(select){
      select.value=customerId;
      select.dispatchEvent(new Event('change',{bubbles:true}));
      clearInterval(timer);
    }else if(attempts>80)clearInterval(timer);
  },25);
}

window.qbOpen=async function(view){
  if(!launchHandled){
    launchHandled=true;
    if(quoteId){
      document.getElementById('qbContent').innerHTML='<div class="panel loading-card">Opening selected quote…</div>';
      return new Promise(function(resolve,reject){
        setTimeout(function(){
          Promise.resolve(window.qbDetails(quoteId)).then(resolve,reject);
        },100);
      });
    }
    if(requestedView==='new')view='new';
  }
  var result=await baseOpen.call(this,view);
  if(view==='new')selectLaunchCustomer();
  patchReturnAction();
  return result;
};

var navHost=document.getElementById('qbNav');
if(navHost)new MutationObserver(function(){patchReturnAction();}).observe(navHost,{childList:true,subtree:true});
wirePersistentOfficeReturn();
patchReturnAction();
})();
</script>
