<script>
(function(){
'use strict';
var baseRoute=window.boControlRoute;
function e(v){return boControlEscape(v);}
function j(v){return boControlJs(v);}
function call(action,args){return boControlCall(action,args||{});}
function file(id){var input=document.getElementById(id),f=input&&input.files[0];if(!f)return Promise.resolve({});return toBase64(f).then(function(data){return{fileName:f.name,mimeType:f.type||mimeFromName(f.name),base64Data:data};});}
function opt(value,label){return'<option value="'+e(value)+'">'+e(label)+'</option>';}
function openRows(data){return(data.assignments||[]).filter(function(row){return row.Status==='Assigned'||row.Status==='In Use';});}
function summary(data){var s=data.summary||{};return'<div class="cards"><div class="card"><div class="count">'+Number(s.available||0)+'</div><div class="label">Available</div></div><div class="card"><div class="count">'+Number(s.assigned||0)+'</div><div class="label">Assigned</div></div><div class="card"><div class="count">'+Number(s.serviceDue||0)+'</div><div class="label">Service due</div></div><div class="card"><div class="count">'+Number(s.outOfService||0)+'</div><div class="label">Unavailable</div></div></div>';}
function assetCard(asset,data){var caps=data.capabilities||{},assignment=openRows(data).find(function(row){return row['Asset ID']===asset['Asset ID'];}),buttons=[];if(caps.assignEquipment&&asset.Availability==='Available'&&asset.Status!=='Out of Service')buttons.push('<button class="primary" onclick="boEquipmentAssignForm(\''+j(asset['Asset ID'])+'\')">Assign / check out</button>');if(assignment)buttons.push('<button class="primary" onclick="boEquipmentReturnForm(\''+j(assignment['Job Equipment ID'])+'\')">Return / check in</button>');if(caps.inspectEquipment)buttons.push('<button class="secondary" onclick="boEquipmentInspectForm(\''+j(asset['Asset ID'])+'\',\''+j(assignment&&assignment['Job Equipment ID']||'')+'\')">Inspect</button>');if(caps.serviceEquipment)buttons.push('<button class="secondary" onclick="boEquipmentServiceForm(\''+j(asset['Asset ID'])+'\')">Maintenance</button>');return'<article class="bo-task-card"><strong>'+e(asset['Asset Name']||asset['Asset Number']||asset['Asset ID'])+'</strong><div>'+e([asset.Make,asset.Model,asset['Asset Type']].filter(Boolean).join(' · '))+'</div><div class="bo-control-status"><span class="bo-control-chip">'+e(asset.Status||'Active')+'</span><span class="bo-control-chip">'+e(asset.Availability||'Available')+'</span><span class="bo-control-chip">'+e((asset['Meter Type']||'Hours')+': '+(asset['Current Meter']||0))+'</span></div><div class="boundary">'+e(asset['Current Location']||'No location')+(asset['Current Employee ID']?' · Employee '+e(asset['Current Employee ID']):'')+(asset['Current Job ID']?' · Job '+e(asset['Current Job ID']):'')+'</div><div class="bo-control-toolbar">'+buttons.join('')+'</div></article>';}
window.boEquipmentOpen=async function(){try{var data=await call('equipmentList'),caps=data.capabilities||{},tools=[];if(caps.manageEquipment)tools.push('<button class="primary" onclick="boEquipmentAssetForm()">Add equipment</button>');boControlHost(boControlBack()+'<section class="bo-control-hero"><p>EQUIPMENT & ASSETS</p><h2>Ready, assigned, or due</h2><p>Track equipment by employee, job, task, photo, condition, maintenance, and internal cost.</p></section><section class="bo-control-section">'+summary(data)+'<div class="bo-control-toolbar">'+tools.join('')+'</div></section><section class="bo-control-section"><h3>'+(caps.assignEquipment?'Equipment register':'My equipment')+'</h3>'+((data.assets||[]).length?(data.assets||[]).map(function(row){return assetCard(row,data);}).join(''):'<div class="empty">No equipment is assigned to this credential.</div>')+'</section>');}catch(error){showToast(error.message||String(error),true);}};
window.boEquipmentAssetForm=async function(assetId){var data=await call('equipmentList'),a=(data.assets||[]).find(function(row){return row['Asset ID']===assetId;})||{};boControlHost(boControlBack()+'<section class="bo-control-section"><h2>'+(assetId?'Edit equipment':'Add equipment')+'</h2><div class="bo-mobile-form"><label>Equipment number<input id="eqNumber" value="'+e(a['Asset Number']||'')+'"></label><label>Name<input id="eqName" value="'+e(a['Asset Name']||'')+'"></label><label>Type<select id="eqType"><option>Equipment</option><option>Vehicle</option><option>Trailer</option><option>Tool</option><option>Attachment</option><option>Rental</option></select></label><label>Make<input id="eqMake" value="'+e(a.Make||'')+'"></label><label>Model<input id="eqModel" value="'+e(a.Model||'')+'"></label><label>Serial number<input id="eqSerial" value="'+e(a['Serial Number']||'')+'"></label><label>Location<input id="eqLocation" value="'+e(a['Current Location']||'')+'"></label><label>Current meter<input id="eqMeter" type="number" step="0.1" value="'+e(a['Current Meter']||0)+'"></label><label>Hourly job-cost rate<input id="eqRate" type="number" step="0.01" value="'+e(a['Hourly Cost Rate']||0)+'"></label><label>Next service date<input id="eqNextDate" type="date" value="'+e(a['Next Service Date']||'')+'"></label><label>Next service meter<input id="eqNextMeter" type="number" step="0.1" value="'+e(a['Next Service Meter']||0)+'"></label><label class="wide">Photo<input id="eqPhoto" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlFilePreview(\'eqPhoto\',\'eqPreview\')"></label><div class="wide" id="eqPreview"></div><label class="wide">Notes<textarea id="eqNotes">'+e(a.Notes||'')+'</textarea></label></div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentSaveAsset(\''+j(assetId||'')+'\')">Save equipment</button></div></section>');};
window.boEquipmentSaveAsset=async function(assetId){try{var p=await file('eqPhoto');await call('equipmentSave',{assetId:assetId,values:Object.assign(p,{assetNumber:document.getElementById('eqNumber').value,assetName:document.getElementById('eqName').value,assetType:document.getElementById('eqType').value,make:document.getElementById('eqMake').value,model:document.getElementById('eqModel').value,serialNumber:document.getElementById('eqSerial').value,currentLocation:document.getElementById('eqLocation').value,currentMeter:Number(document.getElementById('eqMeter').value||0),hourlyCostRate:Number(document.getElementById('eqRate').value||0),nextServiceDate:document.getElementById('eqNextDate').value,nextServiceMeter:Number(document.getElementById('eqNextMeter').value||0),notes:document.getElementById('eqNotes').value})});showToast('Equipment saved.');boEquipmentOpen();}catch(error){showToast(error.message||String(error),true);}};
window.boEquipmentAssignForm=async function(assetId){var data=await call('equipmentList'),a=(data.assets||[]).find(function(row){return row['Asset ID']===assetId;})||{},d=data.directory||{};boControlHost(boControlBack()+'<section class="bo-control-section"><h2>Assign '+e(a['Asset Name']||assetId)+'</h2><div class="bo-mobile-form"><label>Employee<select id="eqEmployee"><option value="">Choose employee</option>'+((d.employees||[]).map(function(row){return opt(row['Employee ID'],row['Display Name']);}).join(''))+'</select></label><label>Job<select id="eqJob"><option value="">No job</option>'+((d.jobs||[]).map(function(row){return opt(row['Job ID'],[row['Job Number'],row['Project Title']].filter(Boolean).join(' · '));}).join(''))+'</select></label><label>Task<select id="eqTask"><option value="">No task</option>'+((d.tasks||[]).map(function(row){return opt(row['Task ID'],row['Task Title']);}).join(''))+'</select></label><label>Start meter<input id="eqStart" type="number" step="0.1" value="'+e(a['Current Meter']||0)+'"></label><label>Condition out<select id="eqConditionOut"><option>Good</option><option>Fair</option><option>Existing Damage</option></select></label><label>Job-cost rate<input id="eqAssignRate" type="number" step="0.01" value="'+e(a['Hourly Cost Rate']||0)+'"></label><label class="wide">Checkout photo<input id="eqOutPhoto" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlFilePreview(\'eqOutPhoto\',\'eqOutPreview\')"></label><div class="wide" id="eqOutPreview"></div><label class="wide">Notes<textarea id="eqAssignNotes"></textarea></label></div><div class="bo-hold">Internal assignment only. No customer message or accounting post.</div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentAssign(\''+j(assetId)+'\')">Assign equipment</button></div></section>');};
window.boEquipmentAssign=async function(assetId){try{var p=await file('eqOutPhoto');await call('equipmentAssign',{values:Object.assign(p,{assetId:assetId,employeeId:document.getElementById('eqEmployee').value,jobId:document.getElementById('eqJob').value,taskId:document.getElementById('eqTask').value,startMeter:Number(document.getElementById('eqStart').value||0),conditionOut:document.getElementById('eqConditionOut').value,hourlyCostRate:Number(document.getElementById('eqAssignRate').value||0),notes:document.getElementById('eqAssignNotes').value})});showToast('Equipment assigned.');boEquipmentOpen();}catch(error){showToast(error.message||String(error),true);}};
window.boEquipmentReturnForm=async function(id){var data=await call('equipmentList'),x=(data.assignments||[]).find(function(row){return row['Job Equipment ID']===id;})||{};boControlHost(boControlBack()+'<section class="bo-control-section"><h2>Return equipment</h2><div class="bo-mobile-form"><label>End meter<input id="eqEnd" type="number" step="0.1" value="'+e(x['Start Meter']||0)+'"></label><label>Condition in<select id="eqConditionIn"><option>Good</option><option>Fair</option><option>Needs Service</option><option>Damaged</option><option>Unsafe</option></select></label><label>Location<input id="eqReturnLocation"></label><label class="wide">Return photo<input id="eqInPhoto" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlFilePreview(\'eqInPhoto\',\'eqInPreview\')"></label><div class="wide" id="eqInPreview"></div><label class="wide">Notes<textarea id="eqReturnNotes"></textarea></label></div><div class="bo-hold">Calculates hours and internal job cost. Nothing posts to accounting.</div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentReturn(\''+j(id)+'\')">Return equipment</button></div></section>');};
window.boEquipmentReturn=async function(id){try{var p=await file('eqInPhoto'),r=await call('equipmentReturn',{assignmentId:id,values:Object.assign(p,{endMeter:Number(document.getElementById('eqEnd').value||0),conditionIn:document.getElementById('eqConditionIn').value,location:document.getElementById('eqReturnLocation').value,notes:document.getElementById('eqReturnNotes').value})});showToast('Returned. '+r.hoursUsed+' hours · $'+r.costAmount+' internal job cost.');boEquipmentOpen();}catch(error){showToast(error.message||String(error),true);}};
window.boEquipmentInspectForm=async function(assetId,assignmentId){var data=await call('equipmentList'),a=(data.assets||[]).find(function(row){return row['Asset ID']===assetId;})||{};boControlHost(boControlBack()+'<section class="bo-control-section"><h2>Inspect '+e(a['Asset Name']||assetId)+'</h2><div class="bo-mobile-form"><label>Condition<select id="eqInspectCondition"><option>Good</option><option>Fair</option><option>Needs Service</option><option>Damaged</option><option>Unsafe</option></select></label><label>Meter<input id="eqInspectMeter" type="number" step="0.1" value="'+e(a['Current Meter']||0)+'"></label><label class="wide">Photo<input id="eqInspectPhoto" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlFilePreview(\'eqInspectPhoto\',\'eqInspectPreview\')"></label><div class="wide" id="eqInspectPreview"></div><label class="wide">Notes<textarea id="eqInspectNotes"></textarea></label></div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentInspect(\''+j(assetId)+'\',\''+j(assignmentId||'')+'\')">Save inspection</button></div></section>');};
window.boEquipmentInspect=async function(assetId,assignmentId){try{var p=await file('eqInspectPhoto');await call('equipmentInspect',{values:Object.assign(p,{assetId:assetId,assignmentId:assignmentId,condition:document.getElementById('eqInspectCondition').value,meterReading:Number(document.getElementById('eqInspectMeter').value||0),notes:document.getElementById('eqInspectNotes').value})});showToast('Inspection saved.');boEquipmentOpen();}catch(error){showToast(error.message||String(error),true);}};
window.boEquipmentServiceForm=async function(assetId){var data=await call('equipmentList'),a=(data.assets||[]).find(function(row){return row['Asset ID']===assetId;})||{};boControlHost(boControlBack()+'<section class="bo-control-section"><h2>Maintenance · '+e(a['Asset Name']||assetId)+'</h2><div class="bo-mobile-form"><label>Type<select id="eqServiceType"><option>Preventive Maintenance</option><option>Repair</option><option>Inspection</option><option>Fuel / Fluids</option><option>Tire / Track Service</option></select></label><label>Meter<input id="eqServiceMeter" type="number" step="0.1" value="'+e(a['Current Meter']||0)+'"></label><label>Cost<input id="eqServiceCost" type="number" step="0.01"></label><label>Vendor ID<input id="eqServiceVendor"></label><label>Next service date<input id="eqServiceDate" type="date"></label><label>Next service meter<input id="eqServiceNext" type="number" step="0.1"></label><label><input id="eqReturnService" type="checkbox" checked> Return to service</label><label class="wide">Document / photo<input id="eqServiceFile" type="file" accept="application/pdf,image/jpeg,image/png,image/heic,image/heif" capture="environment"></label><label class="wide">Notes<textarea id="eqServiceNotes"></textarea></label></div><div class="bo-hold">Service history only. No expense or accounting entry is created.</div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentService(\''+j(assetId)+'\')">Record maintenance</button></div></section>');};
window.boEquipmentService=async function(assetId){try{var p=await file('eqServiceFile');await call('equipmentService',{values:Object.assign(p,{assetId:assetId,eventType:document.getElementById('eqServiceType').value,meterReading:Number(document.getElementById('eqServiceMeter').value||0),cost:Number(document.getElementById('eqServiceCost').value||0),vendorId:document.getElementById('eqServiceVendor').value,nextServiceDate:document.getElementById('eqServiceDate').value,nextServiceMeter:Number(document.getElementById('eqServiceNext').value||0),returnToService:document.getElementById('eqReturnService').checked,notes:document.getElementById('eqServiceNotes').value})});showToast('Maintenance recorded. Nothing posted to accounting.');boEquipmentOpen();}catch(error){showToast(error.message||String(error),true);}};
window.boControlRoute=function(route){if(route==='control:equipment')return boEquipmentOpen();return baseRoute(route);};
})();
</script>
