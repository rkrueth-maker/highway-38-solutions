<!doctype html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{--bg:#08111f;--panel:#0f1b2d;--card:#14233a;--line:#29405f;--text:#edf4ff;--muted:#9db0ca;--accent:#4f8cff;--ok:#22c55e;--hold:#f59e0b;--bad:#ef4444}*{box-sizing:border-box}body{margin:0;font:14px/1.45 Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{background:#07101d;border-right:1px solid var(--line);padding:14px;position:sticky;top:0;height:100vh;overflow:auto}.brand{padding:10px;font-size:18px;font-weight:800}.brand small{display:block;color:var(--muted);font-size:11px}.nav button{width:100%;border:0;background:transparent;color:var(--muted);padding:10px;text-align:left;border-radius:9px;text-transform:capitalize;cursor:pointer}.nav button:hover,.nav button.active{background:var(--card);color:var(--text)}.top{position:sticky;top:0;z-index:5;background:rgba(8,17,31,.96);border-bottom:1px solid var(--line);padding:12px;display:flex;gap:8px}.top input{flex:1}.top input,.field input,.field textarea{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px}.content{padding:18px;max-width:1500px;margin:auto}.notice,.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}.notice{margin-bottom:14px}.notice.ok{border-color:var(--ok)}.notice.hold{border-color:var(--hold)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.metric b{display:block;color:var(--muted);font-size:11px}.metric strong{font-size:25px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.btn{border:0;border-radius:8px;padding:9px 11px;font-weight:700;cursor:pointer;background:#29405f;color:var(--text)}.btn.primary{background:var(--accent)}.btn.ok{background:var(--ok);color:#052e16}.btn.hold{background:var(--hold);color:#2b1800}.btn.bad{background:var(--bad)}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:8px;border-bottom:1px solid #203552;text-align:left;vertical-align:top}th{background:#101e31}.muted{color:var(--muted)}.drawer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:20}.drawer.open{display:block}.drawer-panel{margin-left:auto;width:min(760px,100%);height:100%;overflow:auto;background:var(--bg);padding:18px}.record{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}.field{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px;overflow-wrap:anywhere}.field b{display:block;color:var(--muted);font-size:11px}.mobile{display:none}@media(max-width:800px){.app{grid-template-columns:1fr}.side{position:fixed;z-index:30;width:245px;transform:translateX(-100%);transition:.2s}.side.open{transform:none}.mobile{display:inline-block}.content{padding:10px}.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:480px){.grid,.record{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side" id="side"><div class="brand">Highway 38<small id="release">Owner Portal</small></div><nav class="nav" id="nav"></nav></aside>
  <main><div class="top"><button class="btn mobile" onclick="toggleMenu()">☰</button><input id="search" placeholder="Search all records" onkeydown="if(event.key==='Enter')globalSearch()"><button class="btn" onclick="refresh()">Refresh</button></div><div class="content"><div id="notice" class="notice hold">Loading secure owner session…</div><div id="view"></div></div></main>
</div>
<div class="drawer" id="drawer" onclick="if(event.target===this)closeDrawer()"><div class="drawer-panel"><div class="toolbar"><button class="btn" onclick="closeDrawer()">Close</button></div><h2 id="drawerTitle"></h2><div id="drawerBody"></div></div></div>
<script>
let BOOT=null,CURRENT='dashboard';
const TITLES={dashboard:'Dashboard',tasks:'Tasks',leads:'Leads',customers:'Customers',jobs:'Jobs',quotes:'Quotes',invoices:'Invoices',payments:'Payments',expenses:'Expenses',communications:'Communications',social:'Social',advertising:'Advertising',website:'Website',calendar:'Calendar',products:'Products',reports:'Reports',proof:'Proof Log',errors:'Error Log',settings:'Settings'};
const CREATABLE=['leads','customers','jobs','quotes','invoices','payments','expenses','social','advertising','website','tasks'];
function call(name,args=[]){return new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name](...args));}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function money(v){let n=Number(String(v||0).replace(/[$,]/g,''));return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(isNaN(n)?0:n);}
function notice(text,kind='hold'){let n=document.getElementById('notice');n.className='notice '+kind;n.innerHTML=text;}
function renderNav(){document.getElementById('nav').innerHTML=BOOT.modules.map(m=>`<button class="${m===CURRENT?'active':''}" onclick="show('${m}')">${esc(TITLES[m]||m)}</button>`).join('');}
async function refresh(){try{BOOT=await call('h38PortalBootstrap');document.getElementById('release').textContent=BOOT.release;renderNav();notice(`<b>Owner verified.</b> Test mode: ${BOOT.safety.testMode?'ON':'OFF'} · Live external actions: ${BOOT.safety.liveExternalActions?'ON':'OFF'} · Catalog: ${BOOT.catalog.status}`,'ok');await show(CURRENT);}catch(e){notice('HOLD / ERROR — '+esc(e.message||e));}}
async function show(module){CURRENT=module;renderNav();document.getElementById('side').classList.remove('open');let v=document.getElementById('view');v.innerHTML='<div class="card">Loading…</div>';try{if(module==='dashboard')return dashboard(BOOT.dashboard);if(module==='tasks')return tasks(await call('h38PortalTasks',[{}]));if(module==='reports')return reports(await call('h38PortalReports'));if(module==='settings')return settings();if(module==='proof')return records('Proof Log',await call('h38PortalProofLog',['']),null);if(module==='errors')return records('Error Log',await call('h38PortalErrorLog',['']),null);let entity=module==='products'?'catalog':module;return records(TITLES[module]||module,await call('h38PortalList',[entity,{}]),entity);}catch(e){notice(esc(e.message||e));v.innerHTML='<div class="card">Module is on HOLD until candidate sheets are installed.</div>';}}
function dashboard(d){document.getElementById('view').innerHTML=`<h1>Dashboard</h1><div class="grid">${d.cards.map(c=>`<div class="card metric"><b>${esc(c.label)}</b><strong>${c.format==='currency'?money(c.value):esc(c.value)}</strong><div class="muted">${esc(c.detail)}</div></div>`).join('')}</div><h2>Recent tasks</h2>${taskTable(d.recentTasks)}`;}
function taskTable(rows){if(!rows.length)return '<div class="card muted">No tasks.</div>';return `<div class="tablewrap"><table><thead><tr><th>Priority</th><th>Task</th><th>Customer / Job</th><th>Status</th><th>Due</th><th>Next action</th></tr></thead><tbody>${rows.map(r=>`<tr onclick="openTask('${esc(r.taskId)}')" style="cursor:pointer"><td>${esc(r.priority)}</td><td><b>${esc(r.title)}</b><div class="muted">${esc(r.type)}</div></td><td>${esc(r.customer||r.customerId)}<br>${esc(r.jobId)}</td><td>${esc(r.status)}<br><span class="muted">${esc(r.approvalStatus)}</span></td><td>${esc(r.dueDate)}</td><td>${esc(r.nextAction)}</td></tr>`).join('')}</tbody></table></div>`;}
function tasks(rows){document.getElementById('view').innerHTML=`<h1>Unified Tasks</h1><div class="toolbar"><input id="taskFilter" placeholder="Filter tasks" oninput="filterTasks()"><button class="btn primary" onclick="createInternal('tasks')">Add internal task</button></div><div id="taskRows">${taskTable(rows)}</div>`;window.ALL_TASKS=rows;}
function filterTasks(){let q=document.getElementById('taskFilter').value.toLowerCase();document.getElementById('taskRows').innerHTML=taskTable(ALL_TASKS.filter(r=>JSON.stringify(r).toLowerCase().includes(q)));}
function rowFields(obj){if(!obj)return '<div class="muted">None</div>';return `<div class="record">${Object.entries(obj).filter(([k])=>!k.startsWith('_')).map(([k,v])=>`<div class="field"><b>${esc(k)}</b>${esc(Array.isArray(v)?v.join(', '):v)}</div>`).join('')}</div>`;}
async function openTask(id){try{let w=await call('h38PortalWorkspace',[id]);document.getElementById('drawerTitle').textContent=w.task.title;document.getElementById('drawerBody').innerHTML=`<div class="toolbar">${w.availableActions.map(a=>`<button class="btn ${a.external?'hold':'ok'}" onclick="taskAction('${esc(id)}','${a.action}')">${esc(a.action.replaceAll('_',' '))}${a.testOnly?' · TEST':''}</button>`).join('')}</div><h3>Task</h3>${rowFields(w.task)}<h3>Customer</h3>${rowFields(w.customer)}<h3>Job</h3>${rowFields(w.job)}<h3>Source record</h3>${rowFields(w.sourceRecord)}<h3>Quotes</h3>${w.quotes.map(rowFields).join('')}<h3>Invoices</h3>${w.invoices.map(rowFields).join('')}<h3>Payments</h3>${w.payments.map(rowFields).join('')}<h3>Expenses</h3>${w.expenses.map(rowFields).join('')}<h3>Proof</h3>${w.proof.map(rowFields).join('')}<h3>Errors</h3>${w.errors.map(rowFields).join('')}`;document.getElementById('drawer').classList.add('open');}catch(e){notice(esc(e.message||e));}}
async function taskAction(id,action){let reason=/HOLD|REVISE|REJECT/.test(action)?prompt('Reason / next action')||'':'';if(!confirm(`Selected task only: ${action}\n${id}\nExternal actions remain test-only.`))return;let r=await call('h38PortalTaskAction',[id,action,{reason,nextAction:reason}]);notice(esc(r.message),/PASS/.test(r.status)?'ok':'hold');await openTask(id);}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');}
function records(title,rows,entity){let add=entity&&CREATABLE.includes(entity)?`<button class="btn primary" onclick="createInternal('${entity}')">Add internal record</button>`:'';if(!rows||!rows.length){document.getElementById('view').innerHTML=`<h1>${esc(title)}</h1><div class="toolbar">${add}</div><div class="card muted">No records.</div>`;return;}let sample=rows[0].record||rows[0],keys=Object.keys(sample).filter(k=>!k.startsWith('_')).slice(0,9);document.getElementById('view').innerHTML=`<h1>${esc(title)}</h1><div class="toolbar">${add}</div><div class="tablewrap"><table><thead><tr>${keys.map(k=>`<th>${esc(k)}</th>`).join('')}</tr></thead><tbody>${rows.map(x=>{let r=x.record||x;return `<tr onclick='openRecord(${JSON.stringify(title)},${JSON.stringify(r)})' style="cursor:pointer">${keys.map(k=>`<td>${esc(r[k])}</td>`).join('')}</tr>`}).join('')}</tbody></table></div>`;}
function openRecord(title,r){document.getElementById('drawerTitle').textContent=title;document.getElementById('drawerBody').innerHTML=rowFields(r);document.getElementById('drawer').classList.add('open');}
async function createInternal(entity){let raw=prompt(`Paste JSON fields for a new internal ${entity} record. No external action will occur.`);if(!raw)return;try{let data=JSON.parse(raw),result;if(entity==='quotes')result=await call('h38PortalCreateQuoteFromCatalog',[data]);else if(entity==='invoices')result=await call('h38PortalCreateInvoiceFromQuote',[data]);else if(entity==='payments')result=await call('h38PortalRecordPayment',[data]);else if(entity==='expenses')result=await call('h38PortalRecordExpense',[data]);else{let singular=entity.endsWith('ies')?entity.slice(0,-3)+'y':entity.endsWith('s')?entity.slice(0,-1):entity;result=await call('h38PortalQuickCreate',[singular,data]);}notice('Internal record created. No external action.','ok');await show(CURRENT);}catch(e){notice(esc(e.message||e));}}
function reports(r){document.getElementById('view').innerHTML=`<h1>Reports</h1><div class="notice">Actual values, estimates, and missing data are separated.</div><div class="grid">${Object.entries(r.summary).filter(([k])=>k!=='actual').map(([k,v])=>`<div class="card metric"><b>${esc(k)}</b><strong>${/payments|expenses|cash|profit/i.test(k)?money(v):esc(v)}</strong></div>`).join('')}</div><div class="card"><b>Missing-data rule</b><p>${esc(r.labels.missing)}</p></div>`;}
function settings(){let rows=BOOT.integrations.map(a=>`<tr><td>${esc(a.name)}</td><td>${esc(a.mode)}</td><td>${esc(a.status)}</td><td>${esc(a.notes)}</td><td><button class="btn" onclick="testAdapter('${a.id}')">Test</button></td></tr>`).join('');document.getElementById('view').innerHTML=`<h1>Settings</h1><div class="grid"><div class="card"><b>Install</b><pre>${esc(JSON.stringify(BOOT.installed,null,2))}</pre></div><div class="card"><b>Catalog</b><pre>${esc(JSON.stringify(BOOT.catalog,null,2))}</pre></div><div class="card"><b>Safety</b><pre>${esc(JSON.stringify(BOOT.safety,null,2))}</pre></div></div><div class="toolbar"><button class="btn hold" onclick="installCandidate()">Install candidate sheets</button><button class="btn" onclick="importCatalog()">Import approved catalog</button><button class="btn" onclick="fixtures()">Synthetic fixtures</button><button class="btn" onclick="selfTest()">Self-test</button><button class="btn" onclick="accountingCsv()">Accounting CSV</button></div><div class="tablewrap"><table><thead><tr><th>Adapter</th><th>Mode</th><th>Status</th><th>Notes</th><th>Test</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
async function installCandidate(){if(!confirm('Create missing candidate sheets only? No deployment or external action.'))return;let r=await call('h38PortalInstallCandidate',[{confirmation:'INSTALL NON-DEPLOYED CANDIDATE'}]);notice(esc(JSON.stringify(r)),'ok');refresh();}
async function importCatalog(){let raw=prompt('Paste exact approved H38_CATALOG JSON.');if(!raw)return;try{let r=await call('h38PortalImportCatalogPayload',[raw,'IMPORT APPROVED CATALOG SNAPSHOT']);notice(esc(JSON.stringify(r)),'ok');refresh();}catch(e){notice(esc(e.message||e));}}
async function fixtures(){if(!confirm('Load synthetic example.invalid test records only?'))return;let r=await call('h38PortalLoadSyntheticFixtures',['LOAD SYNTHETIC TEST RECORDS']);notice(esc(JSON.stringify(r)),'ok');refresh();}
async function selfTest(){let r=await call('h38PortalSelfTest');notice('<pre>'+esc(JSON.stringify(r,null,2))+'</pre>',r.status==='PASS'?'ok':'hold');}
async function testAdapter(id){let r=await call('h38PortalAdapterTest',[id]);notice(esc(r.message),'ok');}
async function accountingCsv(){let csv=await call('h38PortalAccountingCsv'),blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='highway-38-accounting-export.csv';a.click();URL.revokeObjectURL(url);}
async function globalSearch(){let q=document.getElementById('search').value.trim();if(!q)return;let r=await call('h38PortalGlobalSearch',[q]);records('Search results',r,null);}
function toggleMenu(){document.getElementById('side').classList.toggle('open');}
refresh();
</script>
</body>
</html>
