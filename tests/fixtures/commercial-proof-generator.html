<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Commercial Proof Generator</title><style>*{box-sizing:border-box}body{margin:0;background:#e9eef2;font-family:Arial,Helvetica,sans-serif;color:#122838}.sheet{width:1600px;height:1000px;background:#fff;overflow:hidden;position:relative}.header{height:92px;background:#07304e;color:#fff;padding:20px 42px;display:flex;align-items:center;justify-content:space-between}.header h1{font-size:35px;margin:0;letter-spacing:.4px}.header .tag{font-size:17px;background:#e49320;color:#fff;border-radius:999px;padding:9px 18px;font-weight:700}.sub{height:58px;padding:15px 42px;background:#f4f7f9;border-bottom:1px solid #c8d3da;font-size:20px;font-weight:700;color:#31546a}.content{height:790px;padding:26px 34px;display:grid;gap:22px}.footer{height:60px;background:#f4f7f9;border-top:1px solid #c8d3da;padding:17px 34px;display:flex;justify-content:space-between;font-size:15px;color:#526873}.card{border:1px solid #c8d3da;border-radius:14px;background:#fff;box-shadow:0 7px 18px rgba(16,43,61,.08);padding:20px}.card h2{font-size:19px;margin:0 0 13px;color:#07304e;text-transform:uppercase;letter-spacing:.3px}.card h3{font-size:17px;margin:0 0 9px}.card p,.card li{font-size:16px;line-height:1.35}.card ul,.card ol{margin:8px 0 0;padding-left:22px}.metric{font-size:32px;font-weight:800;color:#0b6d47}.warning{background:#fff3dd;border-left:6px solid #e49320;padding:12px 14px}.safe{background:#e9f6ef;border-left:6px solid #188654;padding:12px 14px}.grid2{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr 1fr}.grid4{grid-template-columns:repeat(4,1fr)}.span2{grid-column:span 2}.span3{grid-column:span 3}.flow{display:flex;align-items:center;justify-content:space-between;gap:10px}.step{flex:1;padding:16px 8px;border-radius:12px;background:#eaf1f5;text-align:center;font-weight:700;font-size:16px;min-height:72px;display:flex;align-items:center;justify-content:center}.arrow{font-size:28px;color:#e49320}.zone-map{position:relative;height:410px;border:4px solid #4a5f6d;background:#f7f3eb}.zone{position:absolute;border:2px solid #305c73;border-radius:8px;padding:10px;font-weight:700;text-align:center;background:#e6f0f4}.vehicle{width:170px;height:320px;border-radius:70px;background:#b43d35;color:#fff;padding-top:135px}.vehicle.second{background:#8c9aa3}.bench{background:#d99b4b}.storage{background:#b9c79b}.tool{background:#d5b996}.path{position:absolute;border:5px dashed #198754;border-radius:80px}.comparison{display:grid;grid-template-columns:1fr 1fr;gap:22px}.mini-map{height:310px;position:relative;border:3px solid #667b89;background:#f3f2ed;overflow:hidden}.track{position:absolute;width:75%;height:65%;left:12%;top:17%;border:6px dashed #c83b32;border-radius:45%}.track.good{border-color:#198754}.shelf{position:absolute;background:#cfa469;border:2px solid #705f42}.table{width:100%;border-collapse:collapse;font-size:15px}.table th{background:#07304e;color:#fff;padding:10px;text-align:left}.table td{padding:9px;border-bottom:1px solid #d6dee3}.folder{padding:8px 12px;margin:7px 0;background:#fff3dd;border-left:5px solid #e49320;font-weight:700}.timeline{display:flex;gap:9px}.week{flex:1;background:#eaf1f5;border-radius:10px;padding:13px;text-align:center}.lane{border-radius:12px;padding:14px;margin-bottom:10px}.manual{background:#fde7e5}.standard{background:#fff3dd}.auto{background:#e6f4ea}.owner{background:#e8edf7}.noauto{background:#f4e7ef}.process{display:flex;gap:8px;align-items:center}.process .box{flex:1;min-height:92px;padding:13px;background:#eaf1f5;border-radius:10px;text-align:center;font-weight:700}.datum{height:430px;position:relative;background:#e8edf0;border:1px solid #9caeb9;transform:perspective(900px) rotateX(48deg) rotateZ(-8deg);margin:40px}.part{position:absolute;left:25%;top:20%;width:50%;height:55%;background:#9daab1;border:10px solid #5d6e78;border-radius:34px}.hole{position:absolute;width:48px;height:48px;border-radius:50%;background:#e8edf0;border:7px solid #52636d}.clamp{position:absolute;width:120px;height:34px;background:#e49320;border:4px solid #895716}.callout{position:absolute;background:#fff;padding:8px 12px;border:2px solid #07304e;border-radius:8px;font-weight:700}.cell{height:410px;position:relative;background:#eef3f5;border:4px solid #31546a}.machine{position:absolute;left:50px;top:70px;width:310px;height:250px;background:#8e9ba3;border:6px solid #52636d;padding:95px 15px;text-align:center;font-size:24px;font-weight:800}.robot{position:absolute;left:590px;top:70px;width:260px;height:260px;border-radius:50%;background:#f0a11f;border:8px solid #8b5a0d;text-align:center;padding-top:103px;font-size:24px;font-weight:800}.pallet{position:absolute;right:60px;width:260px;height:120px;background:#b9c79b;border:5px solid #667450;text-align:center;padding-top:42px;font-weight:800}.guard{position:absolute;inset:25px;border:6px dashed #188654}.legend{display:flex;gap:14px;flex-wrap:wrap}.pill{padding:8px 13px;border-radius:999px;background:#eaf1f5;font-weight:700;font-size:14px}</style></head><body><main id="app"></main><script>const products={
'P001':{title:'1. PROBLEM SNAPSHOT',sub:'One unclear problem → one defensible first move',layout:'grid3',body:`<section class="card"><h2>The Problem</h2><p>Garage is cluttered and disorganized. One vehicle bay must become usable again.</p><h2>Known Facts</h2><ul><li>28 × 40 detached garage</li><li>One vehicle currently fits</li><li>Existing workbench remains</li></ul></section><section class="card"><h2>Assumptions</h2><ul><li>Current door location remains</li><li>No new framing planned</li><li>Wall space is available</li></ul><h2>Missing Information</h2><ul><li>Exact measurements</li><li>Outlet and door-track locations</li><li>Heating plan</li></ul></section><section class="card"><h2>Main Risks</h2><div class="warning">Buying storage before measuring</div><div class="warning">Blocking the protected vehicle path</div><div class="warning">Not preserving active work space</div></section><section class="card span2"><h2>First Five Actions</h2><div class="flow"><div class="step">1 Measure</div><div class="arrow">→</div><div class="step">2 Photograph</div><div class="arrow">→</div><div class="step">3 Mark Lane</div><div class="arrow">→</div><div class="step">4 Sort Zones</div><div class="arrow">→</div><div class="step">5 Confirm Layout</div></div></section><section class="card"><h2>Recommended Next Decision</h2><div class="safe"><strong>Create a Basic Layout Snapshot</strong><br>after measurements are confirmed.</div></section>`},
'P002':{title:'2. BASIC LAYOUT SNAPSHOT',sub:'Conceptual 28 × 40 garage layout — not construction drawings',layout:'grid3',body:`<section class="card span2"><h2>Recommended Zone Layout</h2><div class="zone-map"><div class="zone storage" style="left:18px;top:25px;width:180px;height:110px">Seasonal Storage</div><div class="zone bench" style="left:470px;top:18px;width:360px;height:90px">Workbench Zone</div><div class="zone tool" style="right:18px;top:125px;width:170px;height:220px">Daily-Use Tools</div><div class="zone vehicle" style="left:270px;top:75px">Vehicle Lane 1</div><div class="zone vehicle second" style="left:455px;top:75px">Vehicle Lane 2</div><div class="path" style="left:220px;top:45px;width:500px;height:345px"></div></div></section><section class="card"><h2>Fixed Obstacles</h2><ul><li>Two overhead doors</li><li>Freezer near service wall</li><li>Compressor and electrical</li></ul><h2>Missing Measurements</h2><ul><li>Ceiling height</li><li>Door opening height</li><li>Outlet locations</li><li>Window and drain locations</li></ul><div class="warning">Field verification required before installation.</div></section><section class="card span3"><h2>First Setup Actions</h2><div class="flow"><div class="step">Measure</div><div class="step">Protect Vehicle Lanes</div><div class="step">Confirm Fixed Items</div><div class="step">Place Daily Tools</div><div class="step">Refine Storage</div></div></section>`},
'P003':{title:'3. PROJECT PLANNING PACKET',sub:'Garage reorganization before wall storage and workbench installation',layout:'grid3',body:`<section class="card"><h2>Defined Scope</h2><p>Reorganize one 28 × 40 garage, protect parking, establish work zones, and prepare for storage installation.</p></section><section class="card span2"><h2>Three Project Phases</h2><div class="flow"><div class="step">1 Plan & Prepare</div><div class="arrow">→</div><div class="step">2 Build & Install</div><div class="arrow">→</div><div class="step">3 Organize & Optimize</div></div></section><section class="card"><h2>Decision Gates</h2><ul><li>Layout approved</li><li>Electrical plan confirmed</li><li>Workbench location locked</li><li>Storage plan confirmed</li></ul></section><section class="card"><h2>Material Groups</h2><ul><li>Storage and shelving</li><li>Workbench and cabinets</li><li>Electrical and lighting</li><li>Flooring and wall systems</li></ul></section><section class="card"><h2>Measurement Checklist</h2><ul><li>Overall length and width</li><li>Ceiling height</li><li>Door and window sizes</li><li>Electrical and plumbing</li></ul></section><section class="card span2"><h2>Owner Action Checklist</h2><div class="grid2" style="display:grid;gap:12px"><div class="safe">Clear items to keep<br>Define must-have zones<br>Approve layout direction</div><div class="warning">Do not buy storage early<br>Do not frame before verification<br>Do not block access</div></div></section><section class="card"><h2>Boundary</h2><p>Planning support only. Field verification and licensed work remain outside scope.</p></section>`},
'P004':{title:'4. SHOP FLOW REVIEW',sub:'Current movement compared with a controlled proposed state',layout:'grid2',body:`<section class="card"><h2>Current State — Problem</h2><div class="mini-map"><div class="track"></div><div class="shelf" style="left:20px;top:20px;width:130px;height:80px">Tools</div><div class="shelf" style="right:20px;top:30px;width:150px;height:90px">Incoming</div><div class="shelf" style="left:220px;bottom:18px;width:180px;height:80px">Active Parts</div></div><ul><li>Parts stored in travel path</li><li>Daily tools across the bay</li><li>Incoming work blocks staging</li></ul></section><section class="card"><h2>Proposed State — Solution</h2><div class="mini-map"><div class="track good"></div><div class="shelf" style="left:20px;top:20px;width:130px;height:80px;background:#b9c79b">Tool Zone</div><div class="shelf" style="right:20px;top:30px;width:150px;height:90px;background:#d5b996">Incoming Zone</div><div class="shelf" style="right:20px;bottom:20px;width:150px;height:80px;background:#b8d8c4">Finished Work</div></div><ul><li>Protected travel path</li><li>One-step daily tool reach</li><li>Separate incoming and finished staging</li></ul></section><section class="card"><h2>First Five Fixes</h2><ol><li>Create job-parts shelf</li><li>Define active vehicle area</li><li>Establish incoming zone</li><li>Move daily tools within reach</li><li>Remove long-term storage from bay</li></ol></section><section class="card"><h2>30-Day Checklist</h2><div class="timeline"><div class="week">Week 1<br>Clear & Define</div><div class="week">Week 2<br>Tool Zones</div><div class="week">Week 3<br>Workflow Test</div><div class="week">Week 4<br>Standardize</div></div></section>`},
'P005':{title:'5. BUSINESS WORKFLOW STARTER',sub:'Controlled lead-to-job operating system',layout:'grid3',body:`<section class="card span3"><h2>Lead-to-Job Status Map</h2><div class="flow"><div class="step">New Lead</div><div class="arrow">→</div><div class="step">Need Info</div><div class="arrow">→</div><div class="step">Quoted</div><div class="arrow">→</div><div class="step">Approved</div><div class="arrow">→</div><div class="step">Scheduled</div><div class="arrow">→</div><div class="step">Complete</div><div class="arrow">→</div><div class="step">Follow-Up</div></div></section><section class="card span2"><h2>Lead Tracker Preview</h2><table class="table"><tr><th>ID</th><th>Customer</th><th>Status</th><th>Next Action</th></tr><tr><td>H38-001</td><td>Smith</td><td>Need Info</td><td>Call today</td></tr><tr><td>H38-002</td><td>Johnson</td><td>Quoted</td><td>Send follow-up</td></tr><tr><td>H38-003</td><td>Miller</td><td>Approved</td><td>Schedule</td></tr></table></section><section class="card"><h2>Owner Approval Point</h2><div class="safe">Major scope changes<br>Price adjustments<br>Special requests</div></section><section class="card"><h2>Quote Control</h2><p>All quotes approved before sending.</p><div class="warning">No unattended customer sends.</div></section><section class="card"><h2>Message Templates</h2><ul><li>Initial information request</li><li>Quote follow-up</li><li>Appointment confirmation</li></ul></section><section class="card"><h2>Key Benefit</h2><p>Every lead has a status and a next action.</p></section>`},
'P006':{title:'6. CLEANUP RESCUE PLAN',sub:'Safe digital cleanup before files are moved or deleted',layout:'grid3',body:`<section class="card"><h2>Current Mixed Files</h2><table class="table"><tr><td>Receipts</td><td>87</td></tr><tr><td>Screenshots</td><td>132</td></tr><tr><td>Photos</td><td>215</td></tr><tr><td>Estimates</td><td>43</td></tr><tr><td>Notes</td><td>64</td></tr></table></section><section class="card"><h2>Recommended Folder Tree</h2><div class="folder">01_Clients</div><div class="folder">02_Projects</div><div class="folder">03_Financial</div><div class="folder">04_Operations</div><div class="folder">05_Templates</div><div class="folder">99_Hold_for_Review</div></section><section class="card"><h2>Naming Convention</h2><p><strong>YYYY-MM-DD_Category_Description_v#</strong></p><h2>Safe Rules</h2><ul><li>Keep the best version</li><li>Move duplicates to hold</li><li>Unknown files remain in review</li></ul></section><section class="card"><h2>Priority Cleanup Index</h2><ol><li>Photos by project</li><li>Duplicates</li><li>By category</li><li>By client/project</li><li>Archive</li></ol></section><section class="card span2"><h2>30-Day Sequence</h2><div class="timeline"><div class="week">Week 1<br>Sort Inbox</div><div class="week">Week 2<br>Create Structure</div><div class="week">Week 3<br>Organize Files</div><div class="week">Week 4<br>Review & Verify</div></div><div class="warning" style="margin-top:18px">No deletion without owner review.</div></section>`},
'P007':{title:'7. WORKFLOW OPPORTUNITY SNAPSHOT',sub:'From repeated manual work to a controlled first test',layout:'grid2',body:`<section class="card"><h2>Current State</h2><div class="lane manual">Manual: Lead arrives in text or email</div><div class="lane manual">Manual: Missing details requested</div><div class="lane manual">Manual: Quote drafted from scratch</div><div class="lane manual">Manual: Follow-up remembered later</div><h2>Bottlenecks</h2><ul><li>Waiting for information</li><li>Quote writing time</li><li>Follow-up delays</li></ul></section><section class="card"><h2>Opportunity Plan</h2><div class="lane standard">Standardize: Intake form and question template</div><div class="lane auto">Safe automation: Status tracking and draft preparation</div><div class="lane owner">Owner approval: Final quote, pricing, external sends</div><div class="lane noauto">Do not automate: Sensitive negotiations or final commitments</div></section><section class="card"><h2>First Reversible Test</h2><div class="safe">Use one approved intake form and one missing-information template for 10 leads. Compare completeness and response time.</div></section><section class="card"><h2>Decision Boundary</h2><p>Opportunity planning only. No external action or live automation is activated.</p></section>`},
'P010':{title:'10. AUTOMATION OPPORTUNITY SNAPSHOT',sub:'Concept decision support — not final engineering',layout:'grid3',body:`<section class="card span2"><h2>Current Manual Process</h2><div class="process"><div class="box">1 Operator loads part</div><div class="arrow">→</div><div class="box">2 Start machine</div><div class="arrow">→</div><div class="box">3 Machine runs</div><div class="arrow">→</div><div class="box">4 Unload</div><div class="arrow">→</div><div class="box">5 Walk & stage</div></div></section><section class="card"><h2>Cycle Breakdown</h2><table class="table"><tr><td>Total Cycle</td><td>68 sec</td></tr><tr><td>Machine Running</td><td>47 sec</td></tr><tr><td>Load / Unload</td><td>12 sec</td></tr><tr><td>Walking</td><td>6 sec</td></tr><tr><td>Delay</td><td>3 sec</td></tr></table><div class="metric">31% window</div></section><section class="card"><h2>Constraints</h2><ul><li>Machine access</li><li>Part variability</li><li>Floor space</li><li>Budget range</li></ul></section><section class="card"><h2>Risks</h2><ul><li>Part presentation</li><li>Recovery method</li><li>Upfront investment</li><li>Change management</li></ul></section><section class="card"><h2>First Data Test</h2><div class="safe">Track one week of cycle loss and idle reasons before requesting equipment quotes.</div></section><section class="card span3"><div class="warning"><strong>Boundary:</strong> Concept and decision support only. Qualified vendors and professionals own final design, guarding, compliance, and validation.</div></section>`},
'P013':{title:'13. FIXTURE / JIG CONCEPT REVIEW',sub:'Concept layout — not production CAD or final design',layout:'grid3',body:`<section class="card span2"><h2>Annotated Concept</h2><div class="datum"><div class="part"><div class="hole" style="left:40px;top:40px"></div><div class="hole" style="right:40px;top:40px"></div><div class="hole" style="left:40px;bottom:40px"></div><div class="hole" style="right:40px;bottom:40px"></div></div><div class="clamp" style="left:80px;top:160px"></div><div class="clamp" style="right:80px;top:160px"></div></div></section><section class="card"><h2>Concept Requirements</h2><ul><li>Primary datum: precision ground pin</li><li>Secondary location: side stop</li><li>Tertiary location: rest pad</li><li>Clamps oppose cutting force</li><li>Load orientation must be obvious</li><li>Keep tool and chip clearance</li></ul><h2>Open Questions</h2><ul><li>Will part vary?</li><li>Need soft jaws?</li><li>Required repeatability?</li><li>Through-coolant access?</li></ul></section><section class="card"><h2>Operator Access</h2><p>Clear access from the front and left. Handles remain outside tool path.</p></section><section class="card"><h2>Validation</h2><p>Repeatability study and test cut required before production release.</p></section><section class="card"><h2>Boundary</h2><div class="warning">Detailed design, manufacture, and validation require qualified resources.</div></section>`},
'P015':{title:'15. ROBOT TENDING CONCEPT PACK',sub:'Conceptual cell, sequence, recovery, and vendor-validation requirements',layout:'grid3',body:`<section class="card span2"><h2>Conceptual Cell Layout</h2><div class="cell"><div class="guard"></div><div class="machine">CNC MACHINE</div><div class="robot">ROBOT</div><div class="pallet" style="top:65px">RAW PARTS</div><div class="pallet" style="bottom:55px">FINISHED PARTS</div></div></section><section class="card"><h2>Cell Elements</h2><div class="legend"><span class="pill">Machine</span><span class="pill">Robot</span><span class="pill">Raw-part pallet</span><span class="pill">Finished-part bin</span><span class="pill">Gripper concept</span><span class="pill">Inspection point</span><span class="pill">Operator load area</span><span class="pill">Recovery position</span></div><h2 style="margin-top:18px">Open Safety Questions</h2><ul><li>Guarding and access</li><li>Light curtain needs</li><li>Payload and reach</li><li>Safe recovery method</li></ul></section><section class="card span2"><h2>Six-Step Operating Sequence</h2><div class="flow"><div class="step">1 Verify Ready</div><div class="step">2 Pick Raw Part</div><div class="step">3 Load Fixture</div><div class="step">4 Start Cycle</div><div class="step">5 Remove Part</div><div class="step">6 Place & Recover</div></div></section><section class="card"><h2>Vendor Validation Required</h2><ul><li>Final reach study</li><li>Payload confirmation</li><li>Safety risk assessment</li><li>Programming approach</li></ul></section><section class="card span3"><div class="warning"><strong>Boundary:</strong> Qualified integrators and safety professionals own final design, installation, guarding, controls, and validation.</div></section>`}
};const q=new URLSearchParams(location.search);const id=q.get('id')||'P001';const p=products[id];document.getElementById('app').innerHTML=`<article class="sheet"><header class="header"><h1>${p.title}</h1><span class="tag">HIGHWAY 38 SOLUTIONS</span></header><div class="sub">${p.sub}</div><section class="content ${p.layout}">${p.body}</section><footer class="footer"><span>Hypothetical demonstration</span><span>Big problems. Clear plans.</span></footer></article>`;</script></body></html>
